<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login / Sign Up — TRIANGLE LEARN</title>
    <meta name="description" content="Sign in to TRIANGLE LEARN to access your courses.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #eef0f5;
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.08);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-text-size-adjust: 100%; }
        body {
            font-family: var(--font-body);
            background: #f8f9fc;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 36px 28px;
            border: 1px solid var(--border);
        }
        .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 4px; text-decoration: none; }
        .auth-logo img { height: 40px; width: auto; }
        .auth-logo span { font-family: var(--font-heading); font-weight: 700; font-size: 1.15rem; color: var(--text); }
        .auth-subtitle { text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px; }

        .auth-tabs { display: flex; gap: 4px; background: #f0f2f5; border-radius: 30px; padding: 4px; margin-bottom: 24px; }
        .auth-tab { flex: 1; padding: 10px; border-radius: 26px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; background: transparent; color: var(--text-secondary); font-family: var(--font-body); transition: all 0.3s; }
        .auth-tab.active { background: #fff; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.8rem; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.88rem; font-family: var(--font-body); background: #fafbfc; }
        .form-group input:focus { outline: none; border-color: var(--purple); }
        .input-wrapper { position: relative; }
        .input-wrapper input { padding-right: 42px; }
        .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; background: none; border: none; font-size: 1.1rem; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px 20px; border-radius: 25px; font-weight: 600; font-size: 0.88rem; cursor: pointer; border: none; font-family: var(--font-body); transition: all 0.3s; }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(232,67,147,0.25); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-google { background: #fff; color: var(--text); border: 1.5px solid var(--border); margin-top: 10px; }
        .btn-google:hover { background: #fafbfc; }
        .btn-admin { background: #1a1a2e; color: #f0a500; border: 1.5px solid #2a2a3a; margin-top: 10px; display: none; }

        .forgot-link { display: block; text-align: right; font-size: 0.78rem; color: var(--purple); cursor: pointer; margin-top: -6px; margin-bottom: 16px; }
        .forgot-link:hover { text-decoration: underline; }

        .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 0.8rem; margin-bottom: 14px; display: none; }
        .alert.show { display: block; }
        .alert-error { background: #fff0f6; color: #c02660; border: 1px solid #fce4ec; }
        .alert-success { background: #e8f8f0; color: #0d9488; border: 1px solid #d4f5e9; }
        .alert-info { background: #eff6ff; color: #3b82f6; border: 1px solid #dbeafe; }

        .admin-badge { display: none; text-align: center; font-family: var(--font-heading); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #f0a500; background: rgba(240,165,0,0.1); padding: 5px 12px; border-radius: 15px; margin-bottom: 12px; }
        body.admin-mode { background: #0f0f14; }
        body.admin-mode .auth-container { background: #1a1a24; border-color: #2a2a3a; }
        body.admin-mode .auth-subtitle,
        body.admin-mode label { color: #c0c0d0; }
        body.admin-mode .auth-tabs { background: #12121a; }
        body.admin-mode .auth-tab { color: #888; }
        body.admin-mode .auth-tab.active { background: #2a2a3a; color: #fff; }
        body.admin-mode input { background: #12121a; border-color: #2a2a3a; color: #e0e0e0; }
        body.admin-mode .auth-logo span { color: #e0e0e0; }
        body.admin-mode .admin-badge { display: inline-block; }
        body.admin-mode .btn-google { display: none; }
        body.admin-mode .btn-admin { display: flex; }

        .admin-secret { display: none; margin-top: 8px; }
        body.admin-mode .admin-secret { display: block; }

        .back-link { display: inline-flex; align-items: center; gap: 5px; color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; margin-bottom: 16px; }
        .back-link:hover { color: var(--text); }
        body.admin-mode .back-link { color: #888; }
        body.admin-mode .back-link:hover { color: #fff; }

        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) { .auth-container { padding: 28px 18px; } }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="back-link">← Back to Home</a>

        <div class="admin-badge" id="adminBadge">🔐 Admin Portal</div>

        <a class="auth-logo" id="logoClick">
            <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="Logo" width="40" height="40">
            <span>TRIANGLE LEARN</span>
        </a>
        <p class="auth-subtitle" id="subtitle">Master Tech Skills. Join the Batch.</p>

        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>

        <div class="alert" id="alert"></div>

        <!-- LOGIN FORM -->
        <form class="auth-form active" id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" data-target="loginPassword">👁️</button>
                </div>
            </div>
            <span class="forgot-link" id="forgotLink">Forgot Password?</span>
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span class="btn-text">Login</span><span class="spinner"></span>
            </button>
            <button type="button" class="btn btn-google" id="googleLoginBtn">
                🅶 Continue with Google
            </button>
            <button type="button" class="btn btn-admin" id="adminLoginBtn">
                <span class="btn-text">🔐 Login as Admin</span><span class="spinner"></span>
            </button>
        </form>

        <!-- SIGN UP FORM -->
        <form class="auth-form" id="signupForm" autocomplete="on">
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Chidi Okafor" required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="signupPassword">Password (min 6 characters)</label>
                <div class="input-wrapper">
                    <input type="password" id="signupPassword" placeholder="••••••••" required autocomplete="new-password" minlength="6">
                    <button type="button" class="toggle-pw" data-target="signupPassword">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label for="signupConfirm">Confirm Password</label>
                <input type="password" id="signupConfirm" placeholder="Re-enter password" required autocomplete="new-password" minlength="6">
            </div>
            <div class="admin-secret" id="adminSecretDiv">
                <div class="form-group">
                    <label for="adminKey">🔑 Admin Secret Key</label>
                    <input type="password" id="adminKey" placeholder="Enter secret key">
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="signupBtn">
                <span class="btn-text">Create Account</span><span class="spinner"></span>
            </button>
            <button type="button" class="btn btn-google" id="googleSignupBtn">
                🅶 Continue with Google
            </button>
            <button type="button" class="btn btn-admin" id="adminSignupBtn">
                <span class="btn-text">🔐 Create Admin Account</span><span class="spinner"></span>
            </button>
        </form>

        <p style="text-align:center;margin-top:16px;font-size:0.78rem;color:var(--text-secondary);">By continuing, you agree to our <a href="#" style="color:var(--purple);">Terms</a> and <a href="#" style="color:var(--purple);">Privacy Policy</a>.</p>
    </div>

    <!-- FIREBASE SDKs (Compat / Namespaced) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // ============ INITIALIZE FIREBASE ============
        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        console.log('✅ Firebase Initialized');

        // ============ CONFIG ============
        const ADMIN_SECRET_KEY = 'TriangletechAdmin2026!';
        const CLICKS_NEEDED = 5;
        let clickCount = 0;
        let clickResetTimer = null;
        let isAdminMode = false;

        // ============ DOM ELEMENTS ============
        const alertEl = document.getElementById('alert');
        const logoClick = document.getElementById('logoClick');
        const adminBadge = document.getElementById('adminBadge');
        const subtitle = document.getElementById('subtitle');
        const adminSecretDiv = document.getElementById('adminSecretDiv');
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        const adminSignupBtn = document.getElementById('adminSignupBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const googleSignupBtn = document.getElementById('googleSignupBtn');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const tabs = document.querySelectorAll('.auth-tab');
        const forms = document.querySelectorAll('.auth-form');

        // ============ LOGO CLICK → ADMIN MODE ============
        logoClick.addEventListener('click', (e) => {
            e.preventDefault();
            clickCount++;
            clearTimeout(clickResetTimer);
            clickResetTimer = setTimeout(() => { clickCount = 0; }, 2000);

            if (clickCount >= CLICKS_NEEDED && !isAdminMode) {
                activateAdminMode();
                clickCount = 0;
            }
        });

        function activateAdminMode() {
            isAdminMode = true;
            document.body.classList.add('admin-mode');
            subtitle.textContent = 'Admin Portal — TRIANGLE LEARN';
            adminSecretDiv.style.display = 'block';
            showAlert('🔐 Admin mode activated. Enter secret key to create admin account.', 'info');
        }

        function deactivateAdminMode() {
            isAdminMode = false;
            document.body.classList.remove('admin-mode');
            subtitle.textContent = 'Master Tech Skills. Join the Batch.';
            adminSecretDiv.style.display = 'none';
            hideAlert();
        }

        // ESC to exit admin mode
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isAdminMode) {
                deactivateAdminMode();
            }
        });

        // ============ TABS ============
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                forms.forEach(f => f.classList.remove('active'));
                const target = tab.dataset.tab === 'login' ? loginForm : signupForm;
                target.classList.add('active');
                hideAlert();
            });
        });

        // ============ PASSWORD TOGGLE ============
        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                input.type = input.type === 'password' ? 'text' : 'password';
                btn.textContent = input.type === 'password' ? '👁️' : '🙈';
            });
        });

        // ============ ALERT HELPERS ============
        function showAlert(msg, type) {
            alertEl.textContent = msg;
            alertEl.className = `alert alert-${type} show`;
        }

        function hideAlert() {
            alertEl.className = 'alert';
            alertEl.textContent = '';
        }

        // ============ LOADING ============
        function setLoading(btn, loading) {
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ============ FIRESTORE USER CREATION ============
        async function createUserDoc(user, fullName, role) {
            try {
                const clean = (fullName || '').replace(/[^a-zA-Z]/g, '').substring(0, 5).toUpperCase();
                const random = Math.random().toString(36).substring(2, 6).toUpperCase();
                const referralCode = clean + random;

                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: user.email,
                    fullName: fullName || user.displayName || '',
                    profilePicture: user.photoURL || '',
                    role: role,
                    referralCode: referralCode,
                    referredBy: null,
                    referralEarnings: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                console.log('✅ User document created:', user.uid, 'Role:', role);
                return true;
            } catch (err) {
                console.error('❌ Firestore error:', err);
                return false;
            }
        }

        // ============ REDIRECT ============
        async function redirectUser(user) {
            try {
                const snap = await db.collection('users').doc(user.uid).get();
                if (snap.exists && snap.data().role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                window.location.href = 'dashboard.html';
            }
        }

        // ============ LOGIN ============
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }

            setLoading(btn, true);
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                console.log('✅ Login successful:', result.user.email);
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => redirectUser(result.user), 800);
            } catch (err) {
                console.error('❌ Login error:', err.code, err.message);
                let msg = 'Login failed. Check your email and password.';
                if (err.code === 'auth/user-not-found') msg = 'No account with this email. Please sign up first.';
                if (err.code === 'auth/wrong-password') msg = 'Incorrect password. Try again.';
                if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
                if (err.code === 'auth/invalid-credential') msg = 'Invalid email or password. Please try again.';
                if (err.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Please wait and try again.';
                showAlert(msg, 'error');
            } finally {
                setLoading(btn, false);
            }
        });

        // ============ ADMIN LOGIN ============
        adminLoginBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            hideAlert();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }

            setLoading(adminLoginBtn, true);
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                const snap = await db.collection('users').doc(result.user.uid).get();
                if (!snap.exists || snap.data().role !== 'admin') {
                    await auth.signOut();
                    showAlert('Access denied. Not an admin account.', 'error');
                    setLoading(adminLoginBtn, false);
                    return;
                }
                console.log('✅ Admin login successful');
                showAlert('Welcome Admin! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 800);
            } catch (err) {
                console.error('❌ Admin login error:', err.code);
                let msg = 'Admin login failed.';
                if (err.code === 'auth/user-not-found') msg = 'No account with this email.';
                if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') msg =
                    'Invalid email or password.';
                showAlert(msg, 'error');
            } finally {
                setLoading(adminLoginBtn, false);
            }
        });

        // ============ SIGN UP ============
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;
            const btn = document.getElementById('signupBtn');

            if (!name || !email || !password || !confirm) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }
            if (password !== confirm) {
                showAlert('Passwords do not match.', 'error');
                return;
            }
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.', 'error');
                return;
            }

            setLoading(btn, true);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                await createUserDoc(result.user, name, 'learner');
                console.log('✅ Sign up successful:', result.user.email);
                showAlert('Account created! Redirecting...', 'success');
                setTimeout(() => redirectUser(result.user), 800);
            } catch (err) {
                console.error('❌ Sign up error:', err.code, err.message);
                let msg = 'Sign up failed. Please try again.';
                if (err.code === 'auth/email-already-in-use') msg =
                    'This email is already registered. Please login instead.';
                if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
                if (err.code === 'auth/weak-password') msg =
                    'Password is too weak. Use at least 6 characters.';
                if (err.code === 'auth/network-request-failed') msg =
                    'Network error. Check your internet connection.';
                showAlert(msg, 'error');
            } finally {
                setLoading(btn, false);
            }
        });

        // ============ ADMIN SIGN UP ============
        adminSignupBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            hideAlert();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;
            const secretKey = document.getElementById('adminKey').value.trim();

            if (!name || !email || !password || !confirm) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }
            if (password !== confirm) {
                showAlert('Passwords do not match.', 'error');
                return;
            }
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.', 'error');
                return;
            }
            if (secretKey !== ADMIN_SECRET_KEY) {
                showAlert('Invalid admin secret key.', 'error');
                return;
            }

            setLoading(adminSignupBtn, true);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                await createUserDoc(result.user, name, 'admin');
                console.log('✅ Admin account created:', result.user.email);
                showAlert('Admin account created! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 800);
            } catch (err) {
                console.error('❌ Admin sign up error:', err.code);
                let msg = 'Failed to create admin account.';
                if (err.code === 'auth/email-already-in-use') msg =
                    'This email is already registered.';
                if (err.code === 'auth/weak-password') msg =
                    'Password is too weak. Use at least 6 characters.';
                showAlert(msg, 'error');
            } finally {
                setLoading(adminSignupBtn, false);
            }
        });

        // ============ GOOGLE AUTH ============
        async function handleGoogleSignIn() {
            hideAlert();
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const snap = await db.collection('users').doc(result.user.uid).get();
                if (!snap.exists) {
                    await createUserDoc(result.user, result.user.displayName, 'learner');
                }
                console.log('✅ Google sign-in successful');
                showAlert('Success! Redirecting...', 'success');
                setTimeout(() => redirectUser(result.user), 800);
            } catch (err) {
                console.error('❌ Google sign-in error:', err.code);
                if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                    showAlert('Google sign-in failed. Please try again.', 'error');
                }
            }
        }

        googleLoginBtn.addEventListener('click', handleGoogleSignIn);
        googleSignupBtn.addEventListener('click', handleGoogleSignIn);

        // ============ FORGOT PASSWORD ============
        document.getElementById('forgotLink').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            if (!email) {
                showAlert('Enter your email address first.', 'error');
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showAlert('Reset email sent! Check your inbox.', 'success');
            } catch (err) {
                console.error('❌ Password reset error:', err.code);
                let msg = 'Failed to send reset email.';
                if (err.code === 'auth/user-not-found') msg = 'No account with this email.';
                showAlert(msg, 'error');
            }
        });

        // ============ AUTO-REDIRECT IF LOGGED IN ============
        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log('👤 Already logged in as:', user.email);
                redirectUser(user);
            }
        });

        console.log('🔐 TRIANGLE LEARN Auth — Ready');
        console.log('💡 Click logo 5 times for admin mode');
    </script>
</body>
</html>
