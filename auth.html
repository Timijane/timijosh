<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login / Sign Up — TRIANGLE LEARN</title>
    <meta name="description" content="Sign in to TRIANGLE LEARN to access your courses, track progress, and earn certificates.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fc;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #eef0f5;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.08);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --error: #e84393;
            --success: #0d9488;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-text-size-adjust: 100%; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            transition: background 0.4s ease;
        }
        body.admin-mode { background: #0f0f14; }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 40px 32px;
            border: 1px solid var(--border);
            transition: all 0.4s ease;
        }
        body.admin-mode .auth-container {
            background: #1a1a24;
            border-color: #2a2a3a;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.82rem;
            margin-bottom: 24px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }
        body.admin-mode .back-link { color: #888; }
        body.admin-mode .back-link:hover { color: #fff; }

        .admin-badge {
            display: none;
            text-align: center;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #f0a500;
            background: rgba(240,165,0,0.1);
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        body.admin-mode .admin-badge { display: inline-block; }

        .auth-logo-wrapper { text-align: center; margin-bottom: 8px; }
        .logo-click-area {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
        }
        .logo-click-area img { height: 44px; width: auto; pointer-events: none; }
        .logo-click-area span {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text);
            letter-spacing: -0.5px;
            pointer-events: none;
        }
        body.admin-mode .logo-click-area span { color: #e0e0e0; }

        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.88rem;
            margin-bottom: 28px;
            transition: color 0.4s;
        }
        body.admin-mode .auth-subtitle { color: #a0a0b0; }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: #f0f2f5;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 28px;
        }
        body.admin-mode .auth-tabs { background: #12121a; }
        .auth-tab {
            flex: 1;
            padding: 10px 16px;
            border-radius: 26px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-body);
        }
        body.admin-mode .auth-tab { color: #888; }
        .auth-tab.active {
            background: #ffffff;
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }
        body.admin-mode .auth-tab.active { background: #2a2a3a; color: #fff; }

        /* Forms */
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 6px;
            color: var(--text);
        }
        body.admin-mode .form-group label { color: #c0c0d0; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: var(--font-body);
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafbfc;
            color: var(--text);
        }
        body.admin-mode .form-group input {
            background: #12121a;
            border-color: #2a2a3a;
            color: #e0e0e0;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(108,92,231,0.08);
        }
        .form-group input.error { border-color: var(--error); }

        .input-wrapper { position: relative; }
        .input-wrapper input { padding-right: 44px; }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 4px;
            transition: color 0.2s;
        }
        .toggle-password:hover { color: var(--text); }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--purple);
            text-decoration: none;
            font-weight: 500;
            margin-top: -8px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .forgot-link:hover { text-decoration: underline; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 20px;
            border-radius: 28px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: var(--font-body);
        }
        .btn-primary {
            background: var(--gradient);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(232,67,147,0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-admin {
            background: #1a1a2e;
            color: #f0a500;
            border: 1.5px solid #2a2a3a;
            margin-top: 12px;
            display: none;
        }
        body.admin-mode .btn-admin { display: flex; }
        .btn-admin:hover {
            background: #2a2a3a;
            transform: translateY(-2px);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn-admin .spinner { border-color: rgba(240,165,0,0.3); border-top-color: #f0a500; }
        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .admin-secret {
            display: none;
            margin-top: 4px;
            padding: 16px;
            background: rgba(240,165,0,0.06);
            border-radius: var(--radius-sm);
            border: 1px dashed rgba(240,165,0,0.25);
        }
        body.admin-mode .admin-secret { display: block; }
        .admin-secret .form-group:last-child { margin-bottom: 0; }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
            line-height: 1.4;
            text-align: center;
        }
        .alert.show { display: block; }
        .alert-error { background: #fff0f6; color: #c02660; border: 1px solid #fce4ec; }
        .alert-success { background: #e8f8f0; color: #0d9488; border: 1px solid #d4f5e9; }
        .alert-info { background: #eff6ff; color: #3b82f6; border: 1px solid #dbeafe; }
        body.admin-mode .alert-error { background: rgba(232,67,147,0.15); color: #f472b6; border-color: rgba(232,67,147,0.25); }
        body.admin-mode .alert-success { background: rgba(13,148,136,0.15); color: #2dd4bf; border-color: rgba(13,148,136,0.25); }
        body.admin-mode .alert-info { background: rgba(59,130,246,0.15); color: #60a5fa; border-color: rgba(59,130,246,0.25); }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .auth-footer a { color: var(--purple); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
        body.admin-mode .auth-footer { color: #888; }
        body.admin-mode .auth-footer a { color: #f0a500; }

        @media (max-width: 480px) {
            .auth-container { padding: 28px 20px; border-radius: var(--radius-md); }
            .logo-click-area img { height: 36px; }
            .logo-click-area span { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Back to Home -->
        <a href="index.html" class="back-link">← Back to Home</a>

        <!-- Admin Badge -->
        <span class="admin-badge" id="adminBadge">🔐 Admin Portal</span>

        <!-- Logo (Click 5 times for admin mode) -->
        <div class="auth-logo-wrapper">
            <div class="logo-click-area" id="logoClickArea">
                <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="TRIANGLE LEARN" width="44" height="44">
                <span>TRIANGLE LEARN</span>
            </div>
        </div>
        <p class="auth-subtitle" id="authSubtitle">Master Tech Skills. Join the Batch.</p>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>

        <!-- Alert Messages -->
        <div class="alert" id="alert"></div>

        <!-- ============ LOGIN FORM ============ -->
        <form class="auth-form active" id="loginForm" autocomplete="on" novalidate>
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-password" data-target="loginPassword" tabindex="-1">👁️</button>
                </div>
            </div>
            <span class="forgot-link" id="forgotLink">Forgot Password?</span>

            <!-- Normal Login Button -->
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span class="btn-text">Login</span>
                <span class="spinner"></span>
            </button>

            <!-- Admin Login Button (hidden until admin mode) -->
            <button type="button" class="btn btn-admin" id="adminLoginBtn">
                <span class="btn-text">🔐 Login as Admin</span>
                <span class="spinner"></span>
            </button>
        </form>

        <!-- ============ SIGN UP FORM ============ -->
        <form class="auth-form" id="signupForm" autocomplete="on" novalidate>
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Chidi Okafor" required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="signupPassword">Password (min 6 characters)</label>
                <div class="input-wrapper">
                    <input type="password" id="signupPassword" placeholder="••••••••" required autocomplete="new-password" minlength="6">
                    <button type="button" class="toggle-password" data-target="signupPassword" tabindex="-1">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label for="signupConfirm">Confirm Password</label>
                <input type="password" id="signupConfirm" placeholder="Re-enter password" required autocomplete="new-password" minlength="6">
            </div>

            <!-- Admin Secret Key Section (hidden until admin mode) -->
            <div class="admin-secret" id="adminSecretSection">
                <div class="form-group">
                    <label for="adminSecretKey">🔑 Admin Secret Key</label>
                    <input type="password" id="adminSecretKey" placeholder="Enter secret key to create admin account">
                </div>
            </div>

            <!-- Normal Sign Up Button -->
            <button type="submit" class="btn btn-primary" id="signupBtn">
                <span class="btn-text">Create Account</span>
                <span class="spinner"></span>
            </button>

            <!-- Admin Sign Up Button (hidden until admin mode) -->
            <button type="button" class="btn btn-admin" id="adminSignupBtn">
                <span class="btn-text">🔐 Create Admin Account</span>
                <span class="spinner"></span>
            </button>
        </form>

        <!-- Footer -->
        <p class="auth-footer">
            By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
        </p>
    </div>

    <!-- ============ FIREBASE SDK ============ -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // ============ FIREBASE INITIALIZATION ============
        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        console.log('✅ Firebase Initialized — TRIANGLE LEARN Auth');

        // ============ CONFIGURATION ============
        const ADMIN_SECRET_KEY = 'TriangletechAdmin2026!';
        const CLICKS_TO_ACTIVATE = 5;
        let logoClickCount = 0;
        let clickResetTimer = null;
        let isAdminMode = false;

        // ============ DOM REFERENCES ============
        const alertEl = document.getElementById('alert');
        const logoClickArea = document.getElementById('logoClickArea');
        const authSubtitle = document.getElementById('authSubtitle');
        const adminSecretSection = document.getElementById('adminSecretSection');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        const adminSignupBtn = document.getElementById('adminSignupBtn');
        const tabs = document.querySelectorAll('.auth-tab');
        const forms = document.querySelectorAll('.auth-form');

        // ============ LOGO CLICK → ADMIN MODE ============
        logoClickArea.addEventListener('click', (e) => {
            e.preventDefault();
            logoClickCount++;
            clearTimeout(clickResetTimer);
            clickResetTimer = setTimeout(() => { logoClickCount = 0; }, 2000);

            if (logoClickCount >= CLICKS_TO_ACTIVATE && !isAdminMode) {
                activateAdminMode();
                logoClickCount = 0;
            }
        });

        function activateAdminMode() {
            isAdminMode = true;
            document.body.classList.add('admin-mode');
            authSubtitle.textContent = 'Admin Portal — TRIANGLE LEARN';
            adminSecretSection.style.display = 'block';
            showAlert('🔐 Admin mode activated. Use the secret key to create an admin account, or login with an existing admin account.', 'info');
        }

        function deactivateAdminMode() {
            isAdminMode = false;
            document.body.classList.remove('admin-mode');
            authSubtitle.textContent = 'Master Tech Skills. Join the Batch.';
            adminSecretSection.style.display = 'none';
            document.getElementById('adminSecretKey').value = '';
            hideAlert();
        }

        // ESC key to exit admin mode
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isAdminMode) {
                deactivateAdminMode();
                showAlert('Admin mode deactivated.', 'info');
                setTimeout(hideAlert, 2000);
            }
        });

        // ============ TAB SWITCHING ============
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                forms.forEach(f => f.classList.remove('active'));
                if (target === 'login') {
                    loginForm.classList.add('active');
                } else {
                    signupForm.classList.add('active');
                }
                hideAlert();
            });
        });

        // ============ PASSWORD TOGGLE ============
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                if (input) {
                    input.type = input.type === 'password' ? 'text' : 'password';
                    btn.textContent = input.type === 'password' ? '👁️' : '🙈';
                }
            });
        });

        // ============ ALERT HELPERS ============
        function showAlert(message, type) {
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type} show`;
        }

        function hideAlert() {
            alertEl.className = 'alert';
            alertEl.textContent = '';
        }

        // ============ LOADING STATE ============
        function setLoading(btn, isLoading) {
            if (isLoading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ============ REDIRECT BASED ON ROLE ============
        async function redirectBasedOnRole(user) {
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists && userDoc.data().role === 'admin') {
                    console.log('👑 Admin detected — redirecting to admin dashboard');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    console.log('👤 Learner detected — redirecting to learner dashboard');
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error('⚠️ Redirect error:', err);
                window.location.href = 'dashboard.html';
            }
        }

        // ============ CREATE USER IN FIRESTORE ============
        async function createUserDocument(user, fullName, role) {
            try {
                const cleanName = (fullName || 'user').replace(/[^a-zA-Z]/g, '').substring(0, 5).toUpperCase();
                const randomStr = Math.random().toString(36).substring(2, 6).toUpperCase();
                const referralCode = cleanName + randomStr;

                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: user.email,
                    fullName: fullName || '',
                    profilePicture: '',
                    role: role,
                    referralCode: referralCode,
                    referredBy: null,
                    referralEarnings: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                console.log(`✅ User document created — ${user.email} (${role})`);
                return true;
            } catch (err) {
                console.error('❌ Firestore error creating user:', err);
                return false;
            }
        }

        // ============ NORMAL LOGIN ============
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showAlert('Please enter your email and password.', 'error');
                return;
            }

            setLoading(loginBtn, true);
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                console.log('✅ Login successful:', result.user.email);
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => redirectBasedOnRole(result.user), 800);
            } catch (err) {
                console.error('❌ Login error:', err.code);
                let message = 'Login failed. Please check your credentials.';
                if (err.code === 'auth/user-not-found') message = 'No account found with this email. Please sign up first.';
                if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') message = 'Incorrect password. Please try again.';
                if (err.code === 'auth/invalid-email') message = 'Please enter a valid email address.';
                if (err.code === 'auth/too-many-requests') message = 'Too many failed attempts. Please wait a moment and try again.';
                if (err.code === 'auth/network-request-failed') message = 'Network error. Please check your internet connection.';
                showAlert(message, 'error');
            } finally {
                setLoading(loginBtn, false);
            }
        });

        // ============ ADMIN LOGIN ============
        adminLoginBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            hideAlert();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showAlert('Please enter your email and password.', 'error');
                return;
            }

            setLoading(adminLoginBtn, true);
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);

                // Verify admin role in Firestore
                const userDoc = await db.collection('users').doc(result.user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'admin') {
                    await auth.signOut();
                    showAlert('Access denied. This account does not have admin privileges.', 'error');
                    setLoading(adminLoginBtn, false);
                    return;
                }

                console.log('👑 Admin login successful:', result.user.email);
                showAlert('Welcome, Admin! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 800);
            } catch (err) {
                console.error('❌ Admin login error:', err.code);
                let message = 'Login failed.';
                if (err.code === 'auth/user-not-found') message = 'No account found with this email.';
                if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') message = 'Incorrect password.';
                if (err.code === 'auth/too-many-requests') message = 'Too many attempts. Please wait.';
                showAlert(message, 'error');
            } finally {
                setLoading(adminLoginBtn, false);
            }
        });

        // ============ NORMAL SIGN UP ============
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;

            // Validation
            if (!name || !email || !password || !confirm) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }
            if (password !== confirm) {
                showAlert('Passwords do not match.', 'error');
                return;
            }
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.', 'error');
                return;
            }

            setLoading(signupBtn, true);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                await createUserDocument(result.user, name, 'learner');
                console.log('✅ Sign up successful:', result.user.email);
                showAlert('Account created successfully! Redirecting...', 'success');
                setTimeout(() => redirectBasedOnRole(result.user), 800);
            } catch (err) {
                console.error('❌ Sign up error:', err.code);
                let message = 'Sign up failed. Please try again.';
                if (err.code === 'auth/email-already-in-use') message = 'This email is already registered. Please login instead.';
                if (err.code === 'auth/invalid-email') message = 'Please enter a valid email address.';
                if (err.code === 'auth/weak-password') message = 'Password is too weak. Use at least 6 characters.';
                if (err.code === 'auth/network-request-failed') message = 'Network error. Check your internet connection.';
                showAlert(message, 'error');
            } finally {
                setLoading(signupBtn, false);
            }
        });

        // ============ ADMIN SIGN UP ============
        adminSignupBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            hideAlert();

            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;
            const secretKey = document.getElementById('adminSecretKey').value.trim();

            // Validation
            if (!name || !email || !password || !confirm) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }
            if (password !== confirm) {
                showAlert('Passwords do not match.', 'error');
                return;
            }
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.', 'error');
                return;
            }
            if (secretKey !== ADMIN_SECRET_KEY) {
                showAlert('Invalid admin secret key. Access denied.', 'error');
                return;
            }

            setLoading(adminSignupBtn, true);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                await createUserDocument(result.user, name, 'admin');
                console.log('👑 Admin account created:', result.user.email);
                showAlert('Admin account created! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 800);
            } catch (err) {
                console.error('❌ Admin sign up error:', err.code);
                let message = 'Failed to create admin account.';
                if (err.code === 'auth/email-already-in-use') message = 'This email is already registered.';
                if (err.code === 'auth/weak-password') message = 'Password is too weak. Use at least 6 characters.';
                if (err.code === 'auth/network-request-failed') message = 'Network error. Check your internet connection.';
                showAlert(message, 'error');
            } finally {
                setLoading(adminSignupBtn, false);
            }
        });

        // ============ FORGOT PASSWORD ============
        document.getElementById('forgotLink').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            if (!email) {
                showAlert('Please enter your email address first.', 'error');
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showAlert('Password reset email sent! Check your inbox.', 'success');
            } catch (err) {
                console.error('❌ Password reset error:', err.code);
                let message = 'Failed to send reset email.';
                if (err.code === 'auth/user-not-found') message = 'No account found with this email address.';
                if (err.code === 'auth/invalid-email') message = 'Please enter a valid email address.';
                showAlert(message, 'error');
            }
        });

        // ============ AUTO-REDIRECT IF ALREADY LOGGED IN ============
        auth.onAuthStateChanged(async (user) => {
            if (user && window.location.pathname.includes('auth.html')) {
                console.log('👤 Already logged in:', user.email);
                await redirectBasedOnRole(user);
            }
        });

        console.log('🔐 TRIANGLE LEARN Auth — Ready');
        console.log('💡 Click the logo 5 times to access Admin Portal');
    </script>
</body>
</html>
