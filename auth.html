<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login / Sign Up — TRIANGLE LEARN</title>
    <meta name="description" content="Sign in to TRIANGLE LEARN to access your courses, track progress, and earn certificates.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --bg-card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #eef0f5;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.08);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --error: #e84393;
            --success: #0d9488;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-text-size-adjust: 100%; }
        body {
            font-family: var(--font-body);
            background: #f8f9fc;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 40px 32px;
            border: 1px solid var(--border);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
            text-decoration: none;
        }
        .auth-logo img { height: 44px; width: auto; }
        .auth-logo span {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.88rem;
            margin-bottom: 28px;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: #f0f2f5;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px 16px;
            border-radius: 26px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-body);
        }
        .auth-tab.active {
            background: #ffffff;
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }

        /* Forms */
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 6px;
            color: var(--text);
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: var(--font-body);
            transition: border-color 0.2s;
            background: #fafbfc;
            color: var(--text);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(108,92,231,0.08);
        }
        .form-group input.error { border-color: var(--error); }

        .input-wrapper { position: relative; }
        .input-wrapper input { padding-right: 44px; }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 4px;
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--purple);
            text-decoration: none;
            font-weight: 500;
            margin-top: -8px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .forgot-link:hover { text-decoration: underline; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 20px;
            border-radius: 28px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: var(--font-body);
        }
        .btn-primary {
            background: var(--gradient);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(232,67,147,0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-google {
            background: #ffffff;
            color: var(--text);
            border: 1.5px solid var(--border);
            margin-top: 12px;
        }
        .btn-google:hover {
            background: #fafbfc;
            border-color: #d0d5dd;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.78rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--purple);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover { text-decoration: underline; }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
            line-height: 1.4;
        }
        .alert.show { display: block; }
        .alert-error { background: #fff0f6; color: #c02660; border: 1px solid #fce4ec; }
        .alert-success { background: #e8f8f0; color: #0d9488; border: 1px solid #d4f5e9; }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn-primary.loading .spinner { display: inline-block; }
        .btn-primary.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.82rem;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        @media (max-width: 480px) {
            .auth-container { padding: 28px 20px; border-radius: var(--radius-md); }
            .auth-logo img { height: 36px; }
            .auth-logo span { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Back to Home -->
        <a href="index.html" class="back-link">← Back to Home</a>

        <!-- Logo -->
        <a href="index.html" class="auth-logo">
            <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="TRIANGLE LEARN" width="44" height="44">
            <span>TRIANGLE LEARN</span>
        </a>
        <p class="auth-subtitle">Master Tech Skills. Join the Batch.</p>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>

        <!-- Alert -->
        <div class="alert" id="alert"></div>

        <!-- LOGIN FORM -->
        <form class="auth-form active" id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-password" data-target="loginPassword">👁️</button>
                </div>
            </div>
            <a class="forgot-link" id="forgotLink">Forgot Password?</a>
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span class="btn-text">Login</span>
                <span class="spinner"></span>
            </button>
            <button type="button" class="btn btn-google" id="googleLoginBtn">
                🅶 Continue with Google
            </button>
        </form>

        <!-- SIGN UP FORM -->
        <form class="auth-form" id="signupForm">
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Chidi Okafor" required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="signupPassword" placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6">
                    <button type="button" class="toggle-password" data-target="signupPassword">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label for="signupConfirm">Confirm Password</label>
                <input type="password" id="signupConfirm" placeholder="Re-enter password" required autocomplete="new-password" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" id="signupBtn">
                <span class="btn-text">Create Account</span>
                <span class="spinner"></span>
            </button>
            <button type="button" class="btn btn-google" id="googleSignupBtn">
                🅶 Continue with Google
            </button>
        </form>

        <!-- Footer -->
        <p class="auth-footer">
            By continuing, you agree to TRIANGLE LEARN's <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
        </p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // ============ TAB SWITCHING ============
        const tabs = document.querySelectorAll('.auth-tab');
        const forms = document.querySelectorAll('.auth-form');
        const alertEl = document.getElementById('alert');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                forms.forEach(f => f.classList.remove('active'));
                document.getElementById(target === 'login' ? 'loginForm' : 'signupForm').classList.add('active');
                hideAlert();
            });
        });

        // ============ PASSWORD TOGGLE ============
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
                btn.textContent = type === 'password' ? '👁️' : '🙈';
            });
        });

        // ============ ALERT HELPERS ============
        function showAlert(message, type) {
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type} show`;
        }

        function hideAlert() {
            alertEl.className = 'alert';
            alertEl.textContent = '';
        }

        // ============ LOADING STATE ============
        function setLoading(btn, isLoading) {
            if (isLoading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ============ REDIRECT AFTER AUTH ============
        function redirectToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // ============ CREATE USER IN FIRESTORE ============
        async function createUserInFirestore(user, displayName) {
            try {
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: user.email,
                    fullName: displayName || user.displayName || '',
                    profilePicture: user.photoURL || '',
                    role: 'learner',
                    referralCode: generateReferralCode(displayName || user.displayName || 'user'),
                    referredBy: null,
                    referralEarnings: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            } catch (err) {
                console.error('Error creating user in Firestore:', err);
            }
        }

        function generateReferralCode(name) {
            const clean = name.replace(/[^a-zA-Z]/g, '').substring(0, 5).toUpperCase();
            const random = Math.random().toString(36).substring(2, 6).toUpperCase();
            return clean + random;
        }

        // ============ LOGIN WITH EMAIL ============
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }

            setLoading(btn, true);
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(redirectToDashboard, 800);
            } catch (err) {
                let message = 'Login failed. Please try again.';
                if (err.code === 'auth/user-not-found') message = 'No account found with this email.';
                if (err.code === 'auth/wrong-password') message = 'Incorrect password. Please try again.';
                if (err.code === 'auth/invalid-email') message = 'Please enter a valid email address.';
                if (err.code === 'auth/too-many-requests') message = 'Too many attempts. Please try again later.';
                showAlert(message, 'error');
            } finally {
                setLoading(btn, false);
            }
        });

        // ============ SIGN UP WITH EMAIL ============
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;
            const btn = document.getElementById('signupBtn');

            if (!name || !email || !password || !confirm) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }
            if (password !== confirm) {
                showAlert('Passwords do not match.', 'error');
                return;
            }
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.', 'error');
                return;
            }

            setLoading(btn, true);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                await createUserInFirestore(result.user, name);
                showAlert('Account created! Redirecting...', 'success');
                setTimeout(redirectToDashboard, 800);
            } catch (err) {
                let message = 'Sign up failed. Please try again.';
                if (err.code === 'auth/email-already-in-use') message = 'An account with this email already exists. Please login instead.';
                if (err.code === 'auth/invalid-email') message = 'Please enter a valid email address.';
                if (err.code === 'auth/weak-password') message = 'Password is too weak. Use at least 6 characters.';
                showAlert(message, 'error');
            } finally {
                setLoading(btn, false);
            }
        });

        // ============ GOOGLE AUTH ============
        async function handleGoogleAuth() {
            hideAlert();
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                await createUserInFirestore(result.user, result.user.displayName);
                showAlert('Success! Redirecting...', 'success');
                setTimeout(redirectToDashboard, 800);
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    showAlert('Google sign-in failed. Please try again.', 'error');
                }
            }
        }

        document.getElementById('googleLoginBtn').addEventListener('click', handleGoogleAuth);
        document.getElementById('googleSignupBtn').addEventListener('click', handleGoogleAuth);

        // ============ FORGOT PASSWORD ============
        document.getElementById('forgotLink').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            if (!email) {
                showAlert('Please enter your email address first.', 'error');
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showAlert('Password reset email sent! Check your inbox.', 'success');
            } catch (err) {
                let message = 'Failed to send reset email.';
                if (err.code === 'auth/user-not-found') message = 'No account found with this email.';
                showAlert(message, 'error');
            }
        });

        // ============ CHECK IF ALREADY LOGGED IN ============
        auth.onAuthStateChanged((user) => {
            if (user && window.location.pathname.includes('auth.html')) {
                // User is already signed in, redirect to dashboard
                redirectToDashboard();
            }
        });

        console.log('🔐 TRIANGLE LEARN — Auth Page Ready');
    </script>
</body>
</html>
