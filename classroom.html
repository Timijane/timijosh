<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Classroom — TRIANGLE LEARN</title>
    <meta name="description" content="Your course classroom. Learn, chat, and connect with your instructor and peers.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f8;
            --bg-card: #ffffff;
            --bg-alt: #f8f9fc;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --cyan: #00c4cc;
            --green: #0d9488;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #e8ecf2;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.08);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --sidebar-width: 280px;
            --header-height: 64px;
            --danger: #e74c3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        .sidebar {
            width: var(--sidebar-width);
            background: #0c0c1a;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        .sidebar-brand {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            text-decoration: none;
        }
        .sidebar-brand img { height: 30px; }
        .sidebar-brand span { font-family: var(--font-heading); font-weight: 700; font-size: 0.9rem; color: #fff; }
        .sidebar-nav { flex: 1; padding: 12px 10px; }
        .sidebar-nav .section-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.25);
            padding: 14px 14px 6px;
            font-weight: 700;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: var(--font-body);
        }
        .sidebar-nav a:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .sidebar-nav a.active {
            background: rgba(240,165,0,0.12);
            color: var(--gold);
            font-weight: 600;
        }
        .sidebar-nav a .icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
        .sidebar-nav a .status {
            margin-left: auto;
            font-size: 0.6rem;
        }
        .sidebar-nav a .status.done { color: var(--green); }
        .sidebar-nav a .status.active { color: var(--gold); }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-footer .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--gradient); display: flex; align-items: center;
            justify-content: center; font-weight: 700; font-size: 0.75rem; color: #fff; flex-shrink: 0;
        }
        .sidebar-footer .info { flex: 1; min-width: 0; }
        .sidebar-footer .name { font-weight: 600; font-size: 0.78rem; color: #fff; }
        .sidebar-footer .role { font-size: 0.6rem; color: var(--text-muted); }

        .main {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            padding: 0 24px;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .main-header .left { display: flex; align-items: center; gap: 12px; }
        .main-header h1 { font-family: var(--font-heading); font-size: 1rem; font-weight: 700; }
        .main-header h1 small { font-weight: 400; font-size: 0.75rem; color: var(--text-muted); }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text); padding: 4px; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .header-actions .progress-text { font-size: 0.78rem; color: var(--text-muted); }
        .progress-bar-header {
            width: 120px; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden;
        }
        .progress-bar-header .fill {
            height: 100%; background: var(--gradient); transition: width 0.5s;
        }

        .main-content { padding: 24px; flex: 1; }

        .content-panel { display: none; animation: fadeIn 0.3s ease; }
        .content-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-header h2 { font-family: var(--font-heading); font-size: 0.95rem; font-weight: 700; }
        .card-body { padding: 20px; }
        .card-body.no-padding { padding: 0; }

        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
            border-radius: 20px; font-weight: 600; font-size: 0.78rem; cursor: pointer;
            border: none; font-family: var(--font-body); text-decoration: none;
            transition: all 0.3s; white-space: nowrap;
        }
        .btn-sm { padding: 4px 12px; font-size: 0.7rem; }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(232,67,147,0.25); }
        .btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
        .btn-outline:hover { border-color: var(--purple); color: var(--purple); }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,148,136,0.3); }
        .btn-gold { background: var(--gold); color: #fff; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(240,165,0,0.3); }
        .btn-danger { background: #fff0f0; color: var(--danger); border: 1px solid #fdd; }
        .btn-danger:hover { background: #ffe5e5; }
        .btn-start-class {
            background: linear-gradient(135deg, #059669, #10b981);
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 10px 24px;
        }
        .btn-start-class:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(16,185,129,0.5);
        }
        .btn-end-class {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: #fff;
            font-weight: 700;
        }
        .btn-end-class:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(220,38,38,0.4);
        }

        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.65rem; font-weight: 600;
        }
        .badge-success { background: #e8f8f0; color: var(--green); }
        .badge-warning { background: #fff8e6; color: #d97706; }
        .badge-info { background: #eff6ff; color: #3b82f6; }
        .badge-gold { background: #fff8e8; color: var(--gold); }

        .empty-state { text-align: center; padding: 30px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .empty-state h3 { font-weight: 600; font-size: 0.95rem; color: var(--text); }

        .module-content .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: var(--radius-sm); background: #1a1a2e;
        }
        .module-content .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .module-content .module-body { margin-top: 16px; line-height: 1.8; }
        .module-content .module-body h2 { font-family: var(--font-heading); font-size: 1.3rem; margin: 16px 0 8px; }
        .module-content .module-body h3 { font-family: var(--font-heading); font-size: 1.05rem; margin: 14px 0 6px; }
        .module-content .module-body ul, .module-content .module-body ol { margin: 8px 0 8px 24px; }

        .discussion-message {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            display: flex; gap: 12px; align-items: flex-start;
        }
        .discussion-message .msg-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--gradient); display: flex; align-items: center;
            justify-content: center; color: #fff; font-weight: 700;
            font-size: 0.75rem; flex-shrink: 0;
        }
        .discussion-message .msg-content { flex: 1; }
        .discussion-message .msg-content .msg-user { font-weight: 600; font-size: 0.82rem; }
        .discussion-message .msg-content .msg-time { font-size: 0.65rem; color: var(--text-muted); margin-left: 8px; }
        .discussion-message .msg-content .msg-text { font-size: 0.85rem; margin-top: 2px; }

        .discussion-input {
            display: flex; gap: 10px; padding: 14px 20px;
            border-top: 1px solid var(--border);
        }
        .discussion-input input {
            flex: 1; padding: 8px 14px; border: 1.5px solid var(--border);
            border-radius: 20px; font-family: var(--font-body); font-size: 0.85rem;
            outline: none; transition: border 0.2s;
        }
        .discussion-input input:focus { border-color: var(--purple); }
        .discussion-input .btn { flex-shrink: 0; }

        .qa-item {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
        }
        .qa-item .qa-question { font-weight: 600; font-size: 0.9rem; }
        .qa-item .qa-meta { font-size: 0.7rem; color: var(--text-muted); }
        .qa-item .qa-answer {
            margin-top: 8px; padding: 10px 14px; background: #f8f7ff;
            border-radius: var(--radius-sm); border-left: 3px solid var(--purple);
        }

        .live-status {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }
        .live-status.live {
            background: #e74c3c; color: #fff;
            animation: pulse-live 1.5s infinite;
        }
        .live-status.upcoming { background: #fff8e6; color: #d97706; }
        .live-status.ended { background: var(--border); color: var(--text-muted); }
        @keyframes pulse-live {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .live-container {
            background: #0c0c1a;
            border-radius: var(--radius-md);
            padding: 20px;
            color: #fff;
            margin-top: 12px;
        }
        .live-container .live-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
        }
        .live-container .live-header h3 { font-family: var(--font-heading); font-weight: 700; font-size: 1rem; }
        .live-container .jitsi-wrapper {
            background: #1a1a2e; border-radius: var(--radius-sm);
            height: 400px; position: relative; overflow: hidden;
        }
        .live-container .jitsi-wrapper iframe {
            width: 100%; height: 100%; border: none;
        }
        .live-container .jitsi-wrapper .placeholder {
            display: flex; align-items: center; justify-content: center;
            height: 100%; flex-direction: column; color: #888;
        }
        .live-container .jitsi-wrapper .placeholder .icon { font-size: 3rem; margin-bottom: 12px; }
        .live-container .pin-display {
            background: rgba(200,150,62,0.2);
            border: 2px solid var(--gold);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            margin: 0.8rem 0;
        }
        .live-container .pin-display .pin-number {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 0.5rem;
            color: var(--gold);
        }
        .live-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #22c55e;
            animation: pulseLive 1.5s infinite;
            display: inline-block;
        }
        @keyframes pulseLive {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }
        .classroom-timer {
            background: rgba(0,0,0,0.4);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-family: monospace;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .classroom-timer.urgent { background: #dc2626; animation: pulseUrgent 1s infinite; }
        @keyframes pulseUrgent {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .toast-container {
            position: fixed; bottom: 30px; right: 30px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px; max-width: 400px;
        }
        .toast {
            padding: 14px 20px; border-radius: var(--radius-sm); font-weight: 500;
            font-size: 0.85rem; box-shadow: var(--shadow-lg); animation: slideIn 0.4s ease;
            display: flex; align-items: center; gap: 10px; color: #fff;
        }
        .toast-success { background: var(--green); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--purple); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .toast .toast-close {
            margin-left: auto; background: none; border: none;
            color: rgba(255,255,255,0.7); cursor: pointer; font-size: 1.1rem;
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999;
        }
        .overlay.show { display: block; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .main { margin-left: 0; }
            .main-content { padding: 16px; }
            .main-header { padding: 0 16px; flex-wrap: wrap; height: auto; min-height: var(--header-height); gap: 8px; }
            .main-header h1 { font-size: 0.9rem; }
            .progress-bar-header { width: 80px; }
            .toast-container { right: 16px; bottom: 16px; left: 16px; max-width: none; }
            .live-container .jitsi-wrapper { height: 250px; }
        }
        @media (max-width: 480px) {
            .main-header .left { flex-wrap: wrap; }
            .header-actions .progress-text { font-size: 0.7rem; }
            .discussion-input { flex-wrap: wrap; }
            .discussion-input input { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    <div class="toast-container" id="toastContainer"></div>

    <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="sidebar-brand">
            <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="Logo">
            <span>TRIANGLE LEARN</span>
        </a>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            <div class="avatar" id="sidebarAvatar">U</div>
            <div class="info">
                <div class="name" id="sidebarName">User</div>
                <div class="role" id="sidebarRole">Student</div>
            </div>
        </div>
    </aside>

    <div class="main">
        <header class="main-header">
            <div class="left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div>
                    <h1 id="courseTitle">Course Name <small id="courseStage">Elementary</small></h1>
                </div>
            </div>
            <div class="header-actions">
                <span class="progress-text" id="progressText">0%</span>
                <div class="progress-bar-header">
                    <div class="fill" id="headerProgress" style="width:0%;"></div>
                </div>
                <a href="dashboard.html" class="btn btn-outline btn-sm">← Dashboard</a>
            </div>
        </header>
        <div class="main-content" id="mainContent"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        'use strict';

        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ========== STATE ==========
        const urlParams = new URLSearchParams(window.location.search);
        const COURSE_ID = urlParams.get('courseId');
        const MODULE_ID = urlParams.get('moduleId');
        let currentUser = null;
        let courseData = null;
        let userRole = 'student';
        let completedModules = [];
        let currentModuleIndex = 0;
        let progressDocId = null;
        let userFullName = 'User';

        // Live Class State
        let liveSession = null;
        let liveTimerInterval = null;
        let liveSeconds = 0;
        let liveDuration = 0;
        let pendingRoomName = null;
        let currentClassPIN = null;

        // Listeners
        let discussionsListener = null;

        const mainContent = document.getElementById('mainContent');
        const sidebarNav = document.getElementById('sidebarNav');

        // ========== HELPERS ==========
        function toNumber(value) {
            if (typeof value === 'number') return value;
            if (typeof value === 'string' && !isNaN(value)) {
                const num = parseInt(value);
                return isNaN(num) ? value : num;
            }
            return value;
        }

        function safeArray(value) {
            if (Array.isArray(value)) return value;
            if (value && typeof value === 'object' && value.length !== undefined) {
                return Array.from(value);
            }
            return [];
        }

        function escapeHtml(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function timeAgo(date) {
            const diff = Math.floor((Date.now() - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
            return date.toDateString();
        }

        function getEmbedUrl(url) {
            if (!url) return '';
            const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
            if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}`;
            const vmMatch = url.match(/vimeo\.com\/(\d+)/);
            if (vmMatch) return `https://player.vimeo.com/video/${vmMatch[1]}`;
            return url;
        }

        function showToast(message, type = 'success', duration = 4000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            toast.innerHTML = `
                <span>${icons[type] || '📢'}</span>
                <span>${message}</span>
                <button class="toast-close" onclick="this.closest('.toast').remove()">✕</button>
            `;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, duration);
        }

        function updateHeaderProgress() {
            const total = courseData?.modules?.length || 0;
            const done = completedModules.length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            document.getElementById('headerProgress').style.width = pct + '%';
            document.getElementById('progressText').textContent = pct + '%';
        }

        // ========== AUTH ==========
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }
            currentUser = user;

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    userFullName = userDoc.data().fullName || 'User';
                    document.getElementById('sidebarName').textContent = userFullName;
                    document.getElementById('sidebarAvatar').textContent = userFullName.charAt(0).toUpperCase();
                    document.getElementById('sidebarRole').textContent = userDoc.data().role || 'Student';
                    userRole = userDoc.data().role || 'student';
                }

                if (!COURSE_ID) {
                    mainContent.innerHTML = `
                        <div class="card"><div class="empty-state">
                            <div class="icon">❌</div>
                            <h3>No Course Selected</h3>
                            <p>Please select a course from your dashboard.</p>
                            <a href="dashboard.html" class="btn btn-primary" style="margin-top:12px;">Go to Dashboard</a>
                        </div></div>`;
                    return;
                }

                await loadCourse(COURSE_ID);

            } catch (err) {
                console.error('Auth error:', err);
                showToast('Failed to load user data', 'error');
            }
        });

        // ========== LOAD COURSE ==========
        async function loadCourse(courseId) {
            try {
                const doc = await db.collection('courses').doc(courseId).get();
                if (!doc.exists) {
                    mainContent.innerHTML = `
                        <div class="card"><div class="empty-state">
                            <div class="icon">📚</div>
                            <h3>Course Not Found</h3>
                            <p>The course you're looking for doesn't exist.</p>
                            <a href="dashboard.html" class="btn btn-primary" style="margin-top:12px;">Go to Dashboard</a>
                        </div></div>`;
                    return;
                }

                courseData = { id: doc.id, ...doc.data() };
                courseData.modules = safeArray(courseData.modules);
                document.getElementById('courseTitle').textContent = courseData.name || 'Course';
                document.getElementById('courseStage').textContent = courseData.stage || 'Elementary';

                await loadProgress();
                await checkLiveSession();

                // Determine module to show
                if (MODULE_ID) {
                    const idx = courseData.modules.findIndex(m => toNumber(m.id) === toNumber(MODULE_ID));
                    if (idx !== -1) currentModuleIndex = idx;
                } else {
                    const incompleteIdx = courseData.modules.findIndex(m => {
                        return !completedModules.some(c => toNumber(c) === toNumber(m.id));
                    });
                    currentModuleIndex = incompleteIdx !== -1 ? incompleteIdx : 0;
                }

                renderSidebar();
                renderOverview();

            } catch (err) {
                console.error('Load course error:', err);
                mainContent.innerHTML = `
                    <div class="card"><div class="card-body" style="text-align:center;padding:40px;">
                        <div style="font-size:3rem;margin-bottom:12px;">⚠️</div>
                        <h3>Error Loading Course</h3>
                        <p style="color:var(--text-secondary);">${err.message}</p>
                        <button class="btn btn-primary" onclick="location.reload()" style="margin-top:12px;">Retry</button>
                    </div></div>`;
            }
        }

        // ========== LOAD PROGRESS ==========
        async function loadProgress() {
            try {
                const snap = await db.collection('progress')
                    .where('userId', '==', currentUser.uid)
                    .where('courseId', '==', COURSE_ID)
                    .limit(1)
                    .get();

                if (!snap.empty) {
                    const data = snap.docs[0].data();
                    completedModules = safeArray(data.completedModules).map(id => toNumber(id));
                    progressDocId = snap.docs[0].id;
                } else {
                    const ref = await db.collection('progress').add({
                        userId: currentUser.uid,
                        courseId: COURSE_ID,
                        completedModules: [],
                        startedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    progressDocId = ref.id;
                    completedModules = [];
                }
                updateHeaderProgress();
            } catch (err) {
                console.error('Load progress error:', err);
                completedModules = [];
            }
        }

        // ========== CHECK LIVE SESSION ==========
        async function checkLiveSession() {
            try {
                const snap = await db.collection('liveClassSessions')
                    .where('courseId', '==', COURSE_ID)
                    .where('status', '==', 'live')
                    .limit(1)
                    .get();

                if (!snap.empty) {
                    const data = snap.docs[0].data();
                    liveSession = { id: snap.docs[0].id, ...data };
                    currentClassPIN = data.classPIN || '----';
                    pendingRoomName = data.roomName;
                    liveDuration = data.durationMinutes || 60;
                    if (data.startedAt?.seconds) {
                        liveSeconds = Math.floor((Date.now() / 1000) - data.startedAt.seconds);
                        startLiveTimer();
                    }
                }
            } catch (err) {
                console.error('Check live session error:', err);
            }
        }

        // ========== LIVE CLASS FUNCTIONS ==========
        function buildJitsiUrl(roomName, displayName, isTeacher) {
            let url = `https://meet.jit.si/${roomName}`;
            url += `#config.prejoinPageEnabled=true`;
            url += `&config.enableLobby=false`;
            url += `&config.startWithAudioMuted=${isTeacher ? 'false' : 'true'}`;
            url += `&config.startWithVideoMuted=${isTeacher ? 'false' : 'true'}`;
            url += `&userInfo.displayName=${encodeURIComponent(displayName)}`;
            url += `&interfaceConfig.APP_NAME=TRIANGLE+LEARN`;
            return url;
        }

        window.startLiveClass = async function() {
            if (!currentUser) return showToast('Please login first', 'error');
            if (userRole === 'student') return showToast('Only instructors can start live classes', 'error');

            const topic = prompt('Enter live class topic:');
            if (!topic) return;

            const duration = parseInt(prompt('Enter duration in minutes (default 60):') || '60');
            const pin = String(Math.floor(1000 + Math.random() * 9000));

            try {
                const roomName = 'tl-' + Date.now().toString(36) + '-' + Math.random().toString(36).substring(2, 8);
                const docRef = await db.collection('liveClassSessions').add({
                    roomName, topic, courseId: COURSE_ID,
                    teacherId: currentUser.uid, teacherName: userFullName,
                    durationMinutes: duration, classPIN: pin,
                    status: 'live',
                    startedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                liveSession = { id: docRef.id, roomName, topic, classPIN: pin, durationMinutes: duration };
                currentClassPIN = pin;
                pendingRoomName = roomName;
                liveDuration = duration;
                liveSeconds = 0;
                startLiveTimer();

                renderLiveClass();
                showToast(`🎥 Live class started! PIN: ${pin}`, 'success', 8000);

                const jitsiUrl = buildJitsiUrl(roomName, userFullName + ' (Teacher)', true);
                window.open(jitsiUrl, '_blank', 'noopener,noreferrer');

            } catch (err) {
                showToast('Failed to start live class: ' + err.message, 'error');
            }
        };

        window.joinLiveClass = function() {
            if (!pendingRoomName) return showToast('No live class is active', 'warning');

            if (userRole === 'student') {
                const enteredPin = prompt('Enter the class PIN:');
                if (enteredPin !== currentClassPIN) {
                    return showToast('❌ Incorrect PIN', 'error');
                }
            }

            const displayName = userFullName + (userRole === 'student' ? '' : ' (Teacher)');
            const isTeacher = userRole !== 'student';
            const jitsiUrl = buildJitsiUrl(pendingRoomName, displayName, isTeacher);
            window.open(jitsiUrl, '_blank', 'noopener,noreferrer');
            showToast('🎥 Joining live class...', 'info');
        };

        window.endLiveClass = async function() {
            if (!confirm('End this live classroom? Students will be disconnected.')) return;
            try {
                if (liveSession?.id) {
                    await db.collection('liveClassSessions').doc(liveSession.id).update({
                        status: 'ended',
                        endedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        durationActual: liveSeconds
                    });
                }
                stopLiveTimer();
                liveSession = null;
                pendingRoomName = null;
                currentClassPIN = null;
                renderLiveClass();
                showToast('✅ Live class ended', 'success');
            } catch (err) {
                showToast('Failed to end class: ' + err.message, 'error');
            }
        };

        function startLiveTimer() {
            if (liveTimerInterval) clearInterval(liveTimerInterval);
            liveTimerInterval = setInterval(() => {
                liveSeconds++;
                const timerEl = document.getElementById('liveTimerDisplay');
                if (timerEl) {
                    const mins = Math.floor(liveSeconds / 60);
                    const secs = liveSeconds % 60;
                    timerEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                    if (liveDuration > 0 && (liveDuration * 60 - liveSeconds) < 300) {
                        timerEl.classList.add('urgent');
                    }
                }
            }, 1000);
        }

        function stopLiveTimer() {
            if (liveTimerInterval) {
                clearInterval(liveTimerInterval);
                liveTimerInterval = null;
            }
        }

        // ========== RENDER LIVE CLASS ==========
        function renderLiveClass() {
            const isLive = liveSession && liveSession.status === 'live';
            const container = document.getElementById('liveClassContainer');
            if (!container) return;

            if (isLive) {
                container.innerHTML = `
                    <div class="live-container">
                        <div class="live-header">
                            <h3><span class="live-dot"></span> ${liveSession.topic || 'Live Class'}</h3>
                            <div style="display:flex;align-items:center;gap:1rem;">
                                <div class="classroom-timer" id="liveTimerDisplay">00:00</div>
                                <span style="font-size:0.85rem;color:#94a3b8;">PIN: <strong style="color:var(--gold);">${currentClassPIN || '----'}</strong></span>
                            </div>
                        </div>
                        <div class="pin-display">
                            <p style="color:var(--gold);font-weight:700;font-size:0.9rem;">🔑 Class PIN</p>
                            <p class="pin-number">${currentClassPIN || '----'}</p>
                            <p style="color:#94a3b8;font-size:0.7rem;">Share this PIN with students to join</p>
                        </div>
                        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.8rem;">
                            <button class="btn btn-start-class" onclick="window.joinLiveClass()">📺 Join Live Class</button>
                            ${userRole !== 'student' ? `<button class="btn btn-end-class" onclick="window.endLiveClass()">⏹ End Class</button>` : ''}
                        </div>
                        <div style="background:rgba(200,150,62,0.1);border:1px solid var(--gold);border-radius:0.5rem;padding:0.8rem;font-size:0.8rem;color:#94a3b8;">
                            ${userRole === 'student' ? 'Ask your instructor for the PIN to join.' : 'You are the moderator. Share the PIN with students.'}
                        </div>
                    </div>
                `;
                if (liveTimerInterval) {
                    const timerEl = document.getElementById('liveTimerDisplay');
                    if (timerEl) {
                        const mins = Math.floor(liveSeconds / 60);
                        const secs = liveSeconds % 60;
                        timerEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                    }
                }
            } else if (courseData?.liveClass?.enabled) {
                const live = courseData.liveClass;
                container.innerHTML = `
                    <div class="live-container" style="background:var(--bg-alt);color:var(--text);">
                        <div class="live-header">
                            <h3>📺 Scheduled Live Class</h3>
                            <span class="live-status upcoming">📅 Upcoming</span>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;">
                            <div><span style="color:var(--text-muted);">Day</span><br><strong>${live.day || 'Friday'}</strong></div>
                            <div><span style="color:var(--text-muted);">Time</span><br><strong>${live.startTime || '4:00 PM'}</strong></div>
                            <div><span style="color:var(--text-muted);">Duration</span><br><strong>${live.duration || 60} minutes</strong></div>
                        </div>
                        ${userRole !== 'student' ? `
                            <button class="btn btn-start-class" onclick="window.startLiveClass()">▶ Start Live Class Now</button>
                        ` : `<p style="font-size:0.85rem;color:var(--text-secondary);">💡 The instructor will start the live session.</p>`}
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📺</div>
                        <h3>No Live Class Scheduled</h3>
                        <p>${userRole !== 'student' ? 'Start a live class for your students.' : 'The instructor hasn\'t scheduled any live classes.'}</p>
                        ${userRole !== 'student' ? `<button class="btn btn-primary" onclick="window.startLiveClass()" style="margin-top:12px;">▶ Start Live Class</button>` : ''}
                    </div>
                `;
            }
        }

        // ========== RENDER SIDEBAR ==========
        function renderSidebar() {
            const modules = courseData?.modules || [];
            let html = '';

            html += `<span class="section-label">Course</span>`;
            html += `<a class="active" onclick="navigateTo('overview')"><span class="icon">📊</span> Overview</a>`;

            if (modules.length > 0) {
                html += `<span class="section-label">Modules</span>`;
                modules.forEach((m, i) => {
                    const mId = toNumber(m.id);
                    const isDone = completedModules.some(c => toNumber(c) === mId);
                    const isActive = i === currentModuleIndex;
                    const icon = isDone ? '✅' : (isActive ? '▶️' : '📄');
                    html += `
                        <a onclick="navigateTo('module', ${i})" class="${isActive ? 'active' : ''}">
                            <span class="icon">${icon}</span>
                            ${m.title || 'Module ' + (i+1)}
                            ${isDone ? '<span class="status done">Done</span>' : ''}
                            ${isActive ? '<span class="status active">●</span>' : ''}
                        </a>
                    `;
                });
            }

            html += `<span class="section-label">Live</span>`;
            html += `<a onclick="navigateTo('live')"><span class="icon">📺</span> Live Classroom</a>`;

            sidebarNav.innerHTML = html;
        }

        // ========== NAVIGATE ==========
        window.navigateTo = function(panel, index) {
            if (panel === 'module' && index !== undefined) {
                currentModuleIndex = index;
                renderModule(index);
                renderSidebar();
                updateHeaderProgress();
                return;
            }
            if (panel === 'overview') {
                renderOverview();
                renderSidebar();
                return;
            }
            if (panel === 'live') {
                renderLiveClassPage();
                renderSidebar();
                return;
            }
        };

        // ========== RENDER OVERVIEW ==========
        function renderOverview() {
            const modules = courseData?.modules || [];
            const total = modules.length;
            const done = completedModules.length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;

            let html = `
                <div class="card">
                    <div class="card-header">
                        <h2>📊 Course Overview</h2>
                        <span class="badge badge-info">${pct}% Complete</span>
                    </div>
                    <div class="card-body">
                        <h3 style="font-family:var(--font-heading);font-size:1.1rem;">${courseData?.name || 'Course'}</h3>
                        <p style="color:var(--text-secondary);margin:8px 0;">${courseData?.description || 'No description available.'}</p>
                        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0;">
                            <div style="background:var(--bg-alt);padding:12px;border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-weight:700;font-size:1.2rem;">${total}</div>
                                <div style="font-size:0.72rem;color:var(--text-muted);">Total Modules</div>
                            </div>
                            <div style="background:var(--bg-alt);padding:12px;border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-weight:700;font-size:1.2rem;color:var(--green);">${done}</div>
                                <div style="font-size:0.72rem;color:var(--text-muted);">Completed</div>
                            </div>
                            <div style="background:var(--bg-alt);padding:12px;border-radius:var(--radius-sm);text-align:center;">
                                <div style="font-weight:700;font-size:1.2rem;color:var(--gold);">${pct}%</div>
                                <div style="font-size:0.72rem;color:var(--text-muted);">Progress</div>
                            </div>
                        </div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            ${done < total ? `<button class="btn btn-primary" onclick="navigateTo('module', ${done})">📖 Continue Learning</button>` : ''}
                            <a href="learn.html?courseId=${COURSE_ID}" class="btn btn-outline">📚 Open Learn Page</a>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h2>📺 Live Classroom</h2></div>
                    <div class="card-body" id="liveClassContainer"></div>
                </div>
            `;

            mainContent.innerHTML = html;
            renderLiveClass();
            updateHeaderProgress();
        }

        // ========== RENDER MODULE ==========
        function renderModule(index) {
            const modules = courseData?.modules || [];
            const module = modules[index];
            if (!module) return renderOverview();

            const mId = toNumber(module.id);
            const isDone = completedModules.some(c => toNumber(c) === mId);
            const isLocked = index > 0 && !completedModules.some(c => toNumber(c) === toNumber(modules[index-1]?.id));
            const total = modules.length;

            if (isLocked) {
                mainContent.innerHTML = `
                    <div class="card"><div class="card-body" style="text-align:center;padding:40px;">
                        <div style="font-size:3rem;margin-bottom:12px;">🔒</div>
                        <h3>Module Locked</h3>
                        <p style="color:var(--text-secondary);">Complete the previous module first.</p>
                        <button class="btn btn-primary" onclick="navigateTo('module', ${index - 1})">← Go to Previous Module</button>
                    </div></div>`;
                return;
            }

            const videoUrl = module.videoUrl ? getEmbedUrl(module.videoUrl) : '';

            let html = `
                <div class="card">
                    <div class="card-header">
                        <h2>${module.title || 'Module ' + (index+1)}</h2>
                        ${isDone ? '<span class="badge badge-success">✅ Completed</span>' : ''}
                    </div>
                    <div class="card-body">
                        <div class="module-content">
                            <div class="module-meta" style="font-size:0.78rem;color:var(--text-muted);margin-bottom:16px;">
                                <span>📖 Module ${index + 1} of ${total}</span>
                                <span>⏱️ ${module.estimatedTime || 45} min</span>
                            </div>

                            ${videoUrl ? `
                                <div class="video-wrapper">
                                    <iframe src="${videoUrl}" allowfullscreen></iframe>
                                </div>
                            ` : `
                                <div class="video-wrapper">
                                    <div class="placeholder" style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;flex-direction:column;">
                                        <div style="font-size:3rem;margin-bottom:8px;">📺</div>
                                        <p>No video for this module</p>
                                    </div>
                                </div>
                            `}

                            <div class="module-body">${module.content || '<p>No content yet.</p>'}</div>

                            <div style="display:flex;justify-content:space-between;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);flex-wrap:wrap;gap:10px;">
                                <div>
                                    ${index > 0 ? `<button class="btn btn-outline" onclick="navigateTo('module', ${index - 1})">← Previous</button>` : ''}
                                </div>
                                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                                    ${!isDone ? `<button class="btn btn-success" onclick="markComplete(${index})">✅ Mark as Complete</button>` : ''}
                                    ${index < total - 1 ? `<button class="btn btn-primary" onclick="navigateTo('module', ${index + 1})">Next Module →</button>` : `<a href="certificate.html?courseId=${COURSE_ID}" class="btn btn-gold">📜 View Certificate</a>`}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h2>💬 Discussion</h2></div>
                    <div class="card-body no-padding">
                        <div id="discussionList" style="max-height:300px;overflow-y:auto;"></div>
                        <div class="discussion-input">
                            <input type="text" id="discussionInput" placeholder="Ask a question or share your thoughts...">
                            <button class="btn btn-primary btn-sm" onclick="sendDiscussion()">Send</button>
                        </div>
                    </div>
                </div>
            `;

            mainContent.innerHTML = html;
            loadDiscussion(module.id);
            updateHeaderProgress();
            renderSidebar();
        }

        // ========== MARK COMPLETE ==========
        window.markComplete = async function(index) {
            const module = courseData?.modules[index];
            if (!module) return;

            const mId = toNumber(module.id);
            if (completedModules.some(c => toNumber(c) === mId)) {
                showToast('Module already completed ✅', 'info');
                return;
            }

            try {
                completedModules.push(mId);
                if (progressDocId) {
                    await db.collection('progress').doc(progressDocId).update({
                        completedModules: completedModules,
                        lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                showToast('✅ Module completed!', 'success');
                renderModule(index);
                updateHeaderProgress();

                if (completedModules.length === courseData.modules.length) {
                    showToast('🎉 Congratulations! You\'ve completed all modules!', 'success', 6000);
                }
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        };

        // ========== DISCUSSION ==========
        function loadDiscussion(moduleId) {
            if (discussionsListener) discussionsListener();

            discussionsListener = db.collection('courses')
                .doc(COURSE_ID)
                .collection('modules')
                .doc(String(moduleId))
                .collection('discussions')
                .orderBy('createdAt', 'desc')
                .onSnapshot((snapshot) => {
                    const container = document.getElementById('discussionList');
                    if (!container) return;

                    if (snapshot.empty) {
                        container.innerHTML = `
                            <div class="empty-state" style="padding:20px;">
                                <p style="font-size:0.82rem;">No discussions yet. Start the conversation!</p>
                            </div>`;
                        return;
                    }

                    let html = '';
                    snapshot.forEach(doc => {
                        const d = doc.data();
                        const initial = (d.userName || 'U').charAt(0).toUpperCase();
                        html += `
                            <div class="discussion-message">
                                <div class="msg-avatar">${initial}</div>
                                <div class="msg-content">
                                    <div>
                                        <span class="msg-user">${escapeHtml(d.userName || 'User')}</span>
                                        <span class="msg-time">${d.createdAt?.toDate ? timeAgo(d.createdAt.toDate()) : ''}</span>
                                    </div>
                                    <div class="msg-text">${escapeHtml(d.message)}</div>
                                    ${d.voiceUrl ? `<audio controls src="${d.voiceUrl}" style="height:36px;margin-top:4px;"></audio>` : ''}
                                </div>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                });
        }

        window.sendDiscussion = async function() {
            const input = document.getElementById('discussionInput');
            const msg = input?.value?.trim();
            if (!msg) return;

            const module = courseData?.modules[currentModuleIndex];
            if (!module) return showToast('No module selected', 'error');

            try {
                await db.collection('courses')
                    .doc(COURSE_ID)
                    .collection('modules')
                    .doc(String(module.id))
                    .collection('discussions')
                    .add({
                        userId: currentUser.uid,
                        userName: userFullName,
                        message: msg,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                input.value = '';
                showToast('Message sent!', 'success');
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        };

        // ========== RENDER LIVE CLASS PAGE ==========
        function renderLiveClassPage() {
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2>📺 Live Classroom</h2>
                        <span class="live-status ${liveSession && liveSession.status === 'live' ? 'live' : 'upcoming'}">
                            ${liveSession && liveSession.status === 'live' ? '🟢 Live Now' : '📅 Scheduled'}
                        </span>
                    </div>
                    <div class="card-body">
                        <div id="liveClassContainer"></div>
                    </div>
                </div>
            `;
            renderLiveClass();
        }

        // ========== INIT ==========
        console.log('✅ Classroom loaded');
        console.log('👤 User role:', userRole);
        console.log('📚 Course ID:', COURSE_ID);

    })();
    </script>
</body>
</html>
