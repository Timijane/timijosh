<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom — TRIANGLE LEARN</title>
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f8;
            --chat-bg: #e8eaf0;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --cyan: #00c4cc;
            --green: #0d9488;
            --red: #e74c3c;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #e8ecf2;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.08);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --sidebar-width: 280px;
            --header-height: 60px;
            --base-width: 1200px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            font-size: 20px;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            width: var(--base-width);
            min-width: var(--base-width);
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
        }
        @media screen and (max-width: 1220px) {
            body {
                transform-origin: top left;
                transform: scale(calc(100vw / var(--base-width)));
                width: var(--base-width);
                min-width: var(--base-width);
                height: calc(100vh / (100vw / var(--base-width)));
            }
        }
        @supports (-webkit-overflow-scrolling: touch) {
            @media screen and (max-width: 1220px) {
                html { width: 100vw; overflow-x: hidden; }
                body { transform-origin: top left; transform: scale(calc(100vw / var(--base-width))); }
            }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            z-index: 10;
        }
        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header img { height: 30px; }
        .sidebar-header .course-name {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 0.85rem;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-tab {
            flex: 1;
            padding: 10px 6px;
            text-align: center;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: var(--font-body);
            color: var(--text-muted);
        }
        .sidebar-tab:hover { color: var(--text); }
        .sidebar-tab.active { color: var(--purple); border-bottom-color: var(--purple); }
        .sidebar-tab .tab-icon { display: block; font-size: 1rem; margin-bottom: 2px; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }
        .sidebar-panel { display: none; }
        .sidebar-panel.active { display: block; }

        .outline-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.75rem; margin-bottom: 2px;
            transition: background 0.2s;
        }
        .outline-item:hover { background: var(--bg); }
        .outline-item.completed { color: var(--green); }
        .outline-item .outline-icon { font-size: 0.85rem; width: 18px; text-align: center; }

        .member-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; border-radius: var(--radius-sm);
            font-size: 0.75rem; margin-bottom: 2px;
        }
        .member-item .member-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--gradient); display: flex; align-items: center;
            justify-content: center; color: #fff; font-weight: 700;
            font-size: 0.7rem; flex-shrink: 0;
        }
        .member-item .member-name { flex: 1; font-weight: 500; }
        .member-item .member-role {
            font-size: 0.55rem; padding: 2px 8px; border-radius: 10px;
            background: var(--bg); color: var(--text-muted);
        }
        .member-item .member-role.instructor { background: #fff8e8; color: var(--gold); }
        .member-item .online-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green); flex-shrink: 0;
        }
        .member-item .offline-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ccc; flex-shrink: 0;
        }

        .resource-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; font-size: 0.72rem;
            border-bottom: 1px solid var(--border);
            text-decoration: none; color: var(--text);
            transition: background 0.2s;
        }
        .resource-item:hover { background: var(--bg); }

        /* ===== MAIN CHAT AREA ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .chat-header {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            flex-shrink: 0;
            height: var(--header-height);
        }
        .chat-header .left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .chat-header .right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .chat-header .group-status {
            font-size: 0.65rem; padding: 3px 10px; border-radius: 12px;
            font-weight: 600;
        }
        .group-status.open { background: #e8f8f0; color: var(--green); }
        .group-status.locked { background: #fff0f0; color: var(--red); }
        .live-indicator {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--red); color: #fff; padding: 3px 10px;
            border-radius: 12px; font-size: 0.65rem; font-weight: 700;
            animation: pulseLive 1.5s infinite; cursor: pointer;
        }
        @keyframes pulseLive { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #fff; animation: pulseDot 1s infinite;
        }
        @keyframes pulseDot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.8); } }
        .live-timer {
            font-size: 0.6rem; color: var(--text-muted); margin-left: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .msg-wrapper {
            display: flex;
            gap: 8px;
            max-width: 75%;
            align-items: flex-end;
        }
        .msg-wrapper.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-avatar-sm {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--gradient); display: flex; align-items: center;
            justify-content: center; color: #fff; font-weight: 700;
            font-size: 0.6rem; flex-shrink: 0;
        }
        .msg-bubble {
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 0.8rem;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }
        .msg-wrapper:not(.mine) .msg-bubble {
            background: #fff;
            border-bottom-left-radius: 4px;
        }
        .msg-wrapper.mine .msg-bubble {
            background: #d1f0e8;
            border-bottom-right-radius: 4px;
        }
        .msg-wrapper.instructor-msg .msg-bubble {
            background: #fff8e8;
            border: 1px solid #ffe0b2;
        }
        .msg-sender {
            font-size: 0.6rem; font-weight: 700; margin-bottom: 2px;
        }
        .msg-sender .instructor-badge {
            font-size: 0.5rem; background: var(--gold); color: #fff;
            padding: 1px 6px; border-radius: 8px; margin-left: 4px;
        }
        .msg-time {
            font-size: 0.5rem; color: var(--text-muted);
            text-align: right; margin-top: 2px;
        }
        .msg-file {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px; background: rgba(0,0,0,0.05);
            border-radius: 8px; margin-top: 4px; font-size: 0.7rem;
        }
        .msg-voice audio { height: 28px; margin-top: 4px; }
        .msg-image {
            max-width: 200px; border-radius: 10px; cursor: pointer;
        }
        .system-msg {
            text-align: center;
            font-size: 0.6rem;
            color: var(--text-muted);
            padding: 4px 0;
            font-style: italic;
        }
        .pinned-msg {
            background: #fff8e8;
            border: 1px solid #ffe0b2;
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            margin-bottom: 10px;
            font-size: 0.72rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .pinned-msg .pin-icon { color: var(--gold); }
        .pinned-msg .pin-text { flex: 1; }
        .pinned-msg .pin-close { cursor: pointer; color: var(--text-muted); }

        .chat-input-area {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
            background: #fff;
            flex-shrink: 0;
        }
        .chat-input-area input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 22px;
            font-family: var(--font-body);
            font-size: 0.82rem;
            outline: none;
            background: var(--bg);
        }
        .chat-input-area input[type="text"]:focus { border-color: var(--purple); }
        .chat-input-area .icon-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1.5px solid var(--border);
            background: #fff; cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .chat-input-area .icon-btn:hover { border-color: var(--purple); background: #f8f7ff; }
        .chat-input-area .send-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--gradient); border: none; color: #fff;
            cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
        }
        .chat-locked-notice {
            text-align: center;
            padding: 6px;
            font-size: 0.65rem;
            color: var(--text-muted);
            font-style: italic;
            flex-shrink: 0;
        }
        .recording-indicator {
            display: none; align-items: center; gap: 6px;
            padding: 6px 12px; background: #fff0f0;
            border-radius: 16px; font-size: 0.7rem;
            color: var(--red); font-weight: 600;
        }
        .recording-indicator.active { display: flex; }
        .recording-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--red); animation: pulseDot 0.8s infinite;
        }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 18px;
            font-weight: 600; font-size: 0.72rem; cursor: pointer;
            border: none; font-family: var(--font-body); text-decoration: none;
            transition: all 0.3s; white-space: nowrap;
        }
        .btn-sm { padding: 5px 12px; font-size: 0.65rem; }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
        .btn-success { background: var(--green); color: #fff; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-gold { background: var(--gold); color: #fff; }
        .btn-live { background: linear-gradient(135deg, #059669, #10b981); color: #fff; font-weight: 700; }

        .toast-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px; max-width: 350px;
        }
        .toast {
            background: var(--purple); color: #fff;
            padding: 12px 20px; border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg); font-weight: 500; font-size: 0.78rem;
            animation: slideUp 0.3s ease;
        }
        .toast.error { background: var(--red); }
        .toast.success { background: var(--green); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .empty-state { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.75rem; }
        .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 0.6rem; font-weight: 600;
        }
        .badge-success { background: #e8f8f0; color: var(--green); }
        .badge-warning { background: #fff8e6; color: #d97706; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="Logo" height="30">
            <span class="course-name" id="sidebarCourseName">Classroom</span>
        </div>
        <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="modules"><span class="tab-icon">📑</span>Modules</button>
            <button class="sidebar-tab" data-tab="people"><span class="tab-icon">👥</span>People</button>
            <button class="sidebar-tab" data-tab="files"><span class="tab-icon">📎</span>Files</button>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-panel active" id="panel-modules">
                <div id="outlineList"><div class="empty-state"><div class="icon">📑</div><p>No modules yet.</p></div></div>
            </div>
            <div class="sidebar-panel" id="panel-people">
                <div id="memberList"><div class="empty-state"><div class="icon">👥</div><p>Loading...</p></div></div>
            </div>
            <div class="sidebar-panel" id="panel-files">
                <div id="resourceList"><div class="empty-state"><div class="icon">📎</div><p>No resources.</p></div></div>
            </div>
        </div>
    </aside>

    <!-- ===== MAIN CHAT ===== -->
    <div class="main">
        <div class="chat-header">
            <div class="left">
                <strong id="chatTitle" style="font-size:0.9rem;">Classroom</strong>
                <span class="group-status open" id="groupStatus">🔓 Open</span>
                <span class="live-indicator" id="liveIndicator" style="display:none;" onclick="joinLiveClass()" title="Click to join live class">
                    <span class="live-dot"></span> LIVE <span class="live-timer" id="liveTimer"></span>
                </span>
            </div>
            <div class="right" id="headerRight">
                <span style="font-size:0.7rem;color:var(--text-muted);" id="memberCount">0 members</span>
                <a href="#" class="btn btn-outline btn-sm" id="dashboardLink">← Dashboard</a>
            </div>
        </div>

        <div class="pinned-msg" id="pinnedMessage" style="display:none;">
            <span class="pin-icon">📌</span>
            <span class="pin-text" id="pinnedText"></span>
            <span class="pin-close" onclick="unpinMessage()">✕</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="system-msg">Welcome to the classroom! 🎉</div>
        </div>

        <div class="chat-locked-notice" id="lockedNotice" style="display:none;">
            🔒 The group is locked. Only instructors can send messages.
        </div>

        <div class="chat-input-area" id="chatInputArea">
            <input type="file" id="chatFileInput" style="display:none;" accept="image/*,.pdf,.doc,.docx,.ppt,.pptx,.zip" onchange="sendFile(this)">
            <span class="recording-indicator" id="recordingIndicator">
                <span class="recording-dot"></span> Recording <span id="recordingTimer">00:00</span>
            </span>
            <button class="icon-btn" onclick="document.getElementById('chatFileInput').click()" title="Attach">📎</button>
            <button class="icon-btn" onclick="startVoiceRecord()" title="Voice Note" id="voiceBtn">🎤</button>
            <input type="text" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        'use strict';

        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const COURSE_ID = urlParams.get('courseId');
        let currentUser = null;
        let userData = null;
        let userRole = 'student';
        let userFullName = 'User';
        let isInstructor = false;
        let isCourseCreator = false;
        let courseData = null;
        let modules = [];
        let members = [];
        let isGroupLocked = false;
        let pinnedMessageId = null;
        let messagesListener = null;
        let liveSessionListener = null;
        let liveSession = null;
        let liveTimerInterval = null;
        let liveSeconds = 0;
        let isRecording = false;
        let mediaRecorder = null;
        let recordingInterval = null;
        let recordingSeconds = 0;
        let currentClassPIN = null;
        let messagesLoaded = false;

        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        function showToast(msg, type = 'success') {
            const container = $('#toastContainer');
            const t = document.createElement('div');
            t.className = 'toast ' + (type === 'error' ? 'error' : 'success');
            t.textContent = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function safeArray(v) {
            if (Array.isArray(v)) return v;
            if (v && typeof v === 'object' && v.length !== undefined) return Array.from(v);
            return [];
        }

        function timeAgo(date) {
            const diff = Math.floor((Date.now() - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return date.toDateString();
        }

        function getInitials(name) {
            return (name || 'U').charAt(0).toUpperCase();
        }

        function getDashboardUrl() {
            if (userRole === 'admin' || (userData?.roles && userData.roles.includes('admin'))) return 'admin-dashboard.html';
            if (userRole === 'instructor' || (userData?.roles && userData.roles.includes('instructor'))) return 'instructor-dashboard.html';
            return 'learner-dashboard.html';
        }

        // ============ AUTH ============
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'auth.html'; return; }
            currentUser = user;
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                    userData = doc.data();
                    userFullName = userData.fullName || 'User';
                    userRole = userData.activeRole || userData.role || 'student';
                    isInstructor = userRole === 'instructor' || userRole === 'admin' || 
                        (userData.roles && (userData.roles.includes('instructor') || userData.roles.includes('admin')));
                }
                // Set dashboard link
                const dashLink = $('#dashboardLink');
                if (dashLink) dashLink.href = getDashboardUrl();

                if (!COURSE_ID) {
                    $('#chatMessages').innerHTML = `<div class="system-msg">No course selected. <a href="${getDashboardUrl()}">Go to Dashboard</a></div>`;
                    return;
                }
                await loadCourse();
                setupSidebarTabs();
                loadMessages();
                loadMembers();
                loadResources();
                listenLiveSession();
                setTimeout(injectInstructorControls, 2000);
            } catch (e) { console.error('Auth error:', e); }
        });

        // ============ LOAD COURSE ============
        async function loadCourse() {
            try {
                const doc = await db.collection('courses').doc(COURSE_ID).get();
                if (!doc.exists) {
                    $('#chatMessages').innerHTML = `<div class="system-msg">Course not found. <a href="${getDashboardUrl()}">Go to Dashboard</a></div>`;
                    return;
                }
                courseData = { id: doc.id, ...doc.data() };
                modules = safeArray(courseData.modules);
                isGroupLocked = courseData.groupLocked || false;
                pinnedMessageId = courseData.pinnedMessage || null;
                isCourseCreator = (courseData.instructorId === currentUser.uid);
                // User is effectively an instructor if they're the course creator OR have instructor/admin role
                if (isCourseCreator) isInstructor = true;

                $('#sidebarCourseName').textContent = courseData.name || 'Classroom';
                $('#chatTitle').textContent = courseData.name || 'Classroom';
                updateGroupLockUI();
                renderOutline();
                if (pinnedMessageId) loadPinnedMessage();
            } catch (e) { console.error('Load course error:', e); }
        }

        function updateGroupLockUI() {
            $('#groupStatus').textContent = isGroupLocked ? '🔒 Locked' : '🔓 Open';
            $('#groupStatus').className = 'group-status ' + (isGroupLocked ? 'locked' : 'open');
            if (isGroupLocked && !isInstructor) {
                $('#lockedNotice').style.display = 'block';
                $('#chatInput').disabled = true;
                $('#chatInput').placeholder = 'Group is locked. Only instructors can send messages.';
            } else {
                $('#lockedNotice').style.display = 'none';
                $('#chatInput').disabled = false;
                $('#chatInput').placeholder = 'Type a message...';
            }
        }

        // ============ OUTLINE ============
        function renderOutline() {
            const container = $('#outlineList');
            if (modules.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📑</div><p>No modules yet.</p></div>';
                return;
            }
            container.innerHTML = modules.map((m, i) => `
                <div class="outline-item">
                    <span class="outline-icon">${m.hasTest ? '📝' : '📄'}</span>
                    <span style="flex:1;">${escapeHtml(m.title || 'Module '+(i+1))}</span>
                    <a href="learn.html?courseId=${COURSE_ID}&moduleId=${m.id}" class="btn btn-outline btn-sm" style="font-size:0.6rem;">Learn</a>
                </div>
            `).join('');
        }

        // ============ MEMBERS ============
        async function loadMembers() {
            try {
                const snap = await db.collection('enrollments').where('courseId', '==', COURSE_ID).get();
                members = [];
                snap.forEach(d => {
                    const e = d.data();
                    if (!members.find(m => m.userId === e.userId)) {
                        members.push({ userId: e.userId, fullName: e.fullName || 'Student', role: 'student', isOnline: false });
                    }
                });
                // Add instructor
                if (courseData && !members.find(m => m.userId === courseData.instructorId)) {
                    const iDoc = await db.collection('users').doc(courseData.instructorId).get();
                    if (iDoc.exists) {
                        members.unshift({ userId: courseData.instructorId, fullName: iDoc.data().fullName || 'Instructor', role: 'instructor', isOnline: false });
                    }
                }
                // Add current user if not in list
                if (!members.find(m => m.userId === currentUser.uid)) {
                    members.push({ userId: currentUser.uid, fullName: userFullName, role: isInstructor ? 'instructor' : 'student', isOnline: true });
                }
                // Mark current user as online
                const me = members.find(m => m.userId === currentUser.uid);
                if (me) me.isOnline = true;

                renderMembers();
                $('#memberCount').textContent = members.length + ' members';
            } catch (e) { console.error('Load members error:', e); }
        }

        function renderMembers() {
            const container = $('#memberList');
            if (members.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">👥</div><p>No members yet.</p></div>';
                return;
            }
            container.innerHTML = members.map(m => `
                <div class="member-item">
                    <div class="member-avatar">${getInitials(m.fullName)}</div>
                    <span class="member-name">${escapeHtml(m.fullName)}${m.userId === currentUser.uid ? ' (You)' : ''}</span>
                    <span class="${m.isOnline ? 'online-dot' : 'offline-dot'}" title="${m.isOnline ? 'Online' : 'Offline'}"></span>
                    <span class="member-role ${m.role}">${m.role === 'instructor' ? '👑 Instructor' : 'Student'}</span>
                </div>
            `).join('');
        }

        // ============ RESOURCES ============
        async function loadResources() {
            const container = $('#resourceList');
            if (!courseData || !courseData.resources || courseData.resources.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📎</div><p>No resources.</p></div>';
                return;
            }
            container.innerHTML = safeArray(courseData.resources).map(r => `
                <a href="${r.url}" target="_blank" class="resource-item">
                    <span>📄</span><span>${escapeHtml(r.name || 'File')} (${r.size || ''})</span>
                </a>
            `).join('');
        }

        // ============ MESSAGES ============
        function loadMessages() {
            if (messagesListener) messagesListener();
            messagesListener = db.collection('classrooms').doc(COURSE_ID).collection('messages')
                .orderBy('createdAt', 'asc')
                .onSnapshot(snap => {
                    const container = $('#chatMessages');
                    container.innerHTML = '';
                    if (snap.empty) {
                        container.innerHTML = '<div class="system-msg">No messages yet. Start the conversation!</div>';
                    }
                    snap.forEach(doc => {
                        const m = doc.data();
                        const isMine = m.senderId === currentUser.uid;
                        const isInstructorMsg = m.senderRole === 'instructor' || m.senderRole === 'admin';
                        const isSystem = m.type === 'system';

                        if (isSystem) {
                            container.innerHTML += `<div class="system-msg">${escapeHtml(m.message)}</div>`;
                            return;
                        }

                        let content = '';
                        if (m.type === 'image' && m.fileUrl) {
                            content = `<img src="${m.fileUrl}" class="msg-image" onclick="window.open('${m.fileUrl}')" alt="Image" loading="lazy">`;
                        } else if (m.type === 'voice' && m.fileUrl) {
                            content = `<div class="msg-voice"><audio controls src="${m.fileUrl}"></audio></div>`;
                        } else if (m.type === 'file' && m.fileUrl) {
                            content = `<a href="${m.fileUrl}" target="_blank" class="msg-file">📎 ${escapeHtml(m.fileName || 'File')}</a>`;
                        } else {
                            content = escapeHtml(m.message || '');
                        }

                        container.innerHTML += `
                            <div class="msg-wrapper ${isMine ? 'mine' : ''} ${isInstructorMsg && !isMine ? 'instructor-msg' : ''}">
                                <div class="msg-avatar-sm">${getInitials(m.senderName || 'U')}</div>
                                <div>
                                    ${!isMine ? `<div class="msg-sender">${escapeHtml(m.senderName || 'User')}${isInstructorMsg ? '<span class="instructor-badge">INSTRUCTOR</span>' : ''}</div>` : ''}
                                    <div class="msg-bubble">
                                        ${content}
                                        ${isInstructor ? `<button style="font-size:0.5rem;background:none;border:none;cursor:pointer;color:var(--text-muted);float:right;margin-left:4px;" onclick="deleteMessage('${doc.id}')" title="Delete">🗑</button>` : ''}
                                        ${isInstructor ? `<button style="font-size:0.5rem;background:none;border:none;cursor:pointer;color:var(--gold);float:right;" onclick="pinMessage('${doc.id}')" title="Pin">📌</button>` : ''}
                                    </div>
                                    <div class="msg-time">${m.createdAt?.toDate ? timeAgo(m.createdAt.toDate()) : ''}</div>
                                </div>
                            </div>`;
                    });
                    container.scrollTop = container.scrollHeight;
                    messagesLoaded = true;
                    // Retry loading pinned message now that messages are available
                    if (pinnedMessageId) loadPinnedMessage();
                });
        }

        window.sendMessage = async function() {
            const input = $('#chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            if (isGroupLocked && !isInstructor) { showToast('Group is locked', 'error'); return; }
            try {
                await db.collection('classrooms').doc(COURSE_ID).collection('messages').add({
                    senderId: currentUser.uid,
                    senderName: userFullName,
                    senderRole: isInstructor ? 'instructor' : 'student',
                    message: msg,
                    type: 'text',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = '';
            } catch (e) { showToast('Error sending message', 'error'); }
        };

        window.sendFile = async function(input) {
            const file = input.files[0];
            if (!file) return;
            if (isGroupLocked && !isInstructor) { showToast('Group is locked', 'error'); return; }
            showToast('Uploading...', 'info');
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', 'pelumi');
            fd.append('folder', 'triangle_learn/classroom');
            try {
                const res = await fetch('https://api.cloudinary.com/v1_1/dmbjrohtn/upload', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.secure_url) {
                    const isImage = file.type.startsWith('image/');
                    await db.collection('classrooms').doc(COURSE_ID).collection('messages').add({
                        senderId: currentUser.uid,
                        senderName: userFullName,
                        senderRole: isInstructor ? 'instructor' : 'student',
                        message: '',
                        type: isImage ? 'image' : 'file',
                        fileUrl: data.secure_url,
                        fileName: file.name,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showToast('File sent!');
                }
            } catch (e) { showToast('Upload failed', 'error'); }
            input.value = '';
        };

        window.deleteMessage = async function(msgId) {
            if (!isInstructor) return;
            if (!confirm('Delete this message?')) return;
            try {
                await db.collection('classrooms').doc(COURSE_ID).collection('messages').doc(msgId).delete();
                showToast('Message deleted');
            } catch (e) { showToast('Error', 'error'); }
        };

        window.pinMessage = async function(msgId) {
            if (!isInstructor) return;
            try {
                await db.collection('courses').doc(COURSE_ID).update({ pinnedMessage: msgId });
                pinnedMessageId = msgId;
                loadPinnedMessage();
                showToast('📌 Message pinned!');
            } catch (e) { showToast('Error', 'error'); }
        };

        window.unpinMessage = async function() {
            if (!isInstructor) return;
            try {
                await db.collection('courses').doc(COURSE_ID).update({ pinnedMessage: null });
                pinnedMessageId = null;
                $('#pinnedMessage').style.display = 'none';
                showToast('Pin removed');
            } catch (e) { showToast('Error', 'error'); }
        };

        async function loadPinnedMessage() {
            if (!pinnedMessageId) { $('#pinnedMessage').style.display = 'none'; return; }
            try {
                const doc = await db.collection('classrooms').doc(COURSE_ID).collection('messages').doc(pinnedMessageId).get();
                if (doc.exists) {
                    const m = doc.data();
                    $('#pinnedText').textContent = (m.senderName || '') + ': ' + (m.message || '[Attachment]');
                    $('#pinnedMessage').style.display = 'flex';
                } else {
                    $('#pinnedMessage').style.display = 'none';
                    // Clear invalid pinned message reference
                    if (isInstructor) {
                        await db.collection('courses').doc(COURSE_ID).update({ pinnedMessage: null });
                        pinnedMessageId = null;
                    }
                }
            } catch (e) { $('#pinnedMessage').style.display = 'none'; }
        }

        // ============ GROUP LOCK/UNLOCK ============
        window.toggleGroupLock = async function() {
            if (!isInstructor) return;
            const newLock = !isGroupLocked;
            try {
                await db.collection('courses').doc(COURSE_ID).update({ groupLocked: newLock });
                isGroupLocked = newLock;
                updateGroupLockUI();
                await db.collection('classrooms').doc(COURSE_ID).collection('messages').add({
                    senderId: currentUser.uid,
                    senderName: 'System',
                    senderRole: 'system',
                    message: newLock ? '🔒 The instructor locked the group. Only instructors can send messages.' : '🔓 The instructor unlocked the group. Everyone can send messages.',
                    type: 'system',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                injectInstructorControls();
            } catch (e) { showToast('Error', 'error'); }
        };

        // ============ LIVE CLASS ============
        function listenLiveSession() {
            if (liveSessionListener) liveSessionListener();
            liveSessionListener = db.collection('liveClassSessions')
                .where('courseId', '==', COURSE_ID)
                .where('status', '==', 'live')
                .limit(1)
                .onSnapshot(snap => {
                    if (!snap.empty) {
                        const data = snap.docs[0].data();
                        liveSession = { id: snap.docs[0].id, ...data };
                        currentClassPIN = data.classPIN || '----';
                        liveSeconds = data.startedAt?.seconds ? Math.floor((Date.now() / 1000) - data.startedAt.seconds) : 0;
                        $('#liveIndicator').style.display = 'inline-flex';
                        startLiveTimer();
                        injectInstructorControls();
                    } else {
                        liveSession = null;
                        currentClassPIN = null;
                        $('#liveIndicator').style.display = 'none';
                        stopLiveTimer();
                        injectInstructorControls();
                    }
                });
        }

        function startLiveTimer() {
            if (liveTimerInterval) clearInterval(liveTimerInterval);
            updateLiveTimerDisplay();
            liveTimerInterval = setInterval(() => {
                liveSeconds++;
                updateLiveTimerDisplay();
            }, 1000);
        }

        function stopLiveTimer() {
            if (liveTimerInterval) { clearInterval(liveTimerInterval); liveTimerInterval = null; }
            $('#liveTimer').textContent = '';
        }

        function updateLiveTimerDisplay() {
            const mins = Math.floor(liveSeconds / 60);
            const secs = liveSeconds % 60;
            $('#liveTimer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        window.startLiveClass = async function() {
            if (!isInstructor) { showToast('Only instructors can start live classes', 'error'); return; }
            const topic = prompt('Live class topic:', courseData?.name || 'Live Class');
            if (!topic) return;
            const pin = String(Math.floor(1000 + Math.random() * 9000));
            const roomName = 'tl-' + Date.now().toString(36);
            try {
                await db.collection('liveClassSessions').add({
                    roomName, topic, courseId: COURSE_ID,
                    teacherId: currentUser.uid, teacherName: userFullName,
                    durationMinutes: 60, classPIN: pin,
                    status: 'live',
                    startedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('classrooms').doc(COURSE_ID).collection('messages').add({
                    senderId: currentUser.uid, senderName: 'System', senderRole: 'system',
                    message: `📺 ${userFullName} started a live class! PIN: ${pin}. Click the LIVE button to join.`,
                    type: 'system',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                const jitsiUrl = `https://meet.jit.si/${roomName}#config.prejoinPageEnabled=true&userInfo.displayName=${encodeURIComponent(userFullName + ' (Instructor)')}`;
                window.open(jitsiUrl, '_blank');
                showToast(`Live class started! PIN: ${pin}`);
            } catch (e) { showToast('Error: ' + e.message, 'error'); }
        };

        window.joinLiveClass = function() {
            if (!liveSession) { showToast('No live class active', 'warning'); return; }
            // Instructors don't need PIN
            if (!isInstructor) {
                const enteredPin = prompt('Enter the class PIN:');
                if (enteredPin !== currentClassPIN) { showToast('❌ Incorrect PIN', 'error'); return; }
            }
            const jitsiUrl = `https://meet.jit.si/${liveSession.roomName}#config.prejoinPageEnabled=true&userInfo.displayName=${encodeURIComponent(userFullName + (isInstructor ? ' (Instructor)' : ''))}`;
            window.open(jitsiUrl, '_blank');
        };

        window.endLiveClass = async function() {
            if (!isInstructor || !liveSession) return;
            if (!confirm('End the live class? All students will be disconnected.')) return;
            try {
                await db.collection('liveClassSessions').doc(liveSession.id).update({
                    status: 'ended',
                    endedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('classrooms').doc(COURSE_ID).collection('messages').add({
                    senderId: currentUser.uid, senderName: 'System', senderRole: 'system',
                    message: '📺 The live class has ended.',
                    type: 'system',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Live class ended');
            } catch (e) { showToast('Error', 'error'); }
        };

        // ============ VOICE RECORDING ============
        window.startVoiceRecord = async function() {
            if (isRecording) {
                stopRecording();
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    stopRecordingUI();
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const fd = new FormData();
                    fd.append('file', blob, 'voice.webm');
                    fd.append('upload_preset', 'pelumi');
                    fd.append('folder', 'triangle_learn/voice');
                    showToast('Uploading voice note...', 'info');
                    const res = await fetch('https://api.cloudinary.com/v1_1/dmbjrohtn/upload', { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.secure_url) {
                        await db.collection('classrooms').doc(COURSE_ID).collection('messages').add({
                            senderId: currentUser.uid,
                            senderName: userFullName,
                            senderRole: isInstructor ? 'instructor' : 'student',
                            message: '',
                            type: 'voice',
                            fileUrl: data.secure_url,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        showToast('Voice note sent!');
                    }
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                isRecording = true;
                startRecordingUI();
                // Auto-stop after 60 seconds
                setTimeout(() => { if (isRecording) stopRecording(); }, 60000);
            } catch (e) { showToast('Microphone access denied', 'error'); }
        };

        function startRecordingUI() {
            $('#voiceBtn').textContent = '⏹';
            $('#voiceBtn').style.background = '#e74c3c';
            $('#voiceBtn').style.color = '#fff';
            $('#recordingIndicator').classList.add('active');
            recordingSeconds = 0;
            updateRecordingTimer();
            recordingInterval = setInterval(() => {
                recordingSeconds++;
                updateRecordingTimer();
            }, 1000);
        }

        function stopRecordingUI() {
            isRecording = false;
            $('#voiceBtn').textContent = '🎤';
            $('#voiceBtn').style.background = '';
            $('#voiceBtn').style.color = '';
            $('#recordingIndicator').classList.remove('active');
            if (recordingInterval) { clearInterval(recordingInterval); recordingInterval = null; }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }

        function updateRecordingTimer() {
            const mins = Math.floor(recordingSeconds / 60);
            const secs = recordingSeconds % 60;
            $('#recordingTimer').textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // ============ SIDEBAR TABS ============
        function setupSidebarTabs() {
            document.querySelectorAll('.sidebar-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
                    const panel = document.getElementById('panel-' + tab.dataset.tab);
                    if (panel) panel.classList.add('active');
                });
            });
        }

        // ============ INSTRUCTOR CONTROLS ============
        function injectInstructorControls() {
            const headerRight = $('#headerRight');
            if (!headerRight) return;
            // Remove existing injected controls
            const existing = headerRight.querySelector('.instructor-controls');
            if (existing) existing.remove();

            const ctrl = document.createElement('div');
            ctrl.className = 'instructor-controls';
            ctrl.style.cssText = 'display:flex;gap:6px;align-items:center;';

            if (isInstructor) {
                ctrl.innerHTML += `<button class="btn btn-sm ${isGroupLocked ? 'btn-success' : 'btn-outline'}" onclick="toggleGroupLock()" style="font-size:0.6rem;">${isGroupLocked ? '🔓 Unlock' : '🔒 Lock'}</button>`;
                if (liveSession) {
                    ctrl.innerHTML += `<button class="btn btn-sm btn-danger" onclick="endLiveClass()" style="font-size:0.6rem;">⏹ End Live</button>`;
                } else {
                    ctrl.innerHTML += `<button class="btn btn-sm btn-live" onclick="startLiveClass()" style="font-size:0.6rem;">📺 Start Live</button>`;
                }
            }
            // Show Join Live for everyone when session is active
            if (liveSession) {
                ctrl.innerHTML += `<button class="btn btn-sm btn-primary" onclick="joinLiveClass()" style="font-size:0.6rem;">📺 Join Live</button>`;
            }

            if (ctrl.innerHTML) {
                headerRight.insertBefore(ctrl, headerRight.firstChild);
            }
        }

        // ============ CLEANUP ============
        window.addEventListener('beforeunload', () => {
            if (messagesListener) messagesListener();
            if (liveSessionListener) liveSessionListener();
            stopLiveTimer();
            if (recordingInterval) clearInterval(recordingInterval);
        });

        console.log('✅ WhatsApp-Style Classroom Ready — All Fixes Applied');
    })();
    </script>
</body>
</html>
