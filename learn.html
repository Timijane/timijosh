<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn — TRIANGLE LEARN</title>
    <meta name="description" content="Learn your course. Watch videos, take tests, and track your progress.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f8;
            --bg-card: #ffffff;
            --bg-alt: #f8f9fc;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --cyan: #00c4cc;
            --green: #0d9488;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #e8ecf2;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.08);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --header-height: 64px;
            --sidebar-width: 300px;
            --base-width: 1200px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            font-size: 18px;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            width: var(--base-width);
            min-width: var(--base-width);
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
        }
        @media screen and (max-width: 1220px) {
            body {
                transform-origin: top left;
                transform: scale(calc(100vw / var(--base-width)));
                width: var(--base-width);
                min-width: var(--base-width);
                height: calc(100vh / (100vw / var(--base-width)));
            }
        }
        @supports (-webkit-overflow-scrolling: touch) {
            @media screen and (max-width: 1220px) {
                html { width: 100vw; overflow-x: hidden; }
                body { transform-origin: top left; transform: scale(calc(100vw / var(--base-width))); }
            }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            padding: 0 20px;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }
        .header .left { display: flex; align-items: center; gap: 12px; }
        .header h1 { font-family: var(--font-heading); font-size: 1rem; font-weight: 700; }
        .header h1 small { font-weight: 400; font-size: 0.75rem; color: var(--text-muted); }
        .header .right { display: flex; align-items: center; gap: 12px; }
        .progress-text { font-size: 0.8rem; color: var(--text-muted); }
        .progress-bar-header {
            width: 110px; height: 5px; background: var(--border); border-radius: 4px; overflow: hidden;
        }
        .progress-bar-header .fill { height: 100%; background: var(--gradient); transition: width 0.5s; }

        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
            border-radius: 22px; font-weight: 600; font-size: 0.82rem; cursor: pointer;
            border: none; font-family: var(--font-body); text-decoration: none;
            transition: all 0.3s; white-space: nowrap;
        }
        .btn-sm { padding: 6px 14px; font-size: 0.75rem; }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(232,67,147,0.25); }
        .btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
        .btn-outline:hover { border-color: var(--purple); color: var(--purple); }
        .btn-success { background: var(--green); color: #fff; }
        .btn-gold { background: var(--gold); color: #fff; }
        .btn-pink { background: var(--pink); color: #fff; }

        .badge {
            display: inline-block; padding: 3px 12px; border-radius: 20px;
            font-size: 0.68rem; font-weight: 600;
        }
        .badge-success { background: #e8f8f0; color: var(--green); }
        .badge-warning { background: #fff8e6; color: #d97706; }
        .badge-info { background: #eff6ff; color: #3b82f6; }
        .badge-gold { background: #fff8e8; color: var(--gold); }
        .badge-pink { background: #fff0f6; color: var(--pink); }

        .learn-container {
            display: flex;
            flex: 1;
            height: calc(100vh - var(--header-height));
            overflow: hidden;
        }
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            background: var(--bg);
        }
        .sidebar-right {
            width: var(--sidebar-width);
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-tab {
            flex: 1;
            padding: 12px 10px;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            border-top: none; border-left: none; border-right: none;
            font-family: var(--font-body);
            color: var(--text-muted);
        }
        .sidebar-tab:hover { color: var(--text); }
        .sidebar-tab.active { color: var(--purple); border-bottom-color: var(--purple); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 14px; }
        .sidebar-panel { display: none; }
        .sidebar-panel.active { display: block; }

        /* ===== OUTLINE ITEMS ===== */
        .outline-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: var(--radius-sm);
            cursor: pointer; transition: all 0.2s; margin-bottom: 4px;
            font-size: 0.82rem; border: 1px solid transparent;
        }
        .outline-item:hover { background: var(--bg-alt); border-color: var(--border); }
        .outline-item.active { 
            background: #f3f0ff; 
            font-weight: 600; 
            color: var(--purple); 
            border-color: #d8d0f0;
        }
        .outline-item.completed { 
            color: var(--green); 
            background: #f0faf7;
        }
        .outline-item.completed .outline-title { text-decoration: line-through; opacity: 0.7; }
        .outline-item.locked { 
            opacity: 0.5; 
            cursor: not-allowed; 
            background: #f5f5f5;
        }
        .outline-item .outline-icon { font-size: 1rem; width: 22px; text-align: center; flex-shrink: 0; }
        .outline-item .outline-title { flex: 1; font-size: 0.8rem; }
        .outline-item .outline-badge { flex-shrink: 0; margin-left: 4px; }

        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0;
            overflow: hidden; border-radius: var(--radius-md);
            background: #0c0c1a; margin-bottom: 18px;
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; border: none;
        }
        .video-wrapper .video-placeholder {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: #888;
        }

        .module-title {
            font-family: var(--font-heading);
            font-size: 1.3rem; font-weight: 700; margin-bottom: 4px;
        }
        .module-meta {
            font-size: 0.8rem; color: var(--text-muted);
            margin-bottom: 16px; display: flex; gap: 16px; flex-wrap: wrap;
        }
        .module-body {
            line-height: 1.8; font-size: 0.92rem; color: var(--text-secondary);
        }
        .module-body h2 { font-family: var(--font-heading); font-size: 1.2rem; margin: 16px 0 8px; color: var(--text); }
        .module-body h3 { font-family: var(--font-heading); font-size: 1rem; margin: 14px 0 6px; color: var(--text); }
        .module-body ul, .module-body ol { margin: 8px 0 8px 24px; }

        .attachment-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .attachment-item {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px; background: #f3f0ff;
            border: 1px solid #d8d0f0; border-radius: 16px;
            font-size: 0.8rem; font-weight: 500; text-decoration: none;
            color: var(--purple); transition: all 0.2s;
        }
        .attachment-item:hover { background: #e8e0ff; }

        .test-card, .exam-card, .project-card {
            margin-top: 18px; padding: 16px 18px; border-radius: var(--radius-sm);
            border: 2px dashed;
        }
        .test-card { background: #fff8e8; border-color: var(--gold); }
        .exam-card { background: #fff0f6; border-color: var(--pink); }
        .project-card { background: #e8f8f0; border-color: var(--green); }
        .test-card .card-label, .exam-card .card-label, .project-card .card-label {
            display: inline-block; padding: 3px 14px; border-radius: 12px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .test-card .card-label { background: var(--gold); color: #fff; }
        .exam-card .card-label { background: var(--pink); color: #fff; }
        .project-card .card-label { background: var(--green); color: #fff; }

        .nav-buttons {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border);
            flex-wrap: wrap; gap: 10px;
        }

        .notes-editor {
            width: 100%; min-height: 120px; padding: 12px 14px;
            border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            font-family: var(--font-body); font-size: 0.88rem;
            outline: none; resize: vertical; transition: border 0.2s;
            background: #fff; color: var(--text);
        }
        .notes-editor:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(108,92,231,0.06); }

        .discussion-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
        .discussion-item .d-user { font-weight: 600; font-size: 0.84rem; }
        .discussion-item .d-time { font-size: 0.68rem; color: var(--text-muted); margin-left: 8px; }
        .discussion-item .d-text { font-size: 0.85rem; margin-top: 2px; }
        .discussion-input-group { display: flex; gap: 8px; margin-top: 12px; }
        .discussion-input-group input {
            flex: 1; padding: 10px 14px; border: 1.5px solid var(--border);
            border-radius: 22px; font-family: var(--font-body); font-size: 0.88rem; outline: none;
        }
        .discussion-input-group input:focus { border-color: var(--purple); }

        .progress-section { margin-bottom: 14px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; }
        .progress-track { width: 100%; height: 8px; background: var(--border); border-radius: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gradient); border-radius: 8px; transition: width 0.8s ease; }

        .empty-state { text-align: center; padding: 28px 18px; color: var(--text-muted); }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .empty-state h3 { font-weight: 600; font-size: 0.95rem; color: var(--text); margin-bottom: 4px; }
        .empty-state p { font-size: 0.85rem; }

        .card { background: var(--bg-card); border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm); }
        .card-body { padding: 20px; }

        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; max-width: 400px; }
        .toast { padding: 14px 20px; border-radius: var(--radius-sm); font-weight: 500; font-size: 0.88rem; box-shadow: var(--shadow-lg); animation: slideIn 0.4s ease; display: flex; align-items: center; gap: 10px; color: #fff; }
        .toast-success { background: var(--green); }
        .toast-error { background: #e74c3c; }
        .toast-info { background: var(--purple); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        .completion-celebration {
            text-align: center; padding: 40px 20px;
        }
        .completion-celebration .trophy { font-size: 5rem; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="left">
            <a href="learner-dashboard.html" class="btn btn-outline btn-sm">← Dashboard</a>
            <h1 id="courseTitle">Course Name <small id="courseStage">Elementary</small></h1>
        </div>
        <div class="right">
            <span class="progress-text" id="progressText">0%</span>
            <div class="progress-bar-header"><div class="fill" id="headerProgress" style="width:0%;"></div></div>
            <a href="classroom.html?courseId=" class="btn btn-primary btn-sm" id="classroomBtn">📚 Classroom</a>
        </div>
    </header>

    <div class="learn-container">
        <div class="content-area" id="contentArea"></div>
        <div class="sidebar-right">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="outline">📑 Outline</button>
                <button class="sidebar-tab" data-tab="notes">📝 Notes</button>
                <button class="sidebar-tab" data-tab="discussion">💬 Discussion</button>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-panel active" id="panel-outline">
                    <div style="margin-bottom:10px;">
                        <span style="font-weight:600;font-size:0.88rem;">📑 Course Outline</span>
                        <div class="progress-section" style="margin-top:8px;">
                            <div class="progress-label"><span>Progress</span><span id="courseProgressPercent">0%</span></div>
                            <div class="progress-track"><div class="progress-fill" id="courseProgressFill" style="width:0%;"></div></div>
                        </div>
                    </div>
                    <div id="outlineList"></div>
                </div>
                <div class="sidebar-panel" id="panel-notes">
                    <div style="margin-bottom:10px;">
                        <span style="font-weight:600;font-size:0.88rem;">📝 Your Notes</span>
                        <p style="font-size:0.72rem;color:var(--text-muted);">Private notes for this module.</p>
                    </div>
                    <textarea class="notes-editor" id="notesEditor" placeholder="Write your notes here..."></textarea>
                    <button class="btn btn-primary btn-sm" onclick="saveNotes()" style="margin-top:8px;width:100%;justify-content:center;">💾 Save Notes</button>
                </div>
                <div class="sidebar-panel" id="panel-discussion">
                    <div style="margin-bottom:10px;">
                        <span style="font-weight:600;font-size:0.88rem;">💬 Discussion</span>
                        <p style="font-size:0.72rem;color:var(--text-muted);">Ask questions about this module.</p>
                    </div>
                    <div id="discussionList"><div class="empty-state" style="padding:14px;"><p>No discussions yet.</p></div></div>
                    <div class="discussion-input-group">
                        <input type="text" id="discussionInput" placeholder="Write a message...">
                        <button class="btn btn-primary btn-sm" onclick="sendDiscussion()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        'use strict';

        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const COURSE_ID = urlParams.get('courseId');
        let currentUser = null;
        let courseData = null;
        let modules = [];
        let currentModuleIndex = 0;
        let completedModules = [];
        let notesData = {};
        let discussionListener = null;
        let progressDocId = null;

        const $ = (sel) => document.querySelector(sel);

        function showToast(msg, type = 'success') {
            const c = $('#toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.innerHTML = `<span>${type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span><span>${msg}</span>`;
            c.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function safeArray(v) {
            if (Array.isArray(v)) return v;
            if (v && typeof v === 'object' && v.length !== undefined) return Array.from(v);
            return [];
        }

        function toNum(v) {
            if (typeof v === 'number') return v;
            if (typeof v === 'string' && !isNaN(v)) { const n = parseInt(v); return isNaN(n) ? v : n; }
            return v;
        }

        function timeAgo(date) {
            const diff = Math.floor((Date.now() - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return date.toDateString();
        }

        function getEmbedUrl(url) {
            if (!url) return '';
            const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
            if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
            const vm = url.match(/vimeo\.com\/(\d+)/);
            if (vm) return `https://player.vimeo.com/video/${vm[1]}`;
            return url;
        }

        // ============ AUTH ============
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'auth.html'; return; }
            currentUser = user;
            if (!COURSE_ID) {
                $('#contentArea').innerHTML = '<div class="card"><div class="card-body" style="text-align:center;padding:40px;"><h3>No Course Selected</h3><a href="learner-dashboard.html" class="btn btn-primary" style="margin-top:12px;">Go to Dashboard</a></div></div>';
                return;
            }
            $('#classroomBtn').href = `classroom.html?courseId=${COURSE_ID}`;
            await loadCourse(COURSE_ID);
            setupSidebarTabs();
        });

        // ============ LOAD COURSE ============
        async function loadCourse(courseId) {
            try {
                const doc = await db.collection('courses').doc(courseId).get();
                if (!doc.exists) {
                    $('#contentArea').innerHTML = '<div class="card"><div class="card-body" style="text-align:center;padding:40px;"><h3>Course Not Found</h3><a href="learner-dashboard.html" class="btn btn-primary" style="margin-top:12px;">Dashboard</a></div></div>';
                    return;
                }
                courseData = { id: doc.id, ...doc.data() };
                $('#courseTitle').textContent = courseData.name || 'Course';
                $('#courseStage').textContent = courseData.stage || 'Elementary';
                modules = safeArray(courseData.modules);
                console.log('📚 Modules loaded:', modules.length);
                await loadProgress();
                await loadNotes();
                renderOutline();
                renderModule(currentModuleIndex);
                updateHeaderProgress();
                setupDiscussionListener();
            } catch (e) {
                console.error('Load course error:', e);
                showToast('Error loading course', 'error');
            }
        }

        // ============ PROGRESS ============
        async function loadProgress() {
            try {
                const snap = await db.collection('progress')
                    .where('userId','==',currentUser.uid)
                    .where('courseId','==',COURSE_ID)
                    .limit(1)
                    .get();
                if (!snap.empty) {
                    const d = snap.docs[0].data();
                    progressDocId = snap.docs[0].id;
                    completedModules = safeArray(d.completedModules).map(toNum);
                } else {
                    const ref = await db.collection('progress').add({
                        userId: currentUser.uid,
                        courseId: COURSE_ID,
                        completedModules: [],
                        startedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    progressDocId = ref.id;
                    completedModules = [];
                }
                // Find first incomplete module
                const firstIncomplete = modules.findIndex(m => !completedModules.some(c => toNum(c) === toNum(m.id)));
                currentModuleIndex = firstIncomplete !== -1 ? firstIncomplete : (modules.length > 0 ? modules.length - 1 : 0);
                if (currentModuleIndex < 0) currentModuleIndex = 0;
                console.log('📊 Current module index:', currentModuleIndex, 'Completed:', completedModules);
            } catch (e) {
                console.error('Load progress error:', e);
                completedModules = [];
            }
        }

        async function loadNotes() {
            try {
                const snap = await db.collection('notes')
                    .where('userId','==',currentUser.uid)
                    .where('courseId','==',COURSE_ID)
                    .get();
                notesData = {};
                snap.forEach(d => {
                    const dt = d.data();
                    notesData[dt.moduleId] = { id: d.id, content: dt.content || '' };
                });
                const mod = modules[currentModuleIndex];
                if (mod) {
                    const editor = $('#notesEditor');
                    if (editor) editor.value = notesData[mod.id]?.content || '';
                }
            } catch (e) {
                console.error('Load notes error:', e);
                notesData = {};
            }
        }

        window.saveNotes = async function() {
            const mod = modules[currentModuleIndex];
            if (!mod) return;
            const editor = $('#notesEditor');
            if (!editor) return;
            const content = editor.value;
            try {
                if (notesData[mod.id]) {
                    await db.collection('notes').doc(notesData[mod.id].id).update({
                        content,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    const ref = await db.collection('notes').add({
                        userId: currentUser.uid,
                        courseId: COURSE_ID,
                        moduleId: mod.id,
                        content,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    notesData[mod.id] = { id: ref.id, content };
                }
                showToast('✅ Notes saved!');
            } catch (e) {
                showToast('Error saving notes', 'error');
            }
        };

        function updateHeaderProgress() {
            const t = modules.length;
            const d = completedModules.length;
            const pct = t > 0 ? Math.round((d / t) * 100) : 0;
            const hp = $('#headerProgress');
            const pt = $('#progressText');
            const cpp = $('#courseProgressPercent');
            const cpf = $('#courseProgressFill');
            if (hp) hp.style.width = pct + '%';
            if (pt) pt.textContent = pct + '%';
            if (cpp) cpp.textContent = pct + '%';
            if (cpf) cpf.style.width = pct + '%';
        }

        // ============ OUTLINE ============
        function renderOutline() {
            const container = $('#outlineList');
            if (!container) {
                console.warn('Outline container not found');
                return;
            }
            
            if (!modules || modules.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📑</div><p>No modules loaded yet.</p></div>';
                return;
            }
            
            container.innerHTML = modules.map((m, i) => {
                const mId = toNum(m.id);
                const isDone = completedModules.some(c => toNum(c) === mId);
                const isActive = i === currentModuleIndex;
                const prevModule = modules[i - 1];
                const isLocked = i > 0 && prevModule && !completedModules.some(c => toNum(c) === toNum(prevModule.id));
                
                let cls = 'outline-item';
                if (isActive) cls += ' active';
                if (isDone) cls += ' completed';
                if (isLocked && !isDone) cls += ' locked';
                
                const icon = isDone ? '✅' : (isLocked && !isDone) ? '🔒' : isActive ? '▶️' : '📄';
                const onClick = (isLocked && !isDone) ? '' : `onclick="navigateToModule(${i})"`;
                
                let badges = '';
                if (m.hasTest) badges += '<span class="outline-badge badge badge-gold" style="font-size:0.6rem;">Test</span>';
                if (m.hasExam) badges += '<span class="outline-badge badge badge-pink" style="font-size:0.6rem;">Exam</span>';
                if (m.hasProject) badges += '<span class="outline-badge badge badge-success" style="font-size:0.6rem;">Project</span>';
                
                return `<div class="${cls}" ${onClick} style="cursor:${(isLocked && !isDone) ? 'not-allowed' : 'pointer'};">
                    <span class="outline-icon">${icon}</span>
                    <span class="outline-title">${escapeHtml(m.title || 'Module '+(i+1))}</span>
                    ${badges}
                </div>`;
            }).join('');
            
            console.log('📑 Outline rendered with', modules.length, 'modules');
        }

        window.navigateToModule = function(index) {
            if (index < 0 || index >= modules.length) return;
            currentModuleIndex = index;
            renderModule(index);
            renderOutline();
            updateHeaderProgress();
            setupDiscussionListener();
            const mod = modules[index];
            if (mod) {
                const editor = $('#notesEditor');
                if (editor) editor.value = notesData[mod.id]?.content || '';
            }
        };

        // ============ RENDER MODULE ============
        function renderModule(index) {
            const mod = modules[index];
            if (!mod) {
                $('#contentArea').innerHTML = `
                    <div class="card"><div class="card-body completion-celebration">
                        <div class="trophy">🏆</div>
                        <h2 style="font-family:var(--font-heading);margin:12px 0;">All Modules Complete!</h2>
                        <p style="color:var(--text-secondary);margin-bottom:16px;">You've completed all ${modules.length} modules.</p>
                        <a href="classroom.html?courseId=${COURSE_ID}" class="btn btn-gold">📚 Classroom</a>
                        <a href="certificate.html?courseId=${COURSE_ID}" class="btn btn-primary" style="margin-left:8px;">📜 Certificate</a>
                    </div></div>`;
                renderOutline();
                return;
            }
            
            const mId = toNum(mod.id);
            const isDone = completedModules.some(c => toNum(c) === mId);
            const prevModule = modules[index - 1];
            const isLocked = index > 0 && prevModule && !completedModules.some(c => toNum(c) === toNum(prevModule.id));
            const total = modules.length;
            const isLastModule = index === total - 1;

            if (isLocked) {
                $('#contentArea').innerHTML = `<div class="card"><div class="card-body" style="text-align:center;padding:40px;"><div style="font-size:3rem;">🔒</div><h3>Module Locked</h3><p>Complete "${escapeHtml(prevModule?.title || 'the previous module')}" first.</p><button class="btn btn-primary" onclick="navigateToModule(${index-1})">← Go to ${escapeHtml(prevModule?.title || 'Previous Module')}</button></div></div>`;
                renderOutline();
                return;
            }

            const editor = $('#notesEditor');
            if (editor) editor.value = notesData[mod.id]?.content || '';
            
            const videoUrl = mod.videoUrl ? getEmbedUrl(mod.videoUrl) : '';

            // Test card
            let testHtml = '';
            if (mod.hasTest && mod.test) {
                const qCount = safeArray(mod.test.questions).length;
                testHtml = `
                    <div class="test-card">
                        <span class="card-label">📝 Module Test</span>
                        <h4 style="margin:6px 0;">${escapeHtml(mod.test.title || 'Test')}</h4>
                        <p style="font-size:0.82rem;color:var(--text-secondary);">${qCount} questions • Passing: ${mod.test.passingScore || 70}% • Time: ${mod.test.timeLimit || 15} min</p>
                        <a href="quiz.html?courseId=${COURSE_ID}&moduleId=${mod.id}&type=test" class="btn btn-gold btn-sm" style="margin-top:8px;">📝 Take Test</a>
                    </div>`;
            }

            // Exam card (only on last module)
            let examHtml = '';
            if (isLastModule && mod.hasExam && mod.examQuestions) {
                const eqCount = safeArray(mod.examQuestions).length;
                examHtml = `
                    <div class="exam-card">
                        <span class="card-label">📝 Final Exam</span>
                        <h4 style="margin:6px 0;">Course Final Examination</h4>
                        <p style="font-size:0.82rem;color:var(--text-secondary);">${eqCount} questions • Passing: ${mod.examPassScore || 70}% • Time: ${mod.examTimeLimit || 60} min</p>
                        <a href="quiz.html?courseId=${COURSE_ID}&moduleId=${mod.id}&type=exam&mode=exam" class="btn btn-pink btn-sm" style="margin-top:8px;">📝 Take Final Exam</a>
                    </div>`;
            }

            // Project card (only on last module)
            let projectHtml = '';
            if (isLastModule && mod.hasProject && mod.project) {
                projectHtml = `
                    <div class="project-card">
                        <span class="card-label">🎯 Capstone Project</span>
                        <h4 style="margin:6px 0;">${escapeHtml(mod.project.title || 'Final Project')}</h4>
                        <p style="font-size:0.82rem;color:var(--text-secondary);">${escapeHtml(mod.project.description || '')}</p>
                        <p style="font-size:0.78rem;color:var(--text-muted);">Deadline: ${mod.project.deadline || 14} days after course end</p>
                        ${mod.project.rubric ? `<div style="margin-top:8px;padding:10px;background:#fff;border-radius:6px;font-size:0.8rem;"><strong>Rubric:</strong><br>${escapeHtml(mod.project.rubric)}</div>` : ''}
                    </div>`;
            }

            $('#contentArea').innerHTML = `
                <div class="card"><div class="card-body">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
                        <div>
                            <div class="module-title">${escapeHtml(mod.title || 'Module '+(index+1))}</div>
                            <div class="module-meta">
                                <span>📖 Module ${index+1} of ${total}</span>
                                <span>⏱️ ${mod.estimatedTime || 45} min</span>
                                ${isDone ? '<span class="badge badge-success">✅ Completed</span>' : ''}
                            </div>
                        </div>
                        <a href="classroom.html?courseId=${COURSE_ID}&moduleId=${mod.id}" class="btn btn-outline btn-sm">📚 Classroom</a>
                    </div>
                    ${videoUrl ? `<div class="video-wrapper"><iframe src="${videoUrl}" allowfullscreen></iframe></div>` : `<div class="video-wrapper"><div class="video-placeholder"><div style="font-size:3rem;">📺</div><p>No video</p></div></div>`}
                    ${mod.audioUrl ? `<div style="margin:12px 0;padding:12px 16px;background:#f8f7ff;border-radius:var(--radius-sm);"><span>🎤 Voice Note</span><audio controls src="${mod.audioUrl}" style="width:100%;margin-top:6px;"></audio></div>` : ''}
                    <div class="module-body">${mod.content || '<p>No content yet.</p>'}</div>
                    ${safeArray(mod.attachments).length > 0 ? `<div style="margin-top:14px;"><strong style="font-size:0.85rem;">📎 Resources</strong><div class="attachment-list">${safeArray(mod.attachments).map(a => `<a href="${a.url}" target="_blank" class="attachment-item">📄 ${escapeHtml(a.name)} (${a.size})</a>`).join('')}</div></div>` : ''}
                    ${testHtml}
                    ${examHtml}
                    ${projectHtml}
                    <div class="nav-buttons">
                        <div>${index > 0 ? `<button class="btn btn-outline" onclick="navigateToModule(${index-1})">← Previous</button>` : ''}</div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            ${!isDone ? `<button class="btn btn-success" onclick="markComplete(${mod.id}, ${index})">✅ Mark Complete</button>` : ''}
                            ${index < total - 1 ? `<button class="btn btn-primary" onclick="navigateToModule(${index+1})">Next Module →</button>` : `<a href="classroom.html?courseId=${COURSE_ID}" class="btn btn-gold">🎉 Finish Course</a>`}
                        </div>
                    </div>
                </div></div>`;
            
            const contentArea = $('#contentArea');
            if (contentArea) contentArea.scrollTop = 0;
            renderOutline();
            updateHeaderProgress();
        }

        // ============ MARK COMPLETE ============
        window.markComplete = async function(moduleId, index) {
            const mId = toNum(moduleId);
            if (completedModules.some(c => toNum(c) === mId)) {
                showToast('Already completed', 'info');
                return;
            }
            try {
                completedModules.push(mId);
                if (progressDocId) {
                    await db.collection('progress').doc(progressDocId).update({
                        completedModules,
                        lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                showToast('✅ Module completed!');
                renderModule(index);
                updateHeaderProgress();
                
                const allDone = modules.every(m => completedModules.some(c => toNum(c) === toNum(m.id)));
                if (allDone) {
                    showToast('🎉 All modules complete!', 'success');
                    try {
                        const enrollSnap = await db.collection('enrollments')
                            .where('userId','==',currentUser.uid)
                            .where('courseId','==',COURSE_ID)
                            .limit(1)
                            .get();
                        if (!enrollSnap.empty) {
                            await enrollSnap.docs[0].ref.update({
                                status: 'completed',
                                progress: 100,
                                completedAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                    } catch (e) {
                        console.error('Enrollment update error:', e);
                    }
                }
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
            }
        };

        // ============ DISCUSSION ============
        function setupDiscussionListener() {
            if (discussionListener) discussionListener();
            const mod = modules[currentModuleIndex];
            if (!mod) return;
            
            discussionListener = db.collection('courses')
                .doc(COURSE_ID)
                .collection('modules')
                .doc(String(mod.id))
                .collection('discussions')
                .orderBy('createdAt','desc')
                .onSnapshot(snap => {
                    const container = $('#discussionList');
                    if (!container) return;
                    if (snap.empty) {
                        container.innerHTML = '<div class="empty-state" style="padding:14px;"><p>No discussions yet.</p></div>';
                        return;
                    }
                    container.innerHTML = '';
                    snap.forEach(d => {
                        const m = d.data();
                        container.innerHTML += `<div class="discussion-item"><div><span class="d-user">${escapeHtml(m.userName||'User')}</span><span class="d-time">${m.createdAt?.toDate?timeAgo(m.createdAt.toDate()):''}</span></div><div class="d-text">${escapeHtml(m.message)}</div></div>`;
                    });
                }, (error) => {
                    console.error('Discussion listener error:', error);
                });
        }

        window.sendDiscussion = async function() {
            const input = $('#discussionInput');
            if (!input) return;
            const msg = input.value.trim();
            if (!msg) return;
            const mod = modules[currentModuleIndex];
            if (!mod) return;
            try {
                await db.collection('courses')
                    .doc(COURSE_ID)
                    .collection('modules')
                    .doc(String(mod.id))
                    .collection('discussions')
                    .add({
                        userId: currentUser.uid,
                        userName: currentUser.displayName || 'Student',
                        message: msg,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                input.value = '';
                showToast('Message sent!');
            } catch (e) {
                showToast('Error sending message', 'error');
            }
        };

        function setupSidebarTabs() {
            document.querySelectorAll('.sidebar-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
                    const panel = document.getElementById('panel-' + tab.dataset.tab);
                    if (panel) panel.classList.add('active');
                });
            });
        }

        console.log('✅ Learn Page v2 Ready — Outline visible, Tests/Exams/Projects rendered');
    })();
    </script>
</body>
</html>
