<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Learn — TRIANGLE LEARN</title>
    <meta name="description" content="Learn your course. Watch videos, take notes, and track your progress.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f8;
            --bg-card: #ffffff;
            --bg-alt: #f8f9fc;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --cyan: #00c4cc;
            --green: #0d9488;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #e8ecf2;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.08);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --header-height: 64px;
            --sidebar-width: 320px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* ===== HEADER ===== */
        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            padding: 0 24px;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }
        .header .left { display: flex; align-items: center; gap: 12px; }
        .header h1 { font-family: var(--font-heading); font-size: 1rem; font-weight: 700; }
        .header h1 small { font-weight: 400; font-size: 0.75rem; color: var(--text-muted); }
        .header .right { display: flex; align-items: center; gap: 12px; }
        .header .right .progress-text { font-size: 0.78rem; color: var(--text-muted); }
        .progress-bar-header {
            width: 100px; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden;
        }
        .progress-bar-header .fill {
            height: 100%; background: var(--gradient); transition: width 0.5s;
        }

        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
            border-radius: 20px; font-weight: 600; font-size: 0.78rem; cursor: pointer;
            border: none; font-family: var(--font-body); text-decoration: none;
            transition: all 0.3s; white-space: nowrap;
        }
        .btn-sm { padding: 4px 12px; font-size: 0.7rem; }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(232,67,147,0.25); }
        .btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
        .btn-outline:hover { border-color: var(--purple); color: var(--purple); }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,148,136,0.3); }
        .btn-gold { background: var(--gold); color: #fff; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(240,165,0,0.3); }

        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.65rem; font-weight: 600;
        }
        .badge-success { background: #e8f8f0; color: var(--green); }
        .badge-warning { background: #fff8e6; color: #d97706; }
        .badge-info { background: #eff6ff; color: #3b82f6; }
        .badge-gold { background: #fff8e8; color: var(--gold); }

        /* ===== MAIN LAYOUT ===== */
        .learn-container {
            display: flex;
            flex: 1;
            height: calc(100vh - var(--header-height));
            overflow: hidden;
        }

        /* ===== CONTENT AREA ===== */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            background: var(--bg);
        }

        /* ===== SIDEBAR ===== */
        .sidebar-right {
            width: var(--sidebar-width);
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-tab {
            flex: 1;
            padding: 10px 12px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: var(--font-body);
            color: var(--text-muted);
        }
        .sidebar-tab:hover { color: var(--text); }
        .sidebar-tab.active {
            color: var(--purple);
            border-bottom-color: var(--purple);
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .sidebar-panel { display: none; }
        .sidebar-panel.active { display: block; }

        /* ===== VIDEO PLAYER ===== */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: var(--radius-md);
            background: #0c0c1a;
            margin-bottom: 20px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-wrapper .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #888;
        }
        .video-wrapper .video-placeholder .icon { font-size: 4rem; margin-bottom: 12px; }

        /* ===== MODULE CONTENT ===== */
        .module-title {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .module-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .module-body {
            line-height: 1.8;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        .module-body h2 { font-family: var(--font-heading); font-size: 1.3rem; margin: 16px 0 8px; color: var(--text); }
        .module-body h3 { font-family: var(--font-heading); font-size: 1.05rem; margin: 14px 0 6px; color: var(--text); }
        .module-body ul, .module-body ol { margin: 8px 0 8px 24px; }
        .module-body blockquote {
            border-left: 4px solid var(--purple);
            padding: 8px 16px;
            margin: 16px 0;
            background: #f8f7ff;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }

        /* ===== ATTACHMENTS ===== */
        .attachment-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .attachment-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: #f3f0ff;
            border: 1px solid #d8d0f0;
            border-radius: 16px;
            font-size: 0.78rem;
            font-weight: 500;
            text-decoration: none;
            color: var(--purple);
            transition: all 0.2s;
        }
        .attachment-item:hover { background: #e8e0ff; transform: translateY(-1px); }

        /* ===== NAVIGATION BUTTONS ===== */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }

        /* ===== NOTES ===== */
        .notes-editor {
            width: 100%;
            min-height: 120px;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.85rem;
            outline: none;
            resize: vertical;
            transition: border 0.2s;
            background: #fff;
            color: var(--text);
        }
        .notes-editor:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(108,92,231,0.08); }

        /* ===== DISCUSSION ===== */
        .discussion-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .discussion-item .d-user {
            font-weight: 600;
            font-size: 0.82rem;
        }
        .discussion-item .d-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-left: 8px;
        }
        .discussion-item .d-text {
            font-size: 0.85rem;
            margin-top: 2px;
        }
        .discussion-input-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .discussion-input-group input {
            flex: 1;
            padding: 8px 14px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            outline: none;
            transition: border 0.2s;
        }
        .discussion-input-group input:focus { border-color: var(--purple); }

        /* ===== PROGRESS ===== */
        .progress-section {
            margin-bottom: 16px;
        }
        .progress-section .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .progress-section .progress-track {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .progress-section .progress-track .fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 8px;
            transition: width 0.8s ease;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .empty-state h3 { font-weight: 600; font-size: 0.95rem; color: var(--text); margin-bottom: 4px; }
        .empty-state p { font-size: 0.82rem; }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 400px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .toast-success { background: var(--green); }
        .toast-error { background: #e74c3c; }
        .toast-info { background: var(--purple); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .toast .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar-right { width: 280px; }
            .content-area { padding: 20px; }
        }
        @media (max-width: 768px) {
            .learn-container { flex-direction: column; height: auto; overflow: visible; }
            .content-area { padding: 16px; min-height: 60vh; }
            .sidebar-right {
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 400px;
            }
            .header { padding: 0 16px; flex-wrap: wrap; height: auto; min-height: var(--header-height); gap: 8px; }
            .header h1 { font-size: 0.85rem; }
            .progress-bar-header { width: 60px; }
            .module-title { font-size: 1.1rem; }
            .nav-buttons .btn { flex: 1; justify-content: center; }
            .toast-container { right: 16px; bottom: 16px; left: 16px; max-width: none; }
            .discussion-input-group { flex-wrap: wrap; }
            .discussion-input-group input { flex: 1 1 100%; }
        }
        @media (max-width: 480px) {
            .header .right .progress-text { display: none; }
            .module-meta { font-size: 0.7rem; gap: 10px; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="left">
            <a href="dashboard.html" class="btn btn-outline btn-sm">← Dashboard</a>
            <h1 id="courseTitle">Course Name <small id="courseStage">Elementary</small></h1>
        </div>
        <div class="right">
            <span class="progress-text" id="progressText">0%</span>
            <div class="progress-bar-header">
                <div class="fill" id="headerProgress" style="width:0%;"></div>
            </div>
            <a href="classroom.html?courseId=" class="btn btn-primary btn-sm" id="classroomBtn">📚 Classroom</a>
        </div>
    </header>

    <!-- ===== MAIN ===== -->
    <div class="learn-container">

        <!-- CONTENT AREA -->
        <div class="content-area" id="contentArea">
            <!-- Dynamic content -->
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar-right">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="notes">📝 Notes</button>
                <button class="sidebar-tab" data-tab="discussion">💬 Discussion</button>
                <button class="sidebar-tab" data-tab="progress">📊 Progress</button>
            </div>
            <div class="sidebar-content">
                <!-- Notes Panel -->
                <div class="sidebar-panel active" id="panel-notes">
                    <div style="margin-bottom:12px;">
                        <span style="font-weight:600;font-size:0.85rem;">📝 Your Notes</span>
                        <p style="font-size:0.7rem;color:var(--text-muted);">Save notes for this module. They're private to you.</p>
                    </div>
                    <textarea class="notes-editor" id="notesEditor" placeholder="Write your notes here..."></textarea>
                    <button class="btn btn-primary btn-sm" onclick="saveNotes()" style="margin-top:8px;width:100%;justify-content:center;">💾 Save Notes</button>
                </div>

                <!-- Discussion Panel -->
                <div class="sidebar-panel" id="panel-discussion">
                    <div style="margin-bottom:12px;">
                        <span style="font-weight:600;font-size:0.85rem;">💬 Discussion</span>
                        <p style="font-size:0.7rem;color:var(--text-muted);">Ask questions and interact with other students.</p>
                    </div>
                    <div id="discussionList">
                        <div class="empty-state" style="padding:16px;">
                            <p style="font-size:0.82rem;">No discussions yet. Start the conversation!</p>
                        </div>
                    </div>
                    <div class="discussion-input-group">
                        <input type="text" id="discussionInput" placeholder="Write a message...">
                        <button class="btn btn-primary btn-sm" onclick="sendDiscussion()">Send</button>
                    </div>
                </div>

                <!-- Progress Panel -->
                <div class="sidebar-panel" id="panel-progress">
                    <div style="margin-bottom:12px;">
                        <span style="font-weight:600;font-size:0.85rem;">📊 Your Progress</span>
                    </div>
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>Course Progress</span>
                            <span id="courseProgressPercent">0%</span>
                        </div>
                        <div class="progress-track">
                            <div class="fill" id="courseProgressFill" style="width:0%;"></div>
                        </div>
                    </div>
                    <div id="moduleProgressList">
                        <div class="empty-state" style="padding:12px;">
                            <p style="font-size:0.82rem;">Loading modules...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        'use strict';

        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== STATE ====================
        const urlParams = new URLSearchParams(window.location.search);
        const COURSE_ID = urlParams.get('courseId');
        const MODULE_ID = urlParams.get('moduleId');
        let currentUser = null;
        let courseData = null;
        let modules = [];
        let currentModuleIndex = 0;
        let completedModules = [];
        let notesData = {};
        let discussionListener = null;

        // ==================== DOM REFS ====================
        const contentArea = document.getElementById('contentArea');
        const courseTitle = document.getElementById('courseTitle');
        const courseStage = document.getElementById('courseStage');
        const headerProgress = document.getElementById('headerProgress');
        const progressText = document.getElementById('progressText');
        const classroomBtn = document.getElementById('classroomBtn');

        // ==================== AUTH ====================
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'auth.html'; return; }
            currentUser = user;
            if (!COURSE_ID) {
                contentArea.innerHTML = `
                    <div class="card"><div class="empty-state">
                        <div class="icon">❌</div>
                        <h3>No Course Selected</h3>
                        <p>Please select a course from your dashboard.</p>
                        <a href="dashboard.html" class="btn btn-primary" style="margin-top:12px;">Go to Dashboard</a>
                    </div></div>`;
                return;
            }
            classroomBtn.href = `classroom.html?courseId=${COURSE_ID}`;
            await loadCourse(COURSE_ID);
            setupSidebarTabs();
        });

        // ==================== LOAD COURSE ====================
        async function loadCourse(courseId) {
            try {
                const doc = await db.collection('courses').doc(courseId).get();
                if (!doc.exists) {
                    contentArea.innerHTML = `
                        <div class="card"><div class="empty-state">
                            <div class="icon">📚</div>
                            <h3>Course Not Found</h3>
                            <p>The course you're looking for doesn't exist.</p>
                            <a href="dashboard.html" class="btn btn-primary" style="margin-top:12px;">Go to Dashboard</a>
                        </div></div>`;
                    return;
                }
                courseData = { id: doc.id, ...doc.data() };
                courseTitle.textContent = courseData.name || 'Course';
                courseStage.textContent = courseData.stage || 'Elementary';

                modules = courseData.modules || [];

                // Load completed modules
                await loadProgress();

                // Determine which module to show
                if (MODULE_ID) {
                    const idx = modules.findIndex(m => m.id === MODULE_ID);
                    if (idx !== -1) currentModuleIndex = idx;
                } else {
                    // Find first incomplete module
                    const incompleteIdx = modules.findIndex(m => !completedModules.includes(m.id));
                    currentModuleIndex = incompleteIdx !== -1 ? incompleteIdx : 0;
                }

                // Load notes
                await loadNotes();

                renderModule(currentModuleIndex);
                renderProgressList();
                updateHeaderProgress();

                // Setup discussion listener
                setupDiscussionListener();

            } catch (err) {
                console.error('Load course error:', err);
                contentArea.innerHTML = `
                    <div class="card"><div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h3>Error Loading Course</h3>
                        <p>${err.message}</p>
                        <button class="btn btn-primary" onclick="location.reload()" style="margin-top:12px;">Retry</button>
                    </div></div>`;
            }
        }

        // ==================== LOAD PROGRESS ====================
        async function loadProgress() {
            try {
                const snap = await db.collection('progress')
                    .where('userId', '==', currentUser.uid)
                    .where('courseId', '==', COURSE_ID)
                    .limit(1)
                    .get();

                if (!snap.empty) {
                    const data = snap.docs[0].data();
                    completedModules = data.completedModules || [];
                } else {
                    // Create progress document
                    await db.collection('progress').add({
                        userId: currentUser.uid,
                        courseId: COURSE_ID,
                        completedModules: [],
                        startedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    completedModules = [];
                }
            } catch (err) {
                console.error('Load progress error:', err);
                completedModules = [];
            }
        }

        // ==================== LOAD NOTES ====================
        async function loadNotes() {
            try {
                const snap = await db.collection('notes')
                    .where('userId', '==', currentUser.uid)
                    .where('courseId', '==', COURSE_ID)
                    .get();

                notesData = {};
                snap.forEach(doc => {
                    const data = doc.data();
                    notesData[data.moduleId] = { id: doc.id, content: data.content || '' };
                });

                // If current module has notes, display them
                const currentModule = modules[currentModuleIndex];
                if (currentModule && notesData[currentModule.id]) {
                    document.getElementById('notesEditor').value = notesData[currentModule.id].content || '';
                } else {
                    document.getElementById('notesEditor').value = '';
                }
            } catch (err) {
                console.error('Load notes error:', err);
            }
        }

        // ==================== SAVE NOTES ====================
        window.saveNotes = async function() {
            const content = document.getElementById('notesEditor').value;
            const moduleId = modules[currentModuleIndex]?.id;
            if (!moduleId) return;

            try {
                if (notesData[moduleId]) {
                    await db.collection('notes').doc(notesData[moduleId].id).update({
                        content: content,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    const ref = await db.collection('notes').add({
                        userId: currentUser.uid,
                        courseId: COURSE_ID,
                        moduleId: moduleId,
                        content: content,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    notesData[moduleId] = { id: ref.id, content: content };
                }
                showToast('✅ Notes saved!', 'success');
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        };

        // ==================== RENDER MODULE ====================
        function renderModule(index) {
            const module = modules[index];
            if (!module) {
                // All modules completed!
                contentArea.innerHTML = `
                    <div class="card">
                        <div class="card-body" style="text-align:center;padding:40px;">
                            <div style="font-size:4rem;margin-bottom:12px;">🎉</div>
                            <h2 style="font-family:var(--font-heading);">All Modules Complete!</h2>
                            <p style="color:var(--text-secondary);margin:8px 0 16px;">
                                You've completed all ${modules.length} modules in this course.
                            </p>
                            <a href="classroom.html?courseId=${COURSE_ID}" class="btn btn-gold">
                                📚 Go to Classroom
                            </a>
                            <a href="certificate.html?courseId=${COURSE_ID}" class="btn btn-primary" style="margin-left:8px;">
                                📜 View Certificate
                            </a>
                        </div>
                    </div>
                `;
                return;
            }

            const isDone = completedModules.includes(module.id);
            const isLocked = index > 0 && !completedModules.includes(modules[index-1]?.id);
            const total = modules.length;
            const done = completedModules.length;

            if (isLocked) {
                contentArea.innerHTML = `
                    <div class="card"><div class="empty-state">
                        <div class="icon">🔒</div>
                        <h3>Module Locked</h3>
                        <p>Complete the previous module first.</p>
                        <button class="btn btn-primary" onclick="renderModule(${index - 1})">← Go to Previous Module</button>
                    </div></div>`;
                return;
            }

            // Update notes editor
            document.getElementById('notesEditor').value = notesData[module.id]?.content || '';

            // Get embed URL for video
            const videoUrl = module.videoUrl ? getEmbedUrl(module.videoUrl) : '';

            contentArea.innerHTML = `
                <div class="card">
                    <div class="card-body">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
                            <div>
                                <div class="module-title">${module.title || 'Module ' + (index+1)}</div>
                                <div class="module-meta">
                                    <span>📖 Module ${index + 1} of ${total}</span>
                                    <span>⏱️ ${module.estimatedTime || 45} min</span>
                                    ${isDone ? '<span class="badge badge-success">✅ Completed</span>' : ''}
                                </div>
                            </div>
                            <div>
                                <a href="classroom.html?courseId=${COURSE_ID}&moduleId=${module.id}" class="btn btn-outline btn-sm">
                                    📚 Open in Classroom
                                </a>
                            </div>
                        </div>

                        ${videoUrl ? `
                            <div class="video-wrapper">
                                <iframe src="${videoUrl}" allowfullscreen></iframe>
                            </div>
                        ` : `
                            <div class="video-wrapper">
                                <div class="video-placeholder">
                                    <div class="icon">📺</div>
                                    <p>No video for this module</p>
                                </div>
                            </div>
                        `}

                        ${module.audioUrl ? `
                            <div style="margin:12px 0;padding:12px 16px;background:#f8f7ff;border-radius:var(--radius-sm);">
                                <span>🎤 Voice Note</span>
                                <audio controls src="${module.audioUrl}" style="width:100%;margin-top:6px;"></audio>
                            </div>
                        ` : ''}

                        <div class="module-body">${module.content || '<p>No content yet.</p>'}</div>

                        ${module.attachments && module.attachments.length > 0 ? `
                            <div style="margin-top:16px;">
                                <div style="font-weight:600;font-size:0.82rem;margin-bottom:8px;">📎 Resources</div>
                                <div class="attachment-list">
                                    ${module.attachments.map(a => `
                                        <a href="${a.url}" target="_blank" class="attachment-item">
                                            📄 ${a.name} (${a.size})
                                        </a>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${module.hasTest ? `
                            <div style="margin-top:16px;padding:12px 16px;background:#fff8e8;border-radius:var(--radius-sm);border:1px solid #ffe0b2;">
                                <span style="font-weight:600;font-size:0.85rem;">❓ Test Available</span>
                                <p style="font-size:0.78rem;color:var(--text-secondary);">Complete this module to take the test.</p>
                                <a href="quiz.html?id=${module.testId}&courseId=${COURSE_ID}" class="btn btn-primary btn-sm" style="margin-top:6px;">
                                    📝 Take Test
                                </a>
                            </div>
                        ` : ''}

                        <div class="nav-buttons">
                            <div>
                                ${index > 0 ? `
                                    <button class="btn btn-outline" onclick="renderModule(${index - 1})">← Previous</button>
                                ` : ''}
                            </div>
                            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                                ${!isDone ? `
                                    <button class="btn btn-success" onclick="markComplete('${module.id}')">
                                        ✅ Mark as Complete
                                    </button>
                                ` : ''}
                                ${index < total - 1 ? `
                                    <button class="btn btn-primary" onclick="renderModule(${index + 1})">
                                        Next Module →
                                    </button>
                                ` : `
                                    <a href="classroom.html?courseId=${COURSE_ID}" class="btn btn-gold">
                                        🎉 Finish Course
                                    </a>
                                `}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Update progress
            updateHeaderProgress();
            renderProgressList();

            // Scroll to top
            document.querySelector('.content-area').scrollTop = 0;
        }

        // ==================== MARK COMPLETE ====================
        window.markComplete = async function(moduleId) {
            if (completedModules.includes(moduleId)) return;

            try {
                completedModules.push(moduleId);

                const snap = await db.collection('progress')
                    .where('userId', '==', currentUser.uid)
                    .where('courseId', '==', COURSE_ID)
                    .limit(1)
                    .get();

                if (!snap.empty) {
                    await snap.docs[0].ref.update({
                        completedModules: completedModules,
                        lastAccessed: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                showToast('✅ Module completed!', 'success');
                renderModule(currentModuleIndex);
                renderProgressList();
                updateHeaderProgress();

                // Check if all modules are complete
                if (completedModules.length === modules.length) {
                    showToast('🎉 Congratulations! You\'ve completed all modules!', 'success');
                }

            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        };

        // ==================== UPDATE HEADER PROGRESS ====================
        function updateHeaderProgress() {
            const total = modules.length;
            const done = completedModules.length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            headerProgress.style.width = pct + '%';
            progressText.textContent = pct + '%';
            document.getElementById('courseProgressPercent').textContent = pct + '%';
            document.getElementById('courseProgressFill').style.width = pct + '%';
        }

        // ==================== RENDER PROGRESS LIST ====================
        function renderProgressList() {
            const container = document.getElementById('moduleProgressList');
            if (modules.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding:12px;">
                        <p style="font-size:0.82rem;">No modules yet.</p>
                    </div>`;
                return;
            }

            container.innerHTML = modules.map((m, i) => {
                const isDone = completedModules.includes(m.id);
                const isActive = i === currentModuleIndex;
                return `
                    <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);${isActive ? 'background:var(--bg-alt);border-radius:6px;padding:6px 10px;' : ''}">
                        <span style="font-size:0.9rem;">${isDone ? '✅' : (i === currentModuleIndex ? '▶️' : '⏳')}</span>
                        <div style="flex:1;font-size:0.78rem;${isDone ? 'color:var(--green);' : ''}">
                            ${m.title || 'Module ' + (i+1)}
                        </div>
                        ${isDone ? '<span class="badge badge-success">Done</span>' : (i === currentModuleIndex ? '<span class="badge badge-info">Current</span>' : '')}
                    </div>
                `;
            }).join('');
        }

        // ==================== DISCUSSION ====================
        function setupDiscussionListener() {
            if (discussionListener) discussionListener();

            const moduleId = modules[currentModuleIndex]?.id;
            if (!moduleId) return;

            discussionListener = db.collection('courses')
                .doc(COURSE_ID)
                .collection('modules')
                .doc(moduleId)
                .collection('discussions')
                .orderBy('createdAt', 'desc')
                .onSnapshot((snapshot) => {
                    const container = document.getElementById('discussionList');
                    if (snapshot.empty) {
                        container.innerHTML = `
                            <div class="empty-state" style="padding:16px;">
                                <p style="font-size:0.82rem;">No discussions yet. Start the conversation!</p>
                            </div>`;
                        return;
                    }

                    container.innerHTML = '';
                    snapshot.forEach(doc => {
                        const d = doc.data();
                        container.innerHTML += `
                            <div class="discussion-item">
                                <div>
                                    <span class="d-user">${d.userName || 'User'}</span>
                                    <span class="d-time">${d.createdAt?.toDate ? timeAgo(d.createdAt.toDate()) : ''}</span>
                                </div>
                                <div class="d-text">${d.message}</div>
                                ${d.voiceUrl ? `<audio controls src="${d.voiceUrl}" style="height:30px;margin-top:4px;"></audio>` : ''}
                            </div>
                        `;
                    });
                }, (error) => {
                    console.error('Discussion listener error:', error);
                });
        }

        window.sendDiscussion = async function() {
            const input = document.getElementById('discussionInput');
            const msg = input.value.trim();
            if (!msg) return;

            const moduleId = modules[currentModuleIndex]?.id;
            if (!moduleId) return;

            try {
                await db.collection('courses')
                    .doc(COURSE_ID)
                    .collection('modules')
                    .doc(moduleId)
                    .collection('discussions')
                    .add({
                        userId: currentUser.uid,
                        userName: currentUser.displayName || 'User',
                        message: msg,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                input.value = '';
                showToast('Message sent!', 'success');
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        };

        // ==================== SIDEBAR TABS ====================
        function setupSidebarTabs() {
            document.querySelectorAll('.sidebar-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
                    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
                });
            });
        }

        // ==================== UTILITY ====================
        function getEmbedUrl(url) {
            if (!url) return '';
            const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
            if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}`;
            const vmMatch = url.match(/vimeo\.com\/(\d+)/);
            if (vmMatch) return `https://player.vimeo.com/video/${vmMatch[1]}`;
            return url;
        }

        function timeAgo(date) {
            const diff = Math.floor((Date.now() - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
            return date.toDateString();
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.innerHTML = `
                <span>${icons[type] || '📢'}</span>
                <span>${message}</span>
                <button class="toast-close" onclick="this.closest('.toast').remove()">✕</button>
            `;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4000);
        }

        console.log('✅ Learn page loaded');
    })();
    </script>
</body>
</html>
