<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRIANGLE LEARN — Master Tech Skills. Join the Batch. Get Certified.</title>
    <meta name="description" content="Structured 3-stage cohort-based tech courses. Learn Vibe Coding, Web Dev, UI/UX Design & Software Engineering. Join Africa's next generation of builders.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <meta property="og:title" content="TRIANGLE LEARN — Master Tech Skills. Join the Batch. Get Certified.">
    <meta property="og:description" content="Structured 3-stage tech courses. Learn with a community. Earn certificates.">
    <meta property="og:image" content="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... (all existing CSS unchanged) ... */
        :root {
            --bg: #ffffff;
            --bg-alt: #f8f9fc;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --cyan: #00c4cc;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #eef0f5;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.08);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; -webkit-text-size-adjust: 100%; scroll-padding-top: 80px; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            max-width: 100vw;
        }
        /* ... all other CSS rules exactly as provided ... */
    </style>
</head>
<body>
    <!-- ... (all existing HTML unchanged) ... -->

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        'use strict';

        // ============ FIREBASE INITIALIZATION ============
        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============ APP STATE ============
        const AppState = {
            firestoreReady: true,
            db: db,
            activeListeners: [],
            heroIntervalId: null,
        };

        // ... (rest of the JS code unchanged, but remove the old initFirestore function and the polling logic.
        // Replace all references to `AppState.firestoreReady` checks with direct `true`.
        // Keep the rest of the script identical to the original version, but with the corrected Firebase initialization.
        // Specifically, remove the old initFirestore function and the polling block.
        // The loadDynamicContent function can directly use AppState.db.
        
        // ============ DOM REFS ============
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const DOM = {
            preloader: $('#preloader'),
            header: $('#header'),
            hamburger: $('#hamburger'),
            mobileNav: $('#mobileNav'),
            mobileOverlay: $('#mobileOverlay'),
            navLinks: $('#navLinks'),
            heroGrid: $('#heroGrid'),
            heroCaption: $('#heroCaption'),
            announceTrack: $('#announceTrack'),
            batchBadge: $('#batchBadge'),
            spotsBadge: $('#spotsBadge'),
            spotsText: $('#spotsText'),
            statLearners: $('#statLearners'),
            coursesGrid: $('#coursesGrid'),
            pricingGrid: $('#pricingGrid'),
            blogGrid: $('#blogGrid'),
            communityLink: $('#communityLink'),
            footerCommunity: $('#footerCommunity'),
            footerLinkedin: $('#footerLinkedin'),
            enquiryCard: $('#enquiryCard'),
            emergencyCard: $('#emergencyCard'),
            enquiryBubble: $('#enquiryBubble'),
            emergencyBubble: $('#emergencyBubble'),
        };

        // ============ PRELOADER ============
        function hidePreloader() {
            DOM.preloader.classList.add('hidden');
            setTimeout(() => {
                if (DOM.preloader.parentNode) {
                    DOM.preloader.remove();
                }
            }, 500);
        }

        window.addEventListener('load', () => {
            setTimeout(hidePreloader, 1500);
        });

        setTimeout(() => {
            if (!DOM.preloader.classList.contains('hidden')) {
                hidePreloader();
            }
        }, 4000);

        // ============ MOBILE NAVIGATION ============
        function openMobileNav() {
            DOM.mobileNav.classList.add('open');
            DOM.mobileOverlay.classList.add('open');
            DOM.hamburger.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileNav() {
            DOM.mobileNav.classList.remove('open');
            DOM.mobileOverlay.classList.remove('open');
            DOM.hamburger.classList.remove('open');
            document.body.style.overflow = '';
        }

        DOM.hamburger.addEventListener('click', () => {
            if (DOM.mobileNav.classList.contains('open')) {
                closeMobileNav();
            } else {
                openMobileNav();
            }
        });

        DOM.mobileOverlay.addEventListener('click', closeMobileNav);

        DOM.mobileNav.querySelectorAll('a[data-nav]').forEach(link => {
            link.addEventListener('click', closeMobileNav);
        });

        // ============ HEADER SCROLL EFFECT ============
        let scrollTicking = false;
        window.addEventListener('scroll', () => {
            if (!scrollTicking) {
                requestAnimationFrame(() => {
                    const scrolled = window.scrollY > 40;
                    DOM.header.classList.toggle('scrolled', scrolled);
                    updateActiveNavLink();
                    scrollTicking = false;
                });
                scrollTicking = true;
            }
        });

        // ============ ACTIVE NAV LINK HIGHLIGHTING ============
        function updateActiveNavLink() {
            const sections = $$('section[id]');
            const scrollPos = window.scrollY + 100;

            let currentSection = '';
            sections.forEach(section => {
                const top = section.offsetTop;
                if (scrollPos >= top) {
                    currentSection = section.getAttribute('id');
                }
            });

            $$('a[data-nav]').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#${currentSection}`) {
                    link.classList.add('active');
                }
            });
        }

        // ============ FAQ ACCORDION ============
        const faqContainer = $('#faqContainer');
        if (faqContainer) {
            faqContainer.addEventListener('click', (e) => {
                const faqItem = e.target.closest('.faq-item');
                if (!faqItem) return;
                const wasOpen = faqItem.classList.contains('open');
                faqContainer.querySelectorAll('.faq-item').forEach(item => item.classList.remove('open'));
                if (!wasOpen) faqItem.classList.add('open');
            });
        }

        // ============ FLOATING CONTACTS ============
        let openFloat = null;

        function closeAllFloats() {
            DOM.enquiryCard.classList.remove('show');
            DOM.emergencyCard.classList.remove('show');
            openFloat = null;
        }

        DOM.enquiryBubble.addEventListener('click', (e) => {
            e.stopPropagation();
            if (openFloat === 'enquiry') {
                closeAllFloats();
            } else {
                closeAllFloats();
                DOM.enquiryCard.classList.add('show');
                openFloat = 'enquiry';
            }
        });

        DOM.emergencyBubble.addEventListener('click', (e) => {
            e.stopPropagation();
            if (openFloat === 'emergency') {
                closeAllFloats();
            } else {
                closeAllFloats();
                DOM.emergencyCard.classList.add('show');
                openFloat = 'emergency';
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.float-ct')) {
                closeAllFloats();
            }
        });

        // ============ HERO POPUP ANIMATION ============
        const heroImages = [
            'https://res.cloudinary.com/dmbjrohtn/image/upload/v1781347735/website-template_1346434-683_gbkoiw.jpg',
            'https://res.cloudinary.com/dmbjrohtn/image/upload/v1781347735/cyber-security-and-security-password-login-online-concept-hands-typing-and-touch-id-username-and-password-of-social-media-log-in-with-computer-to-online-important-information-data-protection-hacker-photo_v4hioy.jpg',
            'https://res.cloudinary.com/dmbjrohtn/image/upload/v1781347735/build-1_zngszv.webp',
            'https://res.cloudinary.com/dmbjrohtn/image/upload/v1781347735/two-data-analysts-working-on-data-analysis-dashboard-for-business-strategy_vn9wrl.jpg',
            'https://res.cloudinary.com/dmbjrohtn/image/upload/v1781363241/1b5e0d6f-cbe3-4158-a73e-479865da04f9_vuadox.jpg'
        ];
        const captions = [
            'Enroll Now — Start Learning',
            'Login Now — Continue Your Journey',
            'Build Real Projects',
            'Earn Shareable Certificates',
            'Join a Community of Builders'
        ];
        let capIdx = 0;

        function animateHeroPopup() {
            if (!DOM.heroGrid) return;
            const existing = DOM.heroGrid.querySelector('.hero-popup');
            if (existing) existing.remove();

            const popup = document.createElement('div');
            popup.className = 'hero-popup';
            const img = document.createElement('img');
            img.src = heroImages[capIdx];
            img.alt = 'Featured';
            img.width = 300;
            img.height = 225;
            popup.appendChild(img);
            popup.style.top = '50%';
            popup.style.left = '50%';
            DOM.heroGrid.style.position = 'relative';
            DOM.heroGrid.appendChild(popup);

            DOM.heroCaption.querySelector('span').textContent = captions[capIdx];
            DOM.heroCaption.style.opacity = '1';
            setTimeout(() => { DOM.heroCaption.style.opacity = '0'; }, 3000);

            setTimeout(() => {
                if (popup.parentNode) popup.remove();
            }, 4100);

            capIdx = (capIdx + 1) % heroImages.length;
        }

        animateHeroPopup();
        AppState.heroIntervalId = setInterval(animateHeroPopup, 4500);

        // ============ SKELETON LOADERS ============
        function showSkeleton(container, count, type) {
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                if (type === 'card') {
                    div.className = 'skeleton skeleton-card';
                } else if (type === 'text') {
                    div.className = 'skeleton skeleton-text';
                }
                container.appendChild(div);
            }
        }

        function showError(container, message, retryFn) {
            if (!container) return;
            container.innerHTML = `
                <div class="error-state">
                    <p>${message || 'Failed to load content.'}</p>
                    ${retryFn ? '<button class="btn btn-ghost" onclick="(' + retryFn.toString() + ')()">Retry</button>' : ''}
                </div>`;
        }

        // ============ FIRESTORE: REAL-TIME LISTENERS ============
        function setupRealTimeListeners() {
            if (!AppState.db) return;

            try {
                const statsUnsubscribe = AppState.db.collection('settings').doc('stats')
                    .onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (DOM.statLearners && data.totalLearners) {
                                animateNumber(DOM.statLearners, data.totalLearners);
                            }
                            if (DOM.spotsBadge && data.spotsLeft !== undefined && data.spotsLeft > 0) {
                                DOM.spotsBadge.style.display = 'inline-flex';
                                DOM.spotsText.textContent = `Only ${data.spotsLeft} spots left!`;
                            } else if (DOM.spotsBadge) {
                                DOM.spotsBadge.style.display = 'none';
                            }
                        }
                    }, (error) => {
                        console.warn('Stats listener error:', error.message);
                    });
                AppState.activeListeners.push(statsUnsubscribe);
            } catch (e) {
                console.warn('Could not set up stats listener:', e.message);
            }

            try {
                const annUnsubscribe = AppState.db.collection('announcements').doc('current')
                    .onSnapshot((doc) => {
                        if (doc.exists) {
                            const ann = doc.data();
                            updateAnnouncements(ann);
                            if (DOM.batchBadge && ann.batchName) {
                                DOM.batchBadge.textContent = ann.batchName;
                            }
                        }
                    }, (error) => {
                        console.warn('Announcements listener error:', error.message);
                    });
                AppState.activeListeners.push(annUnsubscribe);
            } catch (e) {
                console.warn('Could not set up announcements listener:', e.message);
            }
        }

        function updateAnnouncements(annData) {
            if (!DOM.announceTrack) return;
            const msgs = annData.messages || ['Welcome to TRIANGLE LEARN!'];
            const trackContent = msgs.map(m => `<span>${m}</span>`).join('') +
                                 msgs.map(m => `<span>${m}</span>`).join('');
            DOM.announceTrack.innerHTML = trackContent;
        }

        function animateNumber(element, target) {
            if (!element) return;
            const current = parseInt(element.textContent.replace(/[^0-9]/g, '')) || 0;
            if (current === target) {
                element.textContent = target.toLocaleString() + '+';
                return;
            }
            const duration = 1000;
            const start = performance.now();
            const initial = current;

            function step(timestamp) {
                const elapsed = timestamp - start;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const value = Math.floor(initial + (target - initial) * eased);
                element.textContent = value.toLocaleString() + '+';
                if (progress < 1) {
                    requestAnimationFrame(step);
                }
            }
            requestAnimationFrame(step);
        }

        // ============ LOAD DYNAMIC CONTENT ============
        async function loadDynamicContent() {
            if (!AppState.db) {
                loadStaticFallbacks();
                return;
            }

            showSkeleton(DOM.coursesGrid, 4, 'card');
            showSkeleton(DOM.pricingGrid, 4, 'card');
            showSkeleton(DOM.blogGrid, 3, 'card');

            try {
                const courseSnap = await AppState.db.collection('courses').where('active', '==', true).get();
                renderCourses(courseSnap);
                renderPricing(courseSnap);

                const blogSnap = await AppState.db.collection('blog_posts')
                    .where('published', '==', true)
                    .orderBy('createdAt', 'desc')
                    .limit(3)
                    .get();
                renderBlogPosts(blogSnap);

                const setSnap = await AppState.db.collection('settings').doc('contact').get();
                if (setSnap.exists) {
                    applySettings(setSnap.data());
                }
            } catch (error) {
                console.error('Firestore load error:', error);
                loadStaticFallbacks();
            }
        }

        function renderCourses(snapshot) {
            if (!DOM.coursesGrid) return;
            DOM.coursesGrid.innerHTML = '';

            if (snapshot.empty) {
                DOM.coursesGrid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">Courses coming soon — check back shortly.</p>';
                return;
            }

            snapshot.forEach(doc => {
                const c = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="icon">${c.icon || '📘'}</div>
                    <h3>${escapeHtml(c.name)}</h3>
                    <p>${escapeHtml(c.description || '')}</p>
                    <span class="tag">${escapeHtml(c.stage || 'Course')}</span>`;
                DOM.coursesGrid.appendChild(card);
            });
        }

        function renderPricing(snapshot) {
            if (!DOM.pricingGrid) return;
            DOM.pricingGrid.innerHTML = '';

            if (snapshot.empty) {
                DOM.pricingGrid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">Pricing details coming soon.</p>';
                return;
            }

            snapshot.forEach(doc => {
                const c = doc.data();
                const card = document.createElement('div');
                card.className = 'pricing-card' + (c.isFullTrack ? ' featured' : '');
                let html = '';
                if (c.isFullTrack) html += '<span class="badge-pop">Best Value</span>';
                html += `<div class="stage-label">${escapeHtml(c.stage || 'Stage')}</div>`;
                html += `<div class="price">₦${(c.price || 0).toLocaleString()}<span>/ ${c.isFullTrack ? 'all 3' : 'stage'}</span></div>`;
                if (c.savings) html += `<span class="save-tag">Save ₦${c.savings.toLocaleString()}</span>`;
                html += `<div class="dur">${c.durationWeeks || '?'} weeks • Certificate included</div>`;
                html += `<a href="enroll.html" class="btn btn-filled" style="width:100%;justify-content:center;">Enroll Now</a>`;
                card.innerHTML = html;
                DOM.pricingGrid.appendChild(card);
            });
        }

        function renderBlogPosts(snapshot) {
            if (!DOM.blogGrid) return;
            DOM.blogGrid.innerHTML = '';

            if (snapshot.empty) {
                DOM.blogGrid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">No updates yet — stay tuned.</p>';
                return;
            }

            snapshot.forEach(doc => {
                const b = doc.data();
                const card = document.createElement('div');
                card.className = 'blog-card';
                const dateStr = b.createdAt?.toDate ? b.createdAt.toDate().toDateString() : '';
                const excerpt = b.excerpt || (b.content ? b.content.replace(/<[^>]*>/g, '').substring(0, 120) + '...' : '');
                card.innerHTML = `
                    ${b.imageUrl ? `<img src="${escapeAttr(b.imageUrl)}" alt="${escapeAttr(b.title)}" loading="lazy">` : ''}
                    <div class="blog-card-body">
                        <h3>${escapeHtml(b.title)}</h3>
                        <div class="date">${dateStr}</div>
                        <p>${escapeHtml(excerpt)}</p>
                    </div>`;
                DOM.blogGrid.appendChild(card);
            });
        }

        function applySettings(settings) {
            if (settings.communityLink) {
                if (DOM.communityLink) DOM.communityLink.href = settings.communityLink;
                if (DOM.footerCommunity) DOM.footerCommunity.href = settings.communityLink;
            }
            if (settings.linkedinUrl && DOM.footerLinkedin) {
                DOM.footerLinkedin.href = settings.linkedinUrl;
            }
        }

        function loadStaticFallbacks() {
            DOM.announceTrack.innerHTML = '<span>🚀 Welcome to TRIANGLE LEARN — Courses coming soon!</span><span>🚀 Welcome to TRIANGLE LEARN — Courses coming soon!</span>';
            if (DOM.coursesGrid) DOM.coursesGrid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">Connect Firestore to display courses. <button class="btn btn-ghost" onclick="window.retryLoad()">Retry</button></p>';
            if (DOM.pricingGrid) DOM.pricingGrid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">Connect Firestore to display pricing.</p>';
            if (DOM.blogGrid) DOM.blogGrid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">Connect Firestore to display updates.</p>';
        }

        window.retryLoad = function() {
            loadDynamicContent();
        };

        // ============ UTILITY FUNCTIONS ============
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ============ STARTUP ============
        function init() {
            loadDynamicContent();
            setupRealTimeListeners();
        }

        // ============ CLEANUP ============
        window.addEventListener('beforeunload', () => {
            AppState.activeListeners.forEach(unsubscribe => {
                if (typeof unsubscribe === 'function') {
                    try { unsubscribe(); } catch (e) { /* ignore */ }
                }
            });
            AppState.activeListeners = [];

            if (AppState.heroIntervalId) {
                clearInterval(AppState.heroIntervalId);
            }
        });

        // Start when DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
    </script>
</body>
</html>
