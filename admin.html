<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel — TRIANGLE LEARN</title>
    <meta name="description" content="Admin dashboard for TRIANGLE LEARN. Manage courses, users, enrollments, and more.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f8f9fc;
            --bg-card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #eef0f5;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.08);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --danger: #e74c3c;
            --success: #0d9488;
            --warning: #e65100;
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            display: flex;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* SKELETON LOADING */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f5 25%, #e8e8f0 50%, #f0f0f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-md);
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton-text { height: 16px; margin-bottom: 8px; border-radius: 8px; }
        .skeleton-text.short { width: 60%; }
        .skeleton-card { height: 80px; border-radius: var(--radius-md); }
        .skeleton-chart { height: 300px; border-radius: var(--radius-md); }
        .skeleton-table-row { height: 40px; margin-bottom: 10px; border-radius: var(--radius-sm); }

        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid var(--border);
            padding: 24px 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .sidebar-logo img { height: 32px; }
        .sidebar-logo span {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .sidebar-nav { list-style: none; }
        .sidebar-nav li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 20px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.88rem;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            cursor: pointer;
        }
        .sidebar-nav li a:hover,
        .sidebar-nav li a.active {
            background: #f8f7ff;
            color: var(--purple);
            border-left-color: var(--purple);
        }
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 24px 30px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .top-bar h1 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 22px;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            font-family: var(--font-body);
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(232,67,147,0.3); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
        .btn-danger { background: #fff0f0; color: var(--danger); border: 1px solid #fdd; }
        .btn-danger:hover { background: #ffe5e5; }
        .btn-sm { padding: 5px 12px; font-size: 0.72rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .stat-icon {
            width: 46px; height: 46px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .stat-icon.purple { background: #f3f0ff; }
        .stat-icon.gold { background: #fff8e8; }
        .stat-icon.pink { background: #fff0f6; }
        .stat-icon.green { background: #e8f8f0; }
        .stat-info h3 { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; }
        .stat-info p { font-size: 0.72rem; color: var(--text-muted); }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover td { background: #fafaff; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.78rem; font-weight: 600; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 0.85rem;
            outline: none; transition: border 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--purple); box-shadow: 0 0 0 3px rgba(108,92,231,0.08);
        }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 200px; }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }
        @media (max-width: 900px) {
            .charts-grid { grid-template-columns: 1fr; }
        }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        .badge {
            font-size: 0.65rem; font-weight: 700; padding: 3px 10px;
            border-radius: 12px; text-transform: uppercase;
        }
        .badge-active { background: #e8f8f0; color: var(--success); }
        .badge-pending { background: #fff8e8; color: var(--warning); }

        @media (max-width: 900px) {
            .sidebar { width: 200px; }
            .main-content { margin-left: 200px; padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            body { flex-direction: column; }
            .sidebar { position: static; width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { margin-left: 0; }
            .stats-grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="Logo">
            <span>Admin Panel</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="#dashboard" data-section="dashboard">📊 Dashboard</a></li>
            <li><a href="#courses" data-section="courses">📚 Courses</a></li>
            <li><a href="#create-course" data-section="create-course">➕ New Course</a></li>
            <li><a href="#users" data-section="users">👥 Users</a></li>
            <li><a href="#enrollments" data-section="enrollments">📝 Enrollments</a></li>
            <li><a href="#payments" data-section="payments">💳 Payments</a></li>
            <li><a href="#referrals" data-section="referrals">💰 Referrals</a></li>
            <li><a href="#announcements" data-section="announcements">📢 Announcements</a></li>
            <li><a href="#blog" data-section="blog">📝 Blog Posts</a></li>
            <li><a href="#certificates" data-section="certificates">📜 Certificates</a></li>
            <li><a href="#settings" data-section="settings">⚙️ Settings</a></li>
            <li style="margin-top:auto;"><a href="#" id="logoutBtn" style="color:var(--danger);">🚪 Logout</a></li>
        </ul>
    </aside>

    <!-- Main -->
    <main class="main-content" id="mainContent">
        <!-- Dynamic content loaded by JS -->
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== STATE ====================
        let currentUser = null;
        let isAdmin = false;

        const mainContent = document.getElementById('mainContent');

        // ==================== AUTH & ADMIN CHECK ====================
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'auth.html'; return; }
            currentUser = user;
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'admin') {
                await auth.signOut();
                window.location.href = 'auth.html';
                return;
            }
            isAdmin = true;
            initRouting();
            // Load initial section from hash or default to dashboard
            const hash = window.location.hash.substring(1) || 'dashboard';
            loadSection(hash);
        });

        // ==================== HASH ROUTING ====================
        function initRouting() {
            // Sidebar clicks
            document.querySelectorAll('.sidebar-nav a[data-section]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const section = link.dataset.section;
                    window.location.hash = section;
                });
            });

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', async (e) => {
                e.preventDefault();
                await auth.signOut();
                window.location.href = 'auth.html';
            });

            // Listen for hash changes
            window.addEventListener('hashchange', () => {
                const section = window.location.hash.substring(1) || 'dashboard';
                loadSection(section);
            });
        }

        function setActiveNav(section) {
            document.querySelectorAll('.sidebar-nav a[data-section]').forEach(a => a.classList.remove('active'));
            const activeLink = document.querySelector(`.sidebar-nav a[data-section="${section}"]`);
            if (activeLink) activeLink.classList.add('active');
        }

        function showSkeleton(type = 'generic') {
            if (type === 'dashboard') {
                mainContent.innerHTML = `
                    <div class="top-bar"><div class="skeleton skeleton-text" style="width:200px;height:28px;"></div></div>
                    <div class="stats-grid">${Array(5).fill('<div class="skeleton skeleton-card"></div>').join('')}</div>
                    <div class="charts-grid">
                        <div class="skeleton skeleton-chart"></div>
                        <div class="skeleton skeleton-chart"></div>
                    </div>`;
            } else if (type === 'table') {
                mainContent.innerHTML = `
                    <div class="top-bar"><div class="skeleton skeleton-text" style="width:180px;height:28px;"></div></div>
                    <div class="card">
                        <div class="skeleton skeleton-table-row"></div>
                        <div class="skeleton skeleton-table-row"></div>
                        <div class="skeleton skeleton-table-row"></div>
                        <div class="skeleton skeleton-table-row"></div>
                    </div>`;
            } else {
                mainContent.innerHTML = `<div class="card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>`;
            }
        }

        async function loadSection(section) {
            setActiveNav(section);
            showSkeleton(section === 'dashboard' ? 'dashboard' : 'table');

            try {
                switch (section) {
                    case 'dashboard': await renderDashboard(); break;
                    case 'courses': await renderCourses(); break;
                    case 'create-course': renderCreateCourse(); break;
                    case 'users': await renderUsers(); break;
                    case 'enrollments': await renderEnrollments(); break;
                    case 'payments': await renderPayments(); break;
                    case 'referrals': await renderReferrals(); break;
                    case 'announcements': await renderAnnouncements(); break;
                    case 'blog': await renderBlogPosts(); break;
                    case 'certificates': await renderCertificates(); break;
                    case 'settings': await renderSettings(); break;
                    default: await renderDashboard();
                }
            } catch (error) {
                mainContent.innerHTML = `<div class="card"><p style="color:var(--danger);">Error loading section: ${error.message}</p></div>`;
            }
        }

        // ==================== UTILS ====================
        function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        // ==================== DASHBOARD (with Charts) ====================
        async function renderDashboard() {
            const [usersSnap, coursesSnap, enrollSnap, paymentsSnap, refSnap] = await Promise.all([
                db.collection('users').get(),
                db.collection('courses').where('active', '==', true).get(),
                db.collection('enrollments').get(),
                db.collection('payments').get(),
                db.collection('referrals').get()
            ]);

            const totalUsers = usersSnap.size;
            const totalCourses = coursesSnap.size;
            const totalEnrollments = enrollSnap.size;
            let revenue = 0;
            paymentsSnap.forEach(doc => revenue += (doc.data().amount || 0));
            const totalReferrals = refSnap.size;

            // Enrollment data for chart
            const enrollmentCounts = {};
            enrollSnap.forEach(doc => {
                const course = doc.data().courseName || 'Unknown';
                enrollmentCounts[course] = (enrollmentCounts[course] || 0) + 1;
            });
            const courseLabels = Object.keys(enrollmentCounts);
            const courseValues = Object.values(enrollmentCounts);

            // Revenue over time (by month)
            const monthlyRevenue = {};
            paymentsSnap.forEach(doc => {
                const d = doc.data().paidAt?.toDate();
                if (d) {
                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                    monthlyRevenue[key] = (monthlyRevenue[key] || 0) + (doc.data().amount || 0);
                }
            });
            const sortedMonths = Object.keys(monthlyRevenue).sort();
            const revenueValues = sortedMonths.map(k => monthlyRevenue[k]);

            mainContent.innerHTML = `
                <div class="top-bar"><h1>Admin Dashboard</h1><span style="color:var(--text-muted);">Welcome, ${escapeHtml(currentUser.email)}</span></div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon purple">👥</div><div class="stat-info"><h3>${totalUsers}</h3><p>Total Users</p></div></div>
                    <div class="stat-card"><div class="stat-icon gold">📚</div><div class="stat-info"><h3>${totalCourses}</h3><p>Active Courses</p></div></div>
                    <div class="stat-card"><div class="stat-icon pink">📝</div><div class="stat-info"><h3>${totalEnrollments}</h3><p>Enrollments</p></div></div>
                    <div class="stat-card"><div class="stat-icon green">💰</div><div class="stat-info"><h3>${formatCurrency(revenue)}</h3><p>Total Revenue</p></div></div>
                    <div class="stat-card"><div class="stat-icon purple">🔗</div><div class="stat-info"><h3>${totalReferrals}</h3><p>Referral Clicks</p></div></div>
                </div>

                <div class="charts-grid">
                    <div class="card">
                        <h3 style="margin-bottom:12px;">Enrollments per Course</h3>
                        <canvas id="enrollmentChart" height="250"></canvas>
                    </div>
                    <div class="card">
                        <h3 style="margin-bottom:12px;">Monthly Revenue (₦)</h3>
                        <canvas id="revenueChart" height="250"></canvas>
                    </div>
                </div>

                <div class="card"><h3>Quick Actions</h3><div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="window.location.hash='courses'">Manage Courses</button>
                    <button class="btn btn-outline" onclick="window.location.hash='create-course'">+ New Course</button>
                    <button class="btn btn-outline" onclick="window.location.hash='announcements'">Announcements</button>
                    <button class="btn btn-outline" onclick="window.location.hash='settings'">Site Settings</button>
                </div></div>`;

            // Render charts
            if (courseLabels.length > 0) {
                new Chart(document.getElementById('enrollmentChart'), {
                    type: 'bar',
                    data: {
                        labels: courseLabels,
                        datasets: [{
                            label: 'Students',
                            data: courseValues,
                            backgroundColor: 'rgba(108,92,231,0.4)',
                            borderColor: '#6c5ce7',
                            borderWidth: 1
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
            if (sortedMonths.length > 0) {
                new Chart(document.getElementById('revenueChart'), {
                    type: 'line',
                    data: {
                        labels: sortedMonths,
                        datasets: [{
                            label: 'Revenue (₦)',
                            data: revenueValues,
                            borderColor: '#f0a500',
                            backgroundColor: 'rgba(240,165,0,0.1)',
                            tension: 0.2,
                            fill: true
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        }

        // ==================== COURSES LIST ====================
        async function renderCourses() {
            const snap = await db.collection('courses').get();
            let rows = '';
            snap.forEach(doc => {
                const c = doc.data();
                rows += `<tr>
                    <td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.stage || '—')}</td><td>${formatCurrency(c.price)}</td>
                    <td>${c.isFullTrack ? 'Full Track' : 'Single Stage'}</td>
                    <td><span class="badge ${c.active ? 'badge-active' : 'badge-pending'}">${c.active ? 'Active' : 'Inactive'}</span></td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="window.editCourse('${doc.id}')">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="window.deleteCourse('${doc.id}')">Delete</button>
                    </td>
                </tr>`;
            });
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Courses</h1><a href="#create-course" class="btn btn-primary">+ Add Course</a></div>
                <div class="card">
                    <table><thead><tr><th>Name</th><th>Stage</th><th>Price</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="6" class="empty-state">No courses found.</td></tr>'}</tbody></table>
                </div>`;
        }

        // ==================== CREATE COURSE (Dedicated Full-Page Section) ====================
        function renderCreateCourse() {
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Create New Course</h1></div>
                <div class="card">
                    <form id="createCourseForm">
                        <div class="form-row">
                            <div class="form-group"><label>Course Name *</label><input id="cName" required></div>
                            <div class="form-group"><label>Stage (e.g., Elementary)</label><input id="cStage"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Price (₦) *</label><input type="number" id="cPrice" required></div>
                            <div class="form-group"><label>Duration (weeks)</label><input type="number" id="cDuration" value="8"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Savings (if Full Track)</label><input type="number" id="cSavings" value="0"></div>
                            <div class="form-group"><label>Icon (emoji)</label><input id="cIcon" value="📘"></div>
                        </div>
                        <div class="form-group">
                            <label><input type="checkbox" id="cFullTrack"> Full Track (all 3 stages)</label>
                        </div>
                        <div class="form-group">
                            <label><input type="checkbox" id="cActive" checked> Active</label>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="cDescription" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Course</button>
                        <a href="#courses" class="btn btn-outline">Cancel</a>
                    </form>
                </div>`;

            document.getElementById('createCourseForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = {
                    name: document.getElementById('cName').value.trim(),
                    stage: document.getElementById('cStage').value.trim(),
                    price: Number(document.getElementById('cPrice').value),
                    durationWeeks: Number(document.getElementById('cDuration').value),
                    savings: Number(document.getElementById('cSavings').value),
                    icon: document.getElementById('cIcon').value.trim(),
                    isFullTrack: document.getElementById('cFullTrack').checked,
                    active: document.getElementById('cActive').checked,
                    description: document.getElementById('cDescription').value.trim(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                };
                if (!data.name || isNaN(data.price)) {
                    alert('Name and Price are required.');
                    return;
                }
                await db.collection('courses').add(data);
                alert('Course created successfully!');
                window.location.hash = 'courses'; // go back to list
            });
        }

        // Edit course (opens a similar form but we'll reuse the modal approach or inline section)
        window.editCourse = async (id) => {
            // Navigate to an edit page, we can implement as a dedicated #edit-course?id=...
            // For simplicity, we'll open a modal (keeping modal for quick edits)
            const doc = await db.collection('courses').doc(id).get();
            if (!doc.exists) return;
            const course = doc.data();
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Edit Course</h1></div>
                <div class="card">
                    <form id="editCourseForm">
                        <div class="form-row">
                            <div class="form-group"><label>Course Name *</label><input id="ecName" value="${escapeHtml(course.name)}" required></div>
                            <div class="form-group"><label>Stage</label><input id="ecStage" value="${escapeHtml(course.stage || '')}"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Price (₦) *</label><input type="number" id="ecPrice" value="${course.price}" required></div>
                            <div class="form-group"><label>Duration (weeks)</label><input type="number" id="ecDuration" value="${course.durationWeeks || 8}"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Savings</label><input type="number" id="ecSavings" value="${course.savings || 0}"></div>
                            <div class="form-group"><label>Icon</label><input id="ecIcon" value="${escapeHtml(course.icon || '📘')}"></div>
                        </div>
                        <div class="form-group"><label><input type="checkbox" id="ecFullTrack" ${course.isFullTrack ? 'checked' : ''}> Full Track</label></div>
                        <div class="form-group"><label><input type="checkbox" id="ecActive" ${course.active ? 'checked' : ''}> Active</label></div>
                        <div class="form-group"><label>Description</label><textarea id="ecDescription" rows="3">${escapeHtml(course.description || '')}</textarea></div>
                        <button type="submit" class="btn btn-primary">Update Course</button>
                        <a href="#courses" class="btn btn-outline">Cancel</a>
                    </form>
                </div>`;

            document.getElementById('editCourseForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = {
                    name: document.getElementById('ecName').value.trim(),
                    stage: document.getElementById('ecStage').value.trim(),
                    price: Number(document.getElementById('ecPrice').value),
                    durationWeeks: Number(document.getElementById('ecDuration').value),
                    savings: Number(document.getElementById('ecSavings').value),
                    icon: document.getElementById('ecIcon').value.trim(),
                    isFullTrack: document.getElementById('ecFullTrack').checked,
                    active: document.getElementById('ecActive').checked,
                    description: document.getElementById('ecDescription').value.trim(),
                };
                await db.collection('courses').doc(id).update(data);
                alert('Course updated!');
                window.location.hash = 'courses';
            });
        };

        window.deleteCourse = async (id) => {
            if (!confirm('Delete this course?')) return;
            await db.collection('courses').doc(id).delete();
            loadSection('courses');
        };

        // ==================== USERS ====================
        async function renderUsers() {
            const snap = await db.collection('users').get();
            let rows = '';
            snap.forEach(doc => {
                const u = doc.data();
                rows += `<tr>
                    <td>${escapeHtml(u.fullName || '—')}</td><td>${escapeHtml(u.email)}</td><td>${escapeHtml(u.role || 'learner')}</td>
                    <td>${escapeHtml(u.phone || '—')}</td><td>${u.enrolledCourses?.length || 0}</td>
                    <td><span class="badge badge-active">Active</span></td>
                </tr>`;
            });
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Users</h1></div>
                <div class="card">
                    <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>Courses</th><th>Status</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="6" class="empty-state">No users found.</td></tr>'}</tbody></table>
                </div>`;
        }

        // ==================== ENROLLMENTS ====================
        async function renderEnrollments() {
            const snap = await db.collection('enrollments').get();
            let rows = '';
            snap.forEach(doc => {
                const e = doc.data();
                rows += `<tr>
                    <td>${escapeHtml(e.fullName || '—')}</td><td>${escapeHtml(e.courseName)}</td><td>${escapeHtml(e.stage)}</td>
                    <td>${formatCurrency(e.amount)}</td><td><span class="badge ${e.status === 'active' ? 'badge-active' : 'badge-pending'}">${e.status || 'active'}</span></td>
                    <td>${e.enrolledAt?.toDate?.().toDateString() || '—'}</td>
                </tr>`;
            });
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Enrollments</h1></div>
                <div class="card">
                    <table><thead><tr><th>Student</th><th>Course</th><th>Stage</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="6" class="empty-state">No enrollments yet.</td></tr>'}</tbody></table>
                </div>`;
        }

        // ==================== PAYMENTS ====================
        async function renderPayments() {
            const snap = await db.collection('payments').get();
            let rows = '';
            snap.forEach(doc => {
                const p = doc.data();
                rows += `<tr>
                    <td>${escapeHtml(p.userFullName || '—')}</td><td>${escapeHtml(p.courseName)}</td>
                    <td>${formatCurrency(p.amount)}</td><td style="font-size:0.75rem;">${p.reference}</td>
                    <td>${p.paidAt?.toDate?.().toDateString() || '—'}</td>
                </tr>`;
            });
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Payments</h1></div>
                <div class="card">
                    <table><thead><tr><th>Student</th><th>Course</th><th>Amount</th><th>Reference</th><th>Date</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="5" class="empty-state">No payments recorded.</td></tr>'}</tbody></table>
                </div>`;
        }

        // ==================== REFERRALS ====================
        async function renderReferrals() {
            const snap = await db.collection('referrals').get();
            let rows = '';
            snap.forEach(doc => {
                const r = doc.data();
                rows += `<tr>
                    <td>${escapeHtml(r.referredName || '—')}</td><td>${escapeHtml(r.referrerUid?.substring(0,8) || '—')}</td>
                    <td>${r.status}</td><td>${formatCurrency(r.commissionAmount)}</td>
                    <td>${r.createdAt?.toDate?.().toDateString() || '—'}</td>
                </tr>`;
            });
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Referrals</h1></div>
                <div class="card">
                    <table><thead><tr><th>Referred</th><th>Referrer UID</th><th>Status</th><th>Commission</th><th>Date</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="5" class="empty-state">No referrals yet.</td></tr>'}</tbody></table>
                </div>`;
        }

        // ==================== ANNOUNCEMENTS ====================
        async function renderAnnouncements() {
            const doc = await db.collection('announcements').doc('current').get();
            const data = doc.exists ? doc.data() : { messages: ['Welcome!'], batchName: 'New Batch' };
            const messages = (data.messages || []).join('\n');
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Announcements</h1></div>
                <div class="card">
                    <div class="form-group"><label>Batch Name</label><input id="annBatchName" value="${escapeHtml(data.batchName || '')}"></div>
                    <div class="form-group"><label>Messages (one per line)</label><textarea id="annMessages" rows="6">${escapeHtml(messages)}</textarea></div>
                    <button class="btn btn-primary" id="saveAnnouncements">Save</button>
                </div>`;
            document.getElementById('saveAnnouncements').addEventListener('click', async () => {
                const batchName = document.getElementById('annBatchName').value;
                const messages = document.getElementById('annMessages').value.split('\n').filter(m => m.trim() !== '');
                await db.collection('announcements').doc('current').set({ batchName, messages }, { merge: true });
                alert('Announcements updated!');
            });
        }

        // ==================== BLOG ====================
        async function renderBlogPosts() {
            const snap = await db.collection('blog_posts').orderBy('createdAt', 'desc').get();
            let rows = '';
            snap.forEach(doc => {
                const b = doc.data();
                rows += `<tr>
                    <td>${escapeHtml(b.title)}</td><td>${b.published ? '✅' : '❌'}</td>
                    <td>${b.createdAt?.toDate?.().toDateString() || '—'}</td>
                    <td><button class="btn btn-outline btn-sm" onclick="window.editBlog('${doc.id}')">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="window.deleteBlog('${doc.id}')">Delete</button></td>
                </tr>`;
            });
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Blog Posts</h1><button class="btn btn-primary" id="addBlogBtn">+ New Post</button></div>
                <div class="card">
                    <table><thead><tr><th>Title</th><th>Published</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="4" class="empty-state">No posts yet.</td></tr>'}</tbody></table>
                </div>`;
            document.getElementById('addBlogBtn').addEventListener('click', () => showBlogModal());
        }

        window.editBlog = (id) => showBlogModal(id);
        window.deleteBlog = async (id) => {
            if (confirm('Delete this post?')) {
                await db.collection('blog_posts').doc(id).delete();
                loadSection('blog');
            }
        };

        function showBlogModal(id = null) {
            let post = { title: '', content: '', excerpt: '', imageUrl: '', published: false };
            if (id) {
                db.collection('blog_posts').doc(id).get().then(doc => {
                    if (doc.exists) post = { ...post, ...doc.data() };
                    fillBlogModal(post, id);
                });
            } else {
                fillBlogModal(post, null);
            }
        }
        function fillBlogModal(post, id) {
            mainContent.innerHTML = `
                <div class="top-bar"><h1>${id ? 'Edit' : 'New'} Blog Post</h1></div>
                <div class="card">
                    <div class="form-group"><label>Title</label><input id="bTitle" value="${escapeHtml(post.title)}"></div>
                    <div class="form-group"><label>Excerpt</label><input id="bExcerpt" value="${escapeHtml(post.excerpt || '')}"></div>
                    <div class="form-group"><label>Image URL</label><input id="bImage" value="${escapeHtml(post.imageUrl || '')}"></div>
                    <div class="form-group"><label>Content (HTML)</label><textarea id="bContent" rows="8">${escapeHtml(post.content || '')}</textarea></div>
                    <div class="form-group"><label><input type="checkbox" id="bPublished" ${post.published ? 'checked' : ''}> Published</label></div>
                    <button class="btn btn-primary" id="saveBlogBtn">Save</button>
                    <a href="#blog" class="btn btn-outline">Cancel</a>
                </div>`;
            document.getElementById('saveBlogBtn').addEventListener('click', async () => {
                const data = {
                    title: document.getElementById('bTitle').value,
                    excerpt: document.getElementById('bExcerpt').value,
                    imageUrl: document.getElementById('bImage').value,
                    content: document.getElementById('bContent').value,
                    published: document.getElementById('bPublished').checked,
                    createdAt: id ? (await db.collection('blog_posts').doc(id).get()).data().createdAt : firebase.firestore.FieldValue.serverTimestamp(),
                };
                if (id) await db.collection('blog_posts').doc(id).update(data);
                else await db.collection('blog_posts').add(data);
                window.location.hash = 'blog';
            });
        }

        // ==================== CERTIFICATES ====================
        async function renderCertificates() {
            const snap = await db.collection('certificates').get();
            let rows = '';
            snap.forEach(doc => {
                const c = doc.data();
                rows += `<tr><td>${escapeHtml(c.fullName || '—')}</td><td>${escapeHtml(c.courseName)}</td><td>${c.issuedAt?.toDate?.().toDateString() || '—'}</td></tr>`;
            });
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Certificates</h1><button class="btn btn-primary" id="issueCertBtn">+ Issue Certificate</button></div>
                <div class="card">
                    <table><thead><tr><th>Student</th><th>Course</th><th>Issued</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="3" class="empty-state">No certificates issued.</td></tr>'}</tbody></table>
                </div>`;
            document.getElementById('issueCertBtn').addEventListener('click', () => {
                mainContent.innerHTML = `
                    <div class="top-bar"><h1>Issue Certificate</h1></div>
                    <div class="card">
                        <div class="form-group"><label>Student User ID</label><input id="certUserId"></div>
                        <div class="form-group"><label>Course Name</label><input id="certCourse"></div>
                        <div class="form-group"><label>Stage</label><input id="certStage"></div>
                        <button class="btn btn-primary" id="doIssueCert">Issue</button>
                        <a href="#certificates" class="btn btn-outline">Cancel</a>
                    </div>`;
                document.getElementById('doIssueCert').addEventListener('click', async () => {
                    const userId = document.getElementById('certUserId').value;
                    const courseName = document.getElementById('certCourse').value;
                    const stage = document.getElementById('certStage').value;
                    if (!userId || !courseName) return alert('Missing fields');
                    await db.collection('certificates').add({ userId, courseName, stage, issuedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    window.location.hash = 'certificates';
                });
            });
        }

        // ==================== SETTINGS ====================
        async function renderSettings() {
            const statsDoc = await db.collection('settings').doc('stats').get();
            const contactDoc = await db.collection('settings').doc('contact').get();
            const stats = statsDoc.exists ? statsDoc.data() : { spotsLeft: 0, totalLearners: 0 };
            const contact = contactDoc.exists ? contactDoc.data() : { communityLink: '', linkedinUrl: '' };
            mainContent.innerHTML = `
                <div class="top-bar"><h1>Settings</h1></div>
                <div class="card">
                    <h3>Stats</h3>
                    <div class="form-row">
                        <div class="form-group"><label>Spots Left</label><input type="number" id="spotsLeft" value="${stats.spotsLeft || 0}"></div>
                        <div class="form-group"><label>Total Learners (display)</label><input type="number" id="totalLearners" value="${stats.totalLearners || 0}"></div>
                    </div>
                    <button class="btn btn-primary" id="saveStats">Save Stats</button>
                </div>
                <div class="card">
                    <h3>Contact / Social Links</h3>
                    <div class="form-group"><label>WhatsApp Community Link</label><input id="communityLink" value="${escapeHtml(contact.communityLink || '')}"></div>
                    <div class="form-group"><label>LinkedIn URL</label><input id="linkedinUrl" value="${escapeHtml(contact.linkedinUrl || '')}"></div>
                    <button class="btn btn-primary" id="saveContact">Save Links</button>
                </div>`;
            document.getElementById('saveStats').addEventListener('click', async () => {
                await db.collection('settings').doc('stats').set({
                    spotsLeft: Number(document.getElementById('spotsLeft').value),
                    totalLearners: Number(document.getElementById('totalLearners').value),
                }, { merge: true });
                alert('Stats updated!');
            });
            document.getElementById('saveContact').addEventListener('click', async () => {
                await db.collection('settings').doc('contact').set({
                    communityLink: document.getElementById('communityLink').value,
                    linkedinUrl: document.getElementById('linkedinUrl').value,
                }, { merge: true });
                alert('Links updated!');
            });
        }

        // Expose globals for inline onclick
        window.loadSection = loadSection;
        window.editCourse = window.editCourse; // already defined
        window.deleteCourse = window.deleteCourse;
        window.editBlog = window.editBlog;
        window.deleteBlog = window.deleteBlog;

    })();
    </script>
</body>
</html>
