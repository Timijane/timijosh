<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Quiz — TRIANGLE LEARN</title>
    <meta name="description" content="Take your course quiz. Test your knowledge and earn your certificate.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fc;
            --bg-card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #eef0f5;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.08);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --danger: #e74c3c;
            --success: #0d9488;
            --warning: #e65100;
            --warning-bg: #fff3e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            padding: 12px 24px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-link { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-link img { height: 32px; }
        .logo-link span { font-family: var(--font-heading); font-weight: 700; font-size: 1rem; color: var(--text); }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-timer {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-timer.warning { color: var(--danger); }
        .header-progress {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .main-container {
            max-width: 820px;
            margin: 30px auto;
            padding: 0 20px 40px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }
        .quiz-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .quiz-header h1 {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            margin-bottom: 4px;
        }
        .quiz-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .quiz-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 12px 0 4px;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .quiz-meta span { display: flex; align-items: center; gap: 4px; }

        .question-block {
            margin-bottom: 24px;
            padding: 20px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: #fafaff;
            transition: all 0.3s;
        }
        .question-block.correct { border-color: var(--success); background: #f0fdf9; }
        .question-block.incorrect { border-color: var(--danger); background: #fff5f5; }
        .question-block .q-num {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--purple);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .question-block .q-points {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.7rem;
        }
        .q-text {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }
        .option-item:hover { border-color: var(--purple); background: #f8f7ff; }
        .option-item.selected { border-color: var(--purple); background: #f3f0ff; }
        .option-item.correct-answer { border-color: var(--success); background: #e8f8f0; }
        .option-item.wrong-answer { border-color: var(--danger); background: #fff0f0; }
        .option-item input[type="radio"] { accent-color: var(--purple); width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
        .option-item label { cursor: pointer; flex: 1; }
        .fill-input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
        }
        .fill-input:focus { border-color: var(--purple); }
        .fill-input:disabled { background: #f5f5f5; }

        .feedback {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
            display: none;
        }
        .feedback.show { display: block; }
        .feedback.correct { background: #e8f8f0; color: var(--success); border: 1px solid #b8e6d8; }
        .feedback.incorrect { background: #fff0f0; color: var(--danger); border: 1px solid #fdd; }
        .feedback.theory { background: #f3f0ff; color: var(--purple); border: 1px solid #d8d0f0; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            font-family: var(--font-body);
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(232,67,147,0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
        .btn-ghost:hover { border-color: var(--purple); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,148,136,0.3); }
        .btn-sm { padding: 6px 14px; font-size: 0.75rem; }

        .result-box {
            text-align: center;
            padding: 30px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            margin-top: 20px;
        }
        .result-box .score {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--purple);
            margin: 10px 0;
        }
        .result-box .score.pass { color: var(--success); }
        .result-box .score.fail { color: var(--danger); }

        .progress-bar-wrapper {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-bar-wrapper .fill {
            height: 100%;
            background: var(--gradient);
            transition: width 0.5s ease;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f5 25%, #e8e8f0 50%, #f0f0f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton-title { height: 28px; width: 60%; margin: 0 auto 8px; }
        .skeleton-text { height: 14px; margin-bottom: 6px; }
        .skeleton-block { height: 120px; margin-bottom: 16px; }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
            .header-right { gap: 10px; flex-wrap: wrap; }
            .card { padding: 20px; }
            .quiz-header h1 { font-size: 1.3rem; }
            .question-block { padding: 14px; }
            .result-box .score { font-size: 2.2rem; }
            .quiz-meta { gap: 10px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="dashboard.html" class="logo-link">
            <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="Logo">
            <span>TRIANGLE LEARN</span>
        </a>
        <div class="header-right">
            <span class="header-progress" id="progressDisplay">0 / 0</span>
            <span class="header-timer" id="headerTimer">⏱️ --:--</span>
            <a href="#" id="backToLearn" class="btn btn-ghost btn-sm">← Back</a>
        </div>
    </header>

    <div class="main-container" id="quizContainer">
        <!-- Skeleton Loading -->
        <div class="card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width:40%; margin:0 auto;"></div>
            <div style="margin-top:20px;">
                <div class="skeleton skeleton-block"></div>
                <div class="skeleton skeleton-block" style="height:100px;"></div>
                <div class="skeleton skeleton-block" style="height:100px;"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        'use strict';

        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== URL PARAMS ====================
        const urlParams = new URLSearchParams(window.location.search);
        const QUIZ_ID = urlParams.get('id') || urlParams.get('quizId');
        const COURSE_ID = urlParams.get('courseId');
        const LESSON_ID = urlParams.get('lessonId');
        const EXAM_MODE = urlParams.get('mode') === 'exam';

        // ==================== STATE ====================
        let currentUser = null;
        let questions = [];
        let userAnswers = {};
        let submitted = false;
        let timerInterval = null;
        let timeRemaining = 0;
        let quizData = null;
        let questionStartTime = Date.now();

        // ==================== DOM REFS ====================
        const quizContainer = document.getElementById('quizContainer');
        const progressDisplay = document.getElementById('progressDisplay');
        const headerTimer = document.getElementById('headerTimer');
        const backToLearn = document.getElementById('backToLearn');

        if (COURSE_ID) {
            backToLearn.href = `learn.html?courseId=${COURSE_ID}`;
        } else if (EXAM_MODE) {
            backToLearn.href = `dashboard.html`;
        } else {
            backToLearn.href = 'dashboard.html';
        }

        // ==================== AUTH ====================
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'auth.html'; return; }
            currentUser = user;
            if (!QUIZ_ID) {
                quizContainer.innerHTML = `
                    <div class="card" style="text-align:center;">
                        <h3>⚠️ No Quiz Specified</h3>
                        <p style="color:var(--text-muted);">Please select a valid quiz.</p>
                        <a href="dashboard.html" class="btn btn-primary" style="margin-top:12px;">Go to Dashboard</a>
                    </div>`;
                return;
            }
            await loadQuiz();
        });

        // ==================== LOAD QUIZ ====================
        async function loadQuiz() {
            try {
                // Load quiz metadata
                const quizDoc = await db.collection('quizzes').doc(QUIZ_ID).get();

                if (!quizDoc.exists) {
                    throw new Error('Quiz not found.');
                }

                quizData = quizDoc.data();

                // Load questions from subcollection
                const qSnap = await db.collection('quizzes')
                    .doc(QUIZ_ID)
                    .collection('questions')
                    .orderBy('order')
                    .get();

                if (!qSnap.empty) {
                    questions = [];
                    qSnap.forEach(doc => questions.push({ id: doc.id, ...doc.data() }));
                } else if (quizData.questions && Array.isArray(quizData.questions)) {
                    questions = quizData.questions.map((q, i) => ({ id: `q${i}`, ...q }));
                } else {
                    // Try alternate location
                    const fallback = await db.collection('questions')
                        .where('quizId', '==', QUIZ_ID)
                        .orderBy('order')
                        .get();
                    if (!fallback.empty) {
                        questions = [];
                        fallback.forEach(doc => questions.push({ id: doc.id, ...doc.data() }));
                    } else {
                        throw new Error('No questions found for this quiz.');
                    }
                }

                if (questions.length === 0) throw new Error('No questions available.');

                // Set timer
                if (quizData.duration || quizData.timeLimit) {
                    timeRemaining = (quizData.duration || quizData.timeLimit || 0) * 60;
                    startTimer();
                }

                renderQuiz();
                updateProgress();

            } catch (err) {
                console.error('Load quiz error:', err);
                quizContainer.innerHTML = `
                    <div class="card" style="text-align:center;">
                        <h3>❌ ${err.message}</h3>
                        <p style="color:var(--text-muted);">Please try again or contact support.</p>
                        <a href="dashboard.html" class="btn btn-primary" style="margin-top:12px;">Go to Dashboard</a>
                    </div>`;
            }
        }

        // ==================== TIMER ====================
        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (submitted) return;
                timeRemaining--;
                updateTimerDisplay();

                if (timeRemaining <= 60) {
                    headerTimer.classList.add('warning');
                }

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    submitQuiz();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            if (!headerTimer) return;
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            headerTimer.textContent = `⏱️ ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (timeRemaining <= 60) headerTimer.classList.add('warning');
        }

        // ==================== RENDER QUIZ ====================
        function renderQuiz() {
            const total = questions.length;
            const title = EXAM_MODE ? `📝 ${quizData?.title || 'Final Exam'}` : `📝 ${quizData?.title || 'Quiz'}`;

            let html = `
                <div class="card quiz-header">
                    <h1>${title}</h1>
                    <p>${quizData?.description || 'Answer all questions. You can review before submitting.'}</p>
                    <div class="quiz-meta">
                        <span>📋 ${total} questions</span>
                        ${quizData?.passingScore ? `<span>🎯 Passing: ${quizData.passingScore}%</span>` : ''}
                        ${quizData?.duration ? `<span>⏱️ ${quizData.duration} minutes</span>` : ''}
                        ${EXAM_MODE ? '<span style="color:var(--danger);font-weight:700;">📝 Final Exam</span>' : ''}
                    </div>
                </div>
                <div class="progress-bar-wrapper">
                    <div class="fill" id="progressFill" style="width:0%;"></div>
                </div>`;

            questions.forEach((q, idx) => {
                const type = q.type || 'multiple';
                let inputHtml = '';

                if (type === 'true_false' || type === 'boolean') {
                    inputHtml = `
                        <div class="options">
                            <div class="option-item" onclick="selectAnswer('${q.id}', 'True')">
                                <input type="radio" name="q_${q.id}" value="True" id="q${q.id}_true">
                                <label for="q${q.id}_true">✅ True</label>
                            </div>
                            <div class="option-item" onclick="selectAnswer('${q.id}', 'False')">
                                <input type="radio" name="q_${q.id}" value="False" id="q${q.id}_false">
                                <label for="q${q.id}_false">❌ False</label>
                            </div>
                        </div>`;
                } else if (type === 'fill_blank' || type === 'text' || type === 'theory') {
                    const placeholder = type === 'theory' ? 'Write your answer here (will be graded manually)...' : 'Type your answer...';
                    inputHtml = `
                        <input type="text" class="fill-input" id="fill_${q.id}" 
                               placeholder="${placeholder}" 
                               oninput="updateTextAnswer('${q.id}', this.value)" 
                               ${type === 'theory' ? 'data-theory="true"' : ''}>`;
                    if (type === 'theory') {
                        inputHtml += `<div style="font-size:0.7rem;color:var(--text-muted);margin-top:4px;">📝 Theory question — will be graded by instructor</div>`;
                    }
                } else {
                    // Multiple choice
                    const options = q.options || [];
                    const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
                    inputHtml = '<div class="options">' + options.map((opt, i) => `
                        <div class="option-item" onclick="selectAnswer('${q.id}', '${escapeAttr(opt)}')">
                            <input type="radio" name="q_${q.id}" value="${escapeAttr(opt)}" id="q${q.id}_opt${i}">
                            <label for="q${q.id}_opt${i}">${letters[i]}. ${escapeHtml(opt)}</label>
                        </div>`).join('') + '</div>';
                }

                html += `
                <div class="question-block" id="block_${q.id}" data-answered="false">
                    <div class="q-num">
                        <span>Question ${idx + 1} of ${total}</span>
                        <span class="q-points">${q.points || 1} point${q.points > 1 ? 's' : ''}</span>
                    </div>
                    <div class="q-text">${escapeHtml(q.question)}</div>
                    ${inputHtml}
                    <div class="feedback" id="fb_${q.id}"></div>
                </div>`;
            });

            html += `
                <div class="card" style="text-align:center;">
                    <button class="btn btn-primary" id="submitBtn" onclick="submitQuiz()" style="padding:12px 40px;font-size:1rem;">
                        📤 Submit Quiz
                    </button>
                    <p style="font-size:0.75rem;color:var(--text-muted);margin-top:8px;">
                        ${EXAM_MODE ? '⚠️ Once submitted, you cannot change your answers.' : 'You can review before submitting.'}
                    </p>
                </div>`;

            quizContainer.innerHTML = html;

            // If time remaining, start timer
            if (timeRemaining > 0 && !timerInterval) startTimer();

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== ANSWER SELECTION ====================
        window.selectAnswer = function(qId, value) {
            if (submitted) return;
            userAnswers[qId] = value;

            const block = document.getElementById(`block_${qId}`);
            if (block) {
                block.querySelectorAll('.option-item').forEach(item => {
                    item.classList.remove('selected');
                    const radio = item.querySelector('input[type="radio"]');
                    if (radio && radio.value === value) {
                        radio.checked = true;
                        item.classList.add('selected');
                    }
                });
                block.dataset.answered = 'true';
            }
            updateProgress();
        };

        window.updateTextAnswer = function(qId, value) {
            if (submitted) return;
            userAnswers[qId] = value.trim();
            const block = document.getElementById(`block_${qId}`);
            if (block) {
                block.dataset.answered = value.trim().length > 0 ? 'true' : 'false';
            }
            updateProgress();
        };

        function updateProgress() {
            const total = questions.length;
            const answered = questions.filter(q => {
                const ans = userAnswers[q.id] || '';
                return ans && ans.length > 0;
            }).length;
            const pct = total > 0 ? Math.round((answered / total) * 100) : 0;

            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = pct + '%';

            progressDisplay.textContent = `📊 ${answered} / ${total}`;
        }

        // ==================== SUBMIT QUIZ ====================
        window.submitQuiz = async function() {
            if (submitted) return;

            // Check if all questions answered
            const total = questions.length;
            const answered = questions.filter(q => {
                const ans = userAnswers[q.id] || '';
                return ans && ans.length > 0;
            }).length;

            if (answered < total) {
                const confirmSubmit = confirm(
                    `You've answered ${answered} out of ${total} questions.\n\n` +
                    `${total - answered} question${total - answered > 1 ? 's are' : ' is'} unanswered.\n\n` +
                    'Are you sure you want to submit?'
                );
                if (!confirmSubmit) return;
            } else {
                if (!confirm('Submit your quiz? You cannot change answers after submission.')) return;
            }

            submitted = true;
            if (timerInterval) clearInterval(timerInterval);

            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = '⏳ Submitting...';
            }

            await gradeQuiz();
        };

        // ==================== GRADE QUIZ ====================
        async function gradeQuiz() {
            let score = 0;
            let correctCount = 0;
            let theoryCount = 0;
            let totalPoints = questions.reduce((sum, q) => sum + (q.points || 1), 0);
            const results = [];
            const explanations = [];

            questions.forEach(q => {
                const studentAns = userAnswers[q.id] || '';
                let correctAns = '';
                let isCorrect = false;
                const type = q.type || 'multiple';

                if (type === 'theory') {
                    theoryCount++;
                    correctAns = q.sampleAnswer || 'Manual grading required';
                    isCorrect = false;
                } else {
                    // Get correct answer
                    if (type === 'multiple' || type === 'mcq') {
                        const correctIndex = q.correct !== undefined ? q.correct : q.correctIndex;
                        if (correctIndex !== undefined && q.options && q.options[correctIndex] !== undefined) {
                            correctAns = q.options[correctIndex];
                        } else {
                            correctAns = q.correctAnswer || q.answer || '';
                        }
                    } else if (type === 'true_false' || type === 'boolean') {
                        const raw = q.correct !== undefined ? q.correct : q.correctAnswer;
                        correctAns = (raw === true || raw === 1 || raw === 'True' || raw === 'true') ? 'True' : 'False';
                    } else {
                        correctAns = q.correct || q.correctAnswer || q.answer || '';
                    }

                    const isMatch = (String(studentAns).toLowerCase().trim() === String(correctAns).toLowerCase().trim());
                    isCorrect = isMatch;

                    if (isCorrect) {
                        score += (q.points || 1);
                        correctCount++;
                    }
                }

                results.push({
                    questionId: q.id,
                    studentAnswer: studentAns,
                    correctAnswer: String(correctAns),
                    isCorrect: isCorrect,
                    question: q.question,
                    points: q.points || 1,
                    type: type,
                    explanation: q.explanation || ''
                });

                if (q.explanation) explanations.push(q.explanation);
            });

            const percentage = totalPoints > 0 ? Math.round((score / totalPoints) * 100) : 0;
            const passingScore = quizData?.passingScore || 70;
            const passed = percentage >= passingScore;

            // Show feedback on each question
            questions.forEach((q, idx) => {
                const result = results[idx];
                const fb = document.getElementById(`fb_${q.id}`);
                const block = document.getElementById(`block_${q.id}`);

                if (fb && block) {
                    fb.className = 'feedback show';

                    if (q.type === 'theory') {
                        fb.textContent = '📝 Theory question — awaiting instructor grading.';
                        fb.className = 'feedback show theory';
                    } else if (result.isCorrect) {
                        fb.textContent = `✅ Correct! ${result.explanation ? '💡 ' + result.explanation : ''}`;
                        fb.className = 'feedback show correct';
                        block.classList.add('correct');
                    } else {
                        fb.innerHTML = `❌ Incorrect.<br>Correct answer: <strong>${escapeHtml(result.correctAnswer)}</strong>`;
                        if (result.explanation) {
                            fb.innerHTML += `<br>💡 ${escapeHtml(result.explanation)}`;
                        }
                        fb.className = 'feedback show incorrect';
                        block.classList.add('incorrect');
                    }

                    // Disable inputs
                    block.querySelectorAll('input, .option-item').forEach(el => {
                        if (el.tagName === 'INPUT') el.disabled = true;
                        if (el.classList && el.classList.contains('option-item')) {
                            el.style.cursor = 'default';
                        }
                    });

                    // Mark correct/wrong options
                    if (q.type !== 'theory' && q.type !== 'fill_blank' && q.type !== 'text') {
                        const correctVal = results[idx].correctAnswer;
                        block.querySelectorAll('.option-item').forEach(item => {
                            const radio = item.querySelector('input[type="radio"]');
                            if (radio) {
                                if (radio.value === correctVal) {
                                    item.classList.add('correct-answer');
                                } else if (radio.checked && radio.value !== correctVal) {
                                    item.classList.add('wrong-answer');
                                }
                            }
                        });
                    }
                }
            });

            // Save results to Firestore
            try {
                const resultData = {
                    quizId: QUIZ_ID,
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userName: currentUser.displayName || currentUser.email || 'User',
                    courseId: COURSE_ID || '',
                    lessonId: LESSON_ID || '',
                    score: score,
                    totalPoints: totalPoints,
                    percentage: percentage,
                    passed: passed,
                    passingScore: passingScore,
                    correctCount: correctCount,
                    theoryCount: theoryCount,
                    totalQuestions: questions.length,
                    answers: results,
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    timeTaken: quizData?.duration ? (quizData.duration * 60 - timeRemaining) : 0,
                    examMode: EXAM_MODE || false,
                };

                const resultRef = await db.collection('quiz_results').add(resultData);

                // If passed and exam mode, generate certificate
                if (passed && EXAM_MODE && COURSE_ID) {
                    await generateCertificate(resultRef.id);
                }

                // Update enrollment progress
                if (COURSE_ID) {
                    const enrollSnap = await db.collection('enrollments')
                        .where('userId', '==', currentUser.uid)
                        .where('courseId', '==', COURSE_ID)
                        .limit(1)
                        .get();

                    if (!enrollSnap.empty) {
                        const enrollRef = db.collection('enrollments').doc(enrollSnap.docs[0].id);
                        const updateData = {
                            lastQuizScore: percentage,
                            quizResults: firebase.firestore.FieldValue.arrayUnion(QUIZ_ID),
                        };
                        if (EXAM_MODE && passed) {
                            updateData.status = 'completed';
                            updateData.completedAt = firebase.firestore.FieldValue.serverTimestamp();
                        }
                        await enrollRef.update(updateData);
                    }
                }

                // Show result
                showResult(percentage, passed, passingScore, score, totalPoints, correctCount, theoryCount, resultRef.id);

            } catch (err) {
                console.error('Save result error:', err);
                alert('Quiz graded but failed to save results. Please contact support.');
            }
        }

        // ==================== GENERATE CERTIFICATE ====================
        async function generateCertificate(resultId) {
            try {
                const userData = await db.collection('users').doc(currentUser.uid).get();
                const userName = userData.exists ? userData.data().fullName : currentUser.displayName || currentUser.email;

                const courseData = await db.collection('courses').doc(COURSE_ID).get();
                const courseName = courseData.exists ? courseData.data().name : 'Course';

                const certRef = await db.collection('certificates').add({
                    userId: currentUser.uid,
                    fullName: userName,
                    courseName: courseName,
                    stage: 'Professional', // or get from course
                    resultId: resultId,
                    quizId: QUIZ_ID,
                    issuedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    certificateUrl: '', // Will be generated by Cloud Function
                    verified: true,
                });

                console.log('✅ Certificate generated:', certRef.id);

            } catch (err) {
                console.error('Certificate generation error:', err);
            }
        }

        // ==================== SHOW RESULT ====================
        function showResult(percentage, passed, passingScore, score, totalPoints, correctCount, theoryCount, resultId) {
            const resultHtml = `
                <div class="card result-box">
                    <h2>${passed ? '🎉 Quiz Complete!' : '📝 Quiz Complete'}</h2>
                    <div class="score ${passed ? 'pass' : 'fail'}">${percentage}%</div>
                    <p style="font-size:1.1rem;font-weight:600;margin-bottom:8px;">
                        ${passed ? '✅ Congratulations! You passed!' : '❌ Keep practicing! You can retry.'}
                    </p>
                    <p style="color:var(--text-secondary);">
                        Score: ${score}/${totalPoints} • ${correctCount} correct • ${theoryCount} theory questions
                    </p>
                    <p style="font-size:0.85rem;color:var(--text-muted);margin-top:4px;">
                        Passing score: ${passingScore}%
                    </p>
                    ${passed && EXAM_MODE ? `
                        <div style="margin:16px 0;padding:16px;background:#e8f8f0;border-radius:var(--radius-sm);">
                            <span style="font-size:1.2rem;">🎓</span>
                            <strong style="color:var(--success);">Certificate Earned!</strong>
                            <p style="font-size:0.82rem;color:var(--text-secondary);">You've earned a certificate for completing this course.</p>
                            <a href="certificate.html?resultId=${resultId}" class="btn btn-success btn-sm" style="margin-top:8px;">View Certificate</a>
                        </div>
                    ` : ''}
                    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;">
                        <a href="${COURSE_ID ? `learn.html?courseId=${COURSE_ID}` : 'dashboard.html'}" class="btn btn-primary">${COURSE_ID ? '📚 Back to Course' : '📊 Dashboard'}</a>
                        ${!passed ? `<button class="btn btn-ghost" onclick="location.reload()">🔄 Retry Quiz</button>` : ''}
                    </div>
                    <p style="font-size:0.7rem;color:var(--text-muted);margin-top:12px;">
                        Result ID: ${resultId}
                    </p>
                </div>
            `;

            // Append result to container
            const container = document.getElementById('quizContainer');
            const submitCard = container.querySelector('.card:last-child');
            if (submitCard) submitCard.remove();

            container.insertAdjacentHTML('beforeend', resultHtml);

            // Scroll to result
            setTimeout(() => {
                document.querySelector('.result-box')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        // ==================== UTILITY ====================
        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function escapeAttr(s) {
            return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ==================== ANTI-CHEAT ====================
        let tabSwitchCount = 0;
        let tabSwitchTimeout = null;

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && !submitted && questions.length > 0) {
                tabSwitchCount++;
                if (tabSwitchTimeout) clearTimeout(tabSwitchTimeout);
                tabSwitchTimeout = setTimeout(() => { tabSwitchCount = 0; }, 5000);

                if (tabSwitchCount >= 3) {
                    alert('⚠️ Excessive tab switching detected. Quiz will be auto-submitted.');
                    submitQuiz();
                } else {
                    const remaining = 3 - tabSwitchCount;
                    // Show subtle warning
                    const warning = document.getElementById('tabWarning');
                    if (!warning) {
                        const w = document.createElement('div');
                        w.id = 'tabWarning';
                        w.style.cssText = `
                            position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
                            background:var(--warning-bg);border:1px solid #f0c000;
                            padding:10px 20px;border-radius:var(--radius-sm);
                            font-size:0.8rem;font-weight:600;color:var(--warning);
                            z-index:999;box-shadow:var(--shadow-md);
                        `;
                        w.textContent = `⚠️ Please stay on the quiz page. ${remaining} warning${remaining > 1 ? 's' : ''} remaining.`;
                        document.body.appendChild(w);
                        setTimeout(() => w.remove(), 3000);
                    }
                }
            }
        });

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', (e) => {
            // Ctrl+Enter to submit
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                if (!submitted) submitQuiz();
            }
            // Escape to cancel
            if (e.key === 'Escape') {
                const warning = document.getElementById('tabWarning');
                if (warning) warning.remove();
            }
        });

        console.log('✅ TRIANGLE LEARN Quiz Loaded');
        console.log(`📝 Quiz ID: ${QUIZ_ID}, Mode: ${EXAM_MODE ? 'Exam' : 'Quiz'}`);

    })();
    </script>
</body>
</html>
