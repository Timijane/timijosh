<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Board — TRIANGLE LEARN</title>
    <meta name="description" content="Browse and apply for tech jobs from top employers on TRIANGLE LEARN.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f8;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --cyan: #00c4cc;
            --green: #0d9488;
            --red: #e74c3c;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #e8ecf2;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.08);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --base-width: 1200px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            font-size: 18px;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            width: var(--base-width);
            min-width: var(--base-width);
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
        }
        @media screen and (max-width: 1220px) {
            body {
                transform-origin: top left;
                transform: scale(calc(100vw / var(--base-width)));
                width: var(--base-width);
                min-width: var(--base-width);
                height: calc(100vh / (100vw / var(--base-width)));
            }
        }
        @supports (-webkit-overflow-scrolling: touch) {
            @media screen and (max-width: 1220px) {
                html { width: 100vw; overflow-x: hidden; }
                body {
                    transform-origin: top left;
                    transform: scale(calc(100vw / var(--base-width)));
                }
            }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* ===== HEADER ===== */
        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-link { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-link img { height: 34px; width: auto; }
        .logo-link span {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .header-actions { display: flex; align-items: center; gap: 12px; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 22px;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            border: none;
            font-family: var(--font-body);
            text-decoration: none;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn-sm { padding: 6px 14px; font-size: 0.75rem; }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(232,67,147,0.25); }
        .btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
        .btn-outline:hover { border-color: var(--purple); color: var(--purple); }
        .btn-gold { background: var(--gold); color: #fff; }
        .btn-success { background: var(--green); color: #fff; }

        /* ===== MAIN ===== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px 60px;
        }

        /* ===== SEARCH BAR ===== */
        .search-section {
            margin-bottom: 28px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 28px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            background: #fff;
            transition: border 0.2s;
        }
        .search-bar input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(108,92,231,0.08);
        }
        .search-bar select {
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 28px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            background: #fff;
            cursor: pointer;
            min-width: 150px;
        }
        .search-bar select:focus {
            border-color: var(--purple);
        }
        .results-count {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ===== JOB CARD ===== */
        .job-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            padding: 20px 22px;
            margin-bottom: 14px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .job-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--purple);
        }
        .job-card .job-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }
        .job-card .job-info { flex: 1; min-width: 200px; }
        .job-card .job-info h3 {
            font-family: var(--font-heading);
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .job-card .job-info .company {
            font-size: 0.85rem;
            color: var(--purple);
            font-weight: 600;
        }
        .job-card .job-meta {
            display: flex;
            gap: 14px;
            margin-top: 8px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .job-card .job-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .job-card .job-tags {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .job-tag {
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 0.72rem;
            font-weight: 500;
            background: #f3f0ff;
            color: var(--purple);
        }
        .job-card .job-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-success { background: #e8f8f0; color: var(--green); }
        .badge-info { background: #eff6ff; color: #3b82f6; }
        .badge-warning { background: #fff8e6; color: #d97706; }

        /* ===== JOB DETAIL MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 28px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalPop 0.3s ease;
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h2 {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 700;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }
        .modal-close:hover { color: var(--text); }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state h3 { font-weight: 600; font-size: 1rem; color: var(--text); margin-bottom: 6px; }
        .empty-state p { font-size: 0.88rem; }

        /* ===== SKELETON ===== */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f5 25%, #e8e8f0 50%, #f0f0f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton-card { height: 140px; margin-bottom: 14px; border-radius: var(--radius-md); }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 400px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.88rem;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .toast-success { background: var(--green); }
        .toast-error { background: var(--red); }
        .toast-info { background: var(--purple); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <a href="index.html" class="logo-link">
            <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="TRIANGLE LEARN" width="34" height="34">
            <span>TRIANGLE LEARN</span>
        </a>
        <div class="header-actions">
            <a href="learner-dashboard.html" class="btn btn-outline btn-sm">← Dashboard</a>
        </div>
    </header>

    <!-- MAIN -->
    <div class="main-container">

        <!-- SEARCH -->
        <div class="search-section">
            <h1 style="font-family:var(--font-heading);font-size:1.5rem;font-weight:700;margin-bottom:16px;">💼 Job Board</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search jobs by title, skill, or company..." oninput="filterJobs()">
                <select id="filterType" onchange="filterJobs()">
                    <option value="">All Types</option>
                    <option value="full-time">Full-Time</option>
                    <option value="part-time">Part-Time</option>
                    <option value="contract">Contract</option>
                    <option value="remote">Remote</option>
                    <option value="hybrid">Hybrid</option>
                </select>
                <select id="filterExperience" onchange="filterJobs()">
                    <option value="">All Levels</option>
                    <option value="entry">Entry Level</option>
                    <option value="mid">Mid Level</option>
                    <option value="senior">Senior</option>
                    <option value="lead">Lead / Manager</option>
                </select>
            </div>
            <div class="results-count" id="resultsCount">Loading jobs...</div>
        </div>

        <!-- SKELETON LOADING -->
        <div id="skeletonContainer">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>

        <!-- JOB LIST -->
        <div id="jobList"></div>
    </div>

    <!-- JOB DETAIL MODAL -->
    <div class="modal-overlay" id="jobDetailModal">
        <div class="modal-content" id="jobDetailContent"></div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        'use strict';

        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allJobs = [];
        let currentUser = null;
        let userData = null;

        const $ = (sel) => document.querySelector(sel);

        function showToast(message, type = 'success') {
            const container = $('#toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function timeAgo(date) {
            const diff = Math.floor((Date.now() - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
            return date.toDateString();
        }

        // ============ AUTH ============
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                try {
                    const doc = await db.collection('users').doc(user.uid).get();
                    if (doc.exists) userData = doc.data();
                } catch (e) {}
            }
            loadJobs();
        });

        // ============ LOAD JOBS ============
        async function loadJobs() {
            try {
                const snap = await db.collection('jobs')
                    .where('status', '==', 'active')
                    .orderBy('postedAt', 'desc')
                    .get();

                allJobs = [];
                snap.forEach(doc => allJobs.push({ id: doc.id, ...doc.data() }));
                $('#skeletonContainer').style.display = 'none';
                renderJobs(allJobs);
            } catch (e) {
                console.error('Load jobs error:', e);
                $('#skeletonContainer').style.display = 'none';
                $('#jobList').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Failed to load jobs</h3><p>Please try again later.</p></div>';
            }
        }

        // ============ RENDER JOBS ============
        function renderJobs(jobs) {
            const container = $('#jobList');
            $('#resultsCount').textContent = `${jobs.length} job${jobs.length !== 1 ? 's' : ''} found`;

            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <h3>No Jobs Found</h3>
                        <p>Try adjusting your search filters or check back later.</p>
                    </div>`;
                return;
            }

            container.innerHTML = jobs.map(job => {
                const skills = Array.isArray(job.skills) ? job.skills : [];
                const postedDate = job.postedAt?.toDate ? timeAgo(job.postedAt.toDate()) : '';
                return `
                    <div class="job-card" onclick="openJobDetail('${job.id}')">
                        <div class="job-top">
                            <div class="job-info">
                                <h3>${escapeHtml(job.title)}</h3>
                                <div class="company">${escapeHtml(job.companyName || 'Company')}</div>
                                <div class="job-meta">
                                    <span>📍 ${escapeHtml(job.location || 'Remote')}</span>
                                    <span>💼 ${escapeHtml(job.type || 'Full-Time')}</span>
                                    <span>🎯 ${escapeHtml(job.experience || 'Any Level')}</span>
                                    ${job.salary ? `<span>💰 ${escapeHtml(job.salary)}</span>` : ''}
                                    <span>🕐 ${postedDate}</span>
                                </div>
                                ${skills.length > 0 ? `
                                    <div class="job-tags">
                                        ${skills.slice(0, 5).map(s => `<span class="job-tag">${escapeHtml(s)}</span>`).join('')}
                                        ${skills.length > 5 ? `<span class="job-tag">+${skills.length - 5} more</span>` : ''}
                                    </div>` : ''}
                            </div>
                            <div class="job-actions">
                                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); openJobDetail('${job.id}')">View</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // ============ FILTER ============
        window.filterJobs = function() {
            const search = ($('#searchInput').value || '').toLowerCase();
            const type = $('#filterType').value;
            const experience = $('#filterExperience').value;

            const filtered = allJobs.filter(job => {
                const matchSearch = !search ||
                    (job.title || '').toLowerCase().includes(search) ||
                    (job.companyName || '').toLowerCase().includes(search) ||
                    (job.skills || []).some(s => s.toLowerCase().includes(search));
                const matchType = !type || job.type === type;
                const matchExp = !experience || job.experience === experience;
                return matchSearch && matchType && matchExp;
            });

            renderJobs(filtered);
        };

        // ============ JOB DETAIL MODAL ============
        window.openJobDetail = function(jobId) {
            const job = allJobs.find(j => j.id === jobId);
            if (!job) return;

            const skills = Array.isArray(job.skills) ? job.skills : [];
            const postedDate = job.postedAt?.toDate ? job.postedAt.toDate().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
            const deadline = job.deadline ? new Date(job.deadline).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Open';

            $('#jobDetailContent').innerHTML = `
                <div class="modal-header">
                    <h2>${escapeHtml(job.title)}</h2>
                    <button class="modal-close" onclick="closeJobDetail()">✕</button>
                </div>
                <div style="margin-bottom:12px;">
                    <span style="font-size:0.95rem;font-weight:600;color:var(--purple);">${escapeHtml(job.companyName || 'Company')}</span>
                </div>
                <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;font-size:0.85rem;color:var(--text-muted);">
                    <span>📍 ${escapeHtml(job.location || 'Remote')}</span>
                    <span>💼 ${escapeHtml(job.type || 'Full-Time')}</span>
                    <span>🎯 ${escapeHtml(job.experience || 'Any Level')}</span>
                    ${job.salary ? `<span>💰 ${escapeHtml(job.salary)}</span>` : ''}
                    <span>📅 Posted: ${postedDate}</span>
                    <span>⏰ Deadline: ${deadline}</span>
                </div>
                ${skills.length > 0 ? `
                    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
                        ${skills.map(s => `<span style="background:#f3f0ff;color:var(--purple);padding:4px 12px;border-radius:14px;font-size:0.8rem;">${escapeHtml(s)}</span>`).join('')}
                    </div>` : ''}
                <div style="margin-bottom:20px;">
                    <strong style="font-size:0.9rem;">📋 Job Description</strong>
                    <div style="margin-top:8px;font-size:0.88rem;color:var(--text-secondary);line-height:1.8;white-space:pre-wrap;">${escapeHtml(job.description || 'No description provided.')}</div>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="applyForJob('${job.id}')" style="padding:12px 28px;font-size:0.9rem;">
                        🚀 Apply Now
                    </button>
                    <button class="btn btn-outline" onclick="closeJobDetail()">Close</button>
                </div>
                <p style="font-size:0.75rem;color:var(--text-muted);margin-top:10px;">
                    💡 Your full profile, skills, and certificates will be automatically shared with the employer when you apply.
                </p>
            `;

            $('#jobDetailModal').classList.add('open');
        };

        window.closeJobDetail = function() {
            $('#jobDetailModal').classList.remove('open');
        };

        // ============ APPLY FOR JOB ============
        window.applyForJob = async function(jobId) {
            if (!currentUser) {
                showToast('Please login to apply for jobs.', 'error');
                setTimeout(() => { window.location.href = 'auth.html'; }, 1500);
                return;
            }

            // Check if already applied
            try {
                const existing = await db.collection('job_applications')
                    .where('userId', '==', currentUser.uid)
                    .where('jobId', '==', jobId)
                    .limit(1)
                    .get();

                if (!existing.empty) {
                    showToast('You have already applied for this job.', 'info');
                    return;
                }
            } catch (e) {}

            const job = allJobs.find(j => j.id === jobId);
            if (!job) return;

            try {
                // Submit application with full profile data
                await db.collection('job_applications').add({
                    jobId: jobId,
                    jobTitle: job.title || '',
                    userId: currentUser.uid,
                    fullName: userData?.fullName || currentUser.displayName || 'Candidate',
                    email: userData?.email || currentUser.email || '',
                    phone: userData?.phone || '',
                    bio: userData?.bio || '',
                    skills: userData?.skills || [],
                    jobTitle_candidate: userData?.jobTitle || '',
                    company: userData?.company || '',
                    location: userData?.location || '',
                    socialLinks: userData?.socialLinks || {},
                    workExperience: userData?.workExperience || [],
                    education: userData?.education || [],
                    profilePicture: userData?.profilePicture || null,
                    resumeUrl: userData?.resumeUrl || null,
                    status: 'pending',
                    appliedAt: firebase.firestore.FieldValue.serverTimestamp(),
                });

                showToast('✅ Application submitted successfully! Your profile has been shared with the employer.', 'success');
                closeJobDetail();

            } catch (e) {
                console.error('Apply error:', e);
                showToast('Failed to submit application. Please try again.', 'error');
            }
        };

        // ============ CLOSE MODAL ON OVERLAY CLICK ============
        $('#jobDetailModal').addEventListener('click', function(e) {
            if (e.target === this) closeJobDetail();
        });

        // ============ KEYBOARD ============
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeJobDetail();
        });

        console.log('✅ Job Board Ready');
    })();
    </script>
</body>
</html>
