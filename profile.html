<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Profile — TRIANGLE LEARN</title>
    <meta name="description" content="Manage your TRIANGLE LEARN profile, referral code, and earnings.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fc;
            --bg-card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aa0;
            --gold: #f0a500;
            --pink: #e84393;
            --purple: #6c5ce7;
            --gradient: linear-gradient(135deg, #f0a500 0%, #e84393 50%, #6c5ce7 100%);
            --border: #eef0f5;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.08);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --font-heading: 'Sora', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --success: #0d9488;
            --success-bg: #e8f8f0;
            --danger: #e74c3c;
            --danger-bg: #fff0f0;
            --warning: #e65100;
            --warning-bg: #fff3e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            padding: 12px 24px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-link { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-link img { height: 32px; }
        .logo-link span { font-family: var(--font-heading); font-weight: 700; font-size: 1rem; color: var(--text); }
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
            border-radius: 22px; font-weight: 600; font-size: 0.82rem; cursor: pointer;
            border: none; text-decoration: none; font-family: var(--font-body);
            transition: all 0.3s ease; white-space: nowrap;
        }
        .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
        .btn-ghost:hover { border-color: var(--purple); color: var(--purple); }
        .btn-filled { background: var(--gradient); color: #fff; }
        .btn-filled:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(232,67,147,0.3); }
        .btn-sm { padding: 5px 12px; font-size: 0.72rem; }

        .main-container { max-width: 800px; margin: 30px auto; padding: 0 20px; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-header h2 {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.78rem; font-weight: 600; margin-bottom: 4px; }
        .form-group input {
            width: 100%; padding: 10px 14px;
            border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            font-family: var(--font-body); font-size: 0.9rem;
            outline: none; transition: border 0.2s;
        }
        .form-group input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(108,92,231,0.08); }
        .form-group input:disabled { background: #f0f0f5; color: var(--text-muted); }

        .ref-box {
            background: var(--gradient);
            color: #fff;
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
        }
        .ref-box h3 { font-family: var(--font-heading); font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; }
        .ref-box p { font-size: 0.8rem; opacity: 0.9; margin-bottom: 12px; }
        .ref-link-copy {
            display: flex; gap: 6px; background: rgba(255,255,255,0.2);
            border-radius: 25px; padding: 4px; margin-bottom: 8px;
        }
        .ref-link-copy input {
            flex: 1; background: transparent; border: none; color: #fff;
            padding: 6px 12px; font-size: 0.78rem; font-family: var(--font-body);
            outline: none; min-width: 0;
        }
        .ref-link-copy input::placeholder { color: rgba(255,255,255,0.6); }
        .ref-link-copy button {
            background: #fff; color: var(--purple); border: none;
            border-radius: 22px; padding: 8px 16px; font-weight: 700;
            font-size: 0.75rem; cursor: pointer; font-family: var(--font-body);
            transition: all 0.2s; white-space: nowrap;
        }
        .ref-link-copy button:hover { transform: scale(1.04); }
        .earnings { font-size: 0.85rem; opacity: 0.9; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; }
        .badge {
            font-size: 0.65rem; font-weight: 700; padding: 2px 8px;
            border-radius: 10px; text-transform: uppercase;
        }
        .badge-paid { background: var(--success-bg); color: var(--success); }
        .badge-pending { background: var(--warning-bg); color: var(--warning); }
        .empty-state { text-align: center; padding: 30px; color: var(--text-muted); }

        .loading-spinner {
            display: inline-block; width: 24px; height: 24px;
            border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--purple);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .alert {
            padding: 12px 16px; border-radius: var(--radius-sm);
            font-size: 0.82rem; margin-bottom: 16px; display: none;
        }
        .alert-success { background: var(--success-bg); color: var(--success); display: block; }
        .alert-error { background: var(--danger-bg); color: var(--danger); display: block; }

        @media (max-width: 600px) {
            .header { padding: 10px 16px; }
            .main-container { padding: 0 12px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="dashboard.html" class="logo-link">
            <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="Logo">
            <span>TRIANGLE LEARN</span>
        </a>
        <a href="dashboard.html" class="btn btn-ghost btn-sm">← Dashboard</a>
    </header>

    <div class="main-container" id="profileContainer">
        <div class="card" style="text-align:center;"><div class="loading-spinner" style="margin:40px auto;"></div></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userData = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'auth.html'; return; }
            currentUser = user;
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    window.location.href = 'dashboard.html';
                    return;
                }
                userData = { id: userDoc.id, ...userDoc.data() };
                renderProfile();
                loadReferralDetails();
            } catch (e) {
                document.getElementById('profileContainer').innerHTML =
                    '<div class="card"><p style="color:var(--danger);">Failed to load profile.</p></div>';
            }
        });

        function renderProfile() {
            const u = userData;
            const referralLink = u.referralLink || (u.referralCode ? `${window.location.origin}/auth.html?ref=${u.referralCode}` : 'Complete enrollment to get your link');

            document.getElementById('profileContainer').innerHTML = `
                <div class="card">
                    <div class="card-header"><h2>👤 Personal Information</h2></div>
                    <div id="profileAlert"></div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editName" value="${escapeHtml(u.fullName || '')}">
                    </div>
                    <div class="form-group">
                        <label>Email (cannot be changed)</label>
                        <input type="email" value="${escapeHtml(u.email || '')}" disabled>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="editPhone" value="${escapeHtml(u.phone || '')}">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" id="editWhatsapp" value="${escapeHtml(u.whatsapp || '')}">
                    </div>
                    <button class="btn btn-filled" id="saveProfileBtn">💾 Save Changes</button>
                </div>

                <div class="ref-box">
                    <h3>💰 Your Referral Program</h3>
                    <p>Share your unique link. Earn 20% commission on every enrollment.</p>
                    <div class="ref-link-copy">
                        <input type="text" id="refLink" value="${escapeHtml(referralLink)}" readonly onclick="this.select()">
                        <button id="copyRefBtn">Copy</button>
                    </div>
                    <div class="earnings">
                        Your code: <strong>${escapeHtml(u.referralCode || 'Not available')}</strong>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h2>📊 Referral History</h2></div>
                    <div id="referralHistory"><div class="loading-spinner" style="margin:20px auto;"></div></div>
                </div>`;

            document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);
            document.getElementById('copyRefBtn').addEventListener('click', copyRefLink);
        }

        async function saveProfile() {
            const btn = document.getElementById('saveProfileBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    fullName: document.getElementById('editName').value.trim(),
                    phone: document.getElementById('editPhone').value.trim(),
                    whatsapp: document.getElementById('editWhatsapp').value.trim(),
                });
                showAlert('profileAlert', 'Profile updated successfully!', 'success');
                userData.fullName = document.getElementById('editName').value.trim();
                userData.phone = document.getElementById('editPhone').value.trim();
                userData.whatsapp = document.getElementById('editWhatsapp').value.trim();
            } catch (e) {
                showAlert('profileAlert', 'Failed to save: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '💾 Save Changes';
            }
        }

        function copyRefLink() {
            const input = document.getElementById('refLink');
            if (!input.value || input.value.includes('Complete enrollment')) {
                alert('Complete enrollment to get your referral link.');
                return;
            }
            input.select();
            document.execCommand('copy');
            const btn = document.getElementById('copyRefBtn');
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
        }

        async function loadReferralDetails() {
            try {
                const snap = await db.collection('referrals')
                    .where('referrerUid', '==', currentUser.uid)
                    .orderBy('createdAt', 'desc')
                    .get();

                const historyDiv = document.getElementById('referralHistory');
                if (snap.empty) {
                    historyDiv.innerHTML = '<div class="empty-state">No referrals yet. Share your link to start earning!</div>';
                    // Update total in referral box
                    const earningsSpan = document.querySelector('.ref-box .earnings');
                    if (earningsSpan) earningsSpan.innerHTML += '<br>Total earned: <strong>₦0</strong>';
                    return;
                }

                let totalEarned = 0;
                let rows = '';
                snap.forEach(doc => {
                    const r = doc.data();
                    if (r.status === 'paid') totalEarned += (r.commissionAmount || 0);
                    const date = r.createdAt?.toDate?.().toDateString() || '—';
                    const statusClass = r.status === 'paid' ? 'badge-paid' : 'badge-pending';
                    rows += `<tr>
                        <td>${escapeHtml(r.referredName || '—')}</td>
                        <td>${escapeHtml(r.referredEmail || '—')}</td>
                        <td><span class="badge ${statusClass}">${r.status || 'pending'}</span></td>
                        <td>₦${(r.commissionAmount || 0).toLocaleString()}</td>
                        <td>${date}</td>
                    </tr>`;
                });

                historyDiv.innerHTML = `
                    <table>
                        <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Commission</th><th>Date</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>`;

                const earningsSpan = document.querySelector('.ref-box .earnings');
                if (earningsSpan) earningsSpan.innerHTML += `<br>Total earned: <strong>₦${totalEarned.toLocaleString()}</strong>`;
            } catch (e) {
                document.getElementById('referralHistory').innerHTML = '<p style="color:var(--danger);">Failed to load referrals.</p>';
            }
        }

        function showAlert(containerId, message, type) {
            const el = document.getElementById(containerId);
            if (!el) return;
            el.className = `alert alert-${type}`;
            el.textContent = message;
            setTimeout(() => { el.className = 'alert'; }, 4000);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }
    })();
    </script>
</body>
</html>
