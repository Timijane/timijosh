<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard | Triangletech</title>
    <meta name="description" content="Triangletech admin dashboard — manage courses, students, tests, projects, certificates and more.">
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        :root {
            --white: #FFFFFF;
            --off-white: #F8F9FA;
            --light-gray: #F3F4F6;
            --mid-gray: #E5E7EB;
            --dark-gray: #6B7280;
            --deep-black: #0A0A0A;
            --near-black: #111111;
            --charcoal: #1A1A1A;
            --red: #DC2626;
            --dark-red: #B91C1C;
            --orange-red: #F97316;
            --gradient-red: linear-gradient(135deg, #DC2626 0%, #F97316 100%);
            --gradient-red-dark: linear-gradient(135deg, #B91C1C 0%, #DC2626 50%, #F97316 100%);
            --gradient-red-subtle: linear-gradient(135deg, rgba(220, 38, 38, 0.08) 0%, rgba(249, 115, 22, 0.08) 100%);
            --font-heading: 'Space Grotesk', 'Inter', sans-serif;
            --font-body: 'Inter', 'Segoe UI', sans-serif;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 50px rgba(0,0,0,0.15);
            --shadow-red: 0 8px 30px rgba(220, 38, 38, 0.2);
            --transition-fast: 0.2s cubic-bezier(0.4,0,0.2,1);
            --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px; --radius-xl: 28px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            background: var(--deep-black);
            color: var(--white);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        a { color: inherit; text-decoration: none; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(18,18,18,0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            position: fixed;
            top:0; left:0; bottom:0;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar-logo {
            padding: 28px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-logo img { height: 42px; }
        .sidebar-nav {
            flex:1;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
        }
        .sidebar-nav button {
            display: flex; align-items: center; gap: 12px;
            background: transparent; border: none;
            color: rgba(255,255,255,0.65);
            padding: 12px 16px; border-radius: var(--radius-md);
            font-family: var(--font-body); font-weight: 500; font-size: 0.9rem;
            cursor: pointer; transition: var(--transition-fast);
            text-align: left; width: 100%;
        }
        .sidebar-nav button:hover, .sidebar-nav button.active {
            background: var(--gradient-red-subtle);
            color: var(--orange-red);
        }
        .sidebar-nav button.active {
            background: rgba(220,38,38,0.15);
            box-shadow: inset 3px 0 0 var(--red);
        }
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .admin-info {
            display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
        }
        .admin-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--gradient-red);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: white; overflow: hidden; flex-shrink: 0;
        }
        .admin-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .admin-name { font-weight: 600; font-size: 0.9rem; }
        .admin-email { font-size: 0.75rem; color: rgba(255,255,255,0.5); }
        .logout-btn {
            width: 100%; padding: 10px;
            border: 1px solid rgba(255,255,255,0.15); background: transparent;
            color: rgba(255,255,255,0.7); border-radius: 50px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: var(--transition-fast);
        }
        .logout-btn:hover { background: rgba(220,38,38,0.2); border-color: var(--red); color: white; }

        /* Main Content */
        .main {
            flex:1; margin-left: 260px; padding: 32px 28px;
            min-height: 100vh; transition: margin-left 0.3s ease;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
        }
        .page-title { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 700; }
        .hamburger-menu { display: none; background: none; border: none; color: white; font-size: 1.6rem; cursor: pointer; }

        /* Cards / Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
            gap: 20px; margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(26,26,26,0.7); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius-lg);
            padding: 20px; text-align: center;
        }
        .stat-card .stat-value { font-family: var(--font-heading); font-size: 2.2rem; font-weight: 700; color: var(--orange-red); }
        .stat-card .stat-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 4px; }

        /* Table */
        .table-wrapper {
            background: rgba(26,26,26,0.6); border-radius: var(--radius-lg);
            border: 1px solid rgba(255,255,255,0.06); overflow-x: auto; margin-top: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 14px 18px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); }
        th { font-weight: 600; color: rgba(255,255,255,0.7); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        /* Buttons */
        .btn {
            padding: 8px 16px; border-radius: 50px; font-weight: 600;
            font-size: 0.85rem; cursor: pointer; border: none;
            transition: var(--transition-fast); display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--gradient-red); color: white; box-shadow: var(--shadow-red); }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        .btn-danger { background: transparent; border: 1px solid rgba(239,68,68,0.5); color: #EF4444; }
        .btn-success { background: transparent; border: 1px solid rgba(34,197,94,0.5); color: #22C55E; }
        .btn-warning { background: transparent; border: 1px solid rgba(249,115,22,0.5); color: #F97316; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.25s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal {
            background: var(--charcoal); border-radius: var(--radius-xl);
            padding: 32px; width: 90%; max-width: 700px; max-height: 85vh;
            overflow-y: auto; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: var(--shadow-xl);
        }
        .modal h2 { font-family: var(--font-heading); margin-bottom: 24px; font-size: 1.5rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.85rem; color: rgba(255,255,255,0.7); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 14px; border: 2px solid rgba(255,255,255,0.12);
            border-radius: 10px; background: rgba(255,255,255,0.05);
            color: white; font-family: var(--font-body); font-size: 0.9rem;
        }
        .editor-container { background: white; border-radius: 10px; color: black; min-height: 200px; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .hamburger-menu { display: block; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="Triangletech">
        </div>
        <nav class="sidebar-nav">
            <button class="active" data-view="dashboard">📊 Dashboard</button>
            <button data-view="courses">📚 Courses</button>
            <button data-view="students">👥 Students</button>
            <button data-view="tests">📝 Tests & Scores</button>
            <button data-view="projects">🛠️ Projects</button>
            <button data-view="certificates">🎓 Certificates</button>
            <button data-view="profile">👤 Profile Settings</button>
        </nav>
        <div class="sidebar-footer">
            <div class="admin-info" id="adminInfo">
                <div class="admin-avatar" id="adminAvatar">A</div>
                <div>
                    <div class="admin-name" id="adminName">Admin</div>
                    <div class="admin-email" id="adminEmail">admin@triangletech.com</div>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="mainContent">
        <div class="top-bar">
            <button class="hamburger-menu" id="hamburgerBtn">☰</button>
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
            <button class="btn btn-primary" id="addItemBtn" style="display:none;">+ New</button>
        </div>

        <!-- Views -->
        <div id="dashboardView" class="view"><div class="stats-grid" id="statsGrid"></div></div>
        <div id="coursesView" class="view hidden"><div class="table-wrapper" id="coursesTableWrapper"></div></div>
        <div id="studentsView" class="view hidden"><div class="table-wrapper" id="studentsTableWrapper"></div></div>
        <div id="testsView" class="view hidden"><div class="table-wrapper" id="testsTableWrapper"></div></div>
        <div id="projectsView" class="view hidden"><div class="table-wrapper" id="projectsTableWrapper"></div></div>
        <div id="certificatesView" class="view hidden"><div class="table-wrapper" id="certificatesTableWrapper"></div></div>
        <div id="profileView" class="view hidden" style="max-width:500px;margin:0 auto;">
            <div class="form-group">
                <label>Profile Picture</label>
                <div style="display:flex;align-items:center;gap:16px;">
                    <div class="admin-avatar" style="width:70px;height:70px;font-size:1.6rem;" id="profileAvatar">A</div>
                    <button class="btn btn-outline" id="uploadPicBtn">Change Picture</button>
                </div>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="profileName" placeholder="Your name">
            </div>
            <button class="btn btn-primary" id="saveProfileBtn">Save Profile</button>
        </div>
    </main>

    <!-- Generic Modal -->
    <div class="modal-overlay" id="genericModal">
        <div class="modal" id="genericModalContent">
            <!-- Dynamically filled -->
        </div>
    </div>

    <script>
        (function() {
            // Firebase init
            const firebaseConfig = {
                apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
                authDomain: "timijosh-b8bee.firebaseapp.com",
                projectId: "timijosh-b8bee",
                storageBucket: "timijosh-b8bee.firebasestorage.app",
                messagingSenderId: "779082784462",
                appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
                measurementId: "G-ZPS8VP8ZBX"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            const CLOUD_NAME = 'dmbjrohtn';
            const UPLOAD_PRESET = 'triangletech_unsigned'; // Replace with your actual unsigned preset
            const ADMIN_EMAIL = 'okewunmitimileyin23@gmail.com';

            // DOM elements
            const sidebar = document.getElementById('sidebar');
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const navButtons = document.querySelectorAll('.sidebar-nav button');
            const views = {
                dashboard: document.getElementById('dashboardView'),
                courses: document.getElementById('coursesView'),
                students: document.getElementById('studentsView'),
                tests: document.getElementById('testsView'),
                projects: document.getElementById('projectsView'),
                certificates: document.getElementById('certificatesView'),
                profile: document.getElementById('profileView')
            };
            const pageTitle = document.getElementById('pageTitle');
            const addItemBtn = document.getElementById('addItemBtn');
            const genericModal = document.getElementById('genericModal');
            const genericModalContent = document.getElementById('genericModalContent');
            const adminAvatar = document.getElementById('adminAvatar');
            const adminName = document.getElementById('adminName');
            const adminEmail = document.getElementById('adminEmail');
            const profileAvatar = document.getElementById('profileAvatar');
            const profileNameInput = document.getElementById('profileName');
            const saveProfileBtn = document.getElementById('saveProfileBtn');
            const uploadPicBtn = document.getElementById('uploadPicBtn');
            const logoutBtn = document.getElementById('logoutBtn');

            let currentUser = null;
            let currentView = 'dashboard';
            let quillInstance = null;

            // Auth
            auth.onAuthStateChanged(async (user) => {
                if (!user) { window.location.href = 'auth.html'; return; }
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists || doc.data().role !== 'admin') {
                    await auth.signOut();
                    window.location.href = 'auth.html';
                    return;
                }
                currentUser = { uid: user.uid, ...doc.data() };
                initUI();
            });

            function initUI() {
                adminName.textContent = currentUser.name || 'Admin';
                adminEmail.textContent = currentUser.email;
                if (currentUser.profilePicUrl) {
                    adminAvatar.innerHTML = `<img src="${currentUser.profilePicUrl}" alt="Profile">`;
                    profileAvatar.innerHTML = `<img src="${currentUser.profilePicUrl}" alt="Profile">`;
                } else {
                    adminAvatar.textContent = (currentUser.name || 'A').charAt(0).toUpperCase();
                    profileAvatar.textContent = (currentUser.name || 'A').charAt(0).toUpperCase();
                }
                profileNameInput.value = currentUser.name || '';
                switchView('dashboard');
            }

            // Navigation
            navButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const view = btn.dataset.view;
                    switchView(view);
                });
            });
            hamburgerBtn.addEventListener('click', () => sidebar.classList.toggle('open'));

            function switchView(view) {
                currentView = view;
                navButtons.forEach(b => b.classList.remove('active'));
                const activeBtn = document.querySelector(`[data-view="${view}"]`);
                if (activeBtn) activeBtn.classList.add('active');
                Object.values(views).forEach(v => v.classList.add('hidden'));
                views[view].classList.remove('hidden');
                pageTitle.textContent = view.charAt(0).toUpperCase() + view.slice(1);
                addItemBtn.style.display = (view === 'courses' || view === 'tests' || view === 'projects' || view === 'certificates') ? 'inline-flex' : 'none';
                addItemBtn.textContent = `+ New ${view === 'certificates' ? 'Certificate' : view.slice(0,-1)}`;
                loadViewData(view);
                if (window.innerWidth < 768) sidebar.classList.remove('open');
            }

            async function loadViewData(view) {
                switch(view) {
                    case 'dashboard': loadDashboardStats(); break;
                    case 'courses': loadCourses(); break;
                    case 'students': loadStudents(); break;
                    case 'tests': loadTests(); break;
                    case 'projects': loadProjects(); break;
                    case 'certificates': loadCertificates(); break;
                }
            }

            // Dashboard
            async function loadDashboardStats() {
                const [coursesSnap, usersSnap, enrollSnap, testsSnap, projectsSnap, certsSnap] = await Promise.all([
                    db.collection('courses').get(),
                    db.collection('users').where('role','==','learner').get(),
                    db.collection('enrollments').get(),
                    db.collection('tests').get(),
                    db.collection('projects').get(),
                    db.collection('certificates').get()
                ]);
                let completed = 0;
                enrollSnap.forEach(d => { if (d.data().status === 'completed') completed++; });
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="stat-value">${coursesSnap.size}</div><div class="stat-label">Courses</div></div>
                    <div class="stat-card"><div class="stat-value">${usersSnap.size}</div><div class="stat-label">Students</div></div>
                    <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Completed</div></div>
                    <div class="stat-card"><div class="stat-value">${testsSnap.size}</div><div class="stat-label">Tests</div></div>
                    <div class="stat-card"><div class="stat-value">${projectsSnap.size}</div><div class="stat-label">Projects</div></div>
                    <div class="stat-card"><div class="stat-value">${certsSnap.size}</div><div class="stat-label">Certificates</div></div>
                `;
            }

            // Courses
            async function loadCourses() {
                const snap = await db.collection('courses').orderBy('createdAt','desc').get();
                let html = `<table><thead><tr><th>Title</th><th>Type</th><th>Actions</th></tr></thead><tbody>`;
                snap.forEach(doc => {
                    const d = doc.data();
                    html += `<tr><td>${d.title}</td><td>${d.type}</td>
                        <td>
                            <button class="btn btn-sm btn-outline edit-course" data-id="${doc.id}">✏️</button>
                            <button class="btn btn-sm btn-danger delete-course" data-id="${doc.id}">🗑️</button>
                        </td></tr>`;
                });
                html += `</tbody></table>`;
                document.getElementById('coursesTableWrapper').innerHTML = html;
                addCourseEventListeners();
            }

            function addCourseEventListeners() {
                document.querySelectorAll('.edit-course').forEach(b => b.addEventListener('click', () => openCourseModal(b.dataset.id)));
                document.querySelectorAll('.delete-course').forEach(b => b.addEventListener('click', () => deleteCourse(b.dataset.id)));
            }

            addItemBtn.addEventListener('click', () => {
                if (currentView === 'courses') openCourseModal();
                else if (currentView === 'tests') openTestModal();
                else if (currentView === 'projects') openProjectModal();
                else if (currentView === 'certificates') openCertificateModal();
            });

            function openCourseModal(id = null) {
                genericModal.classList.add('active');
                const isEdit = !!id;
                let html = `
                    <h2>${isEdit ? 'Edit' : 'New'} Course</h2>
                    <div class="form-group"><label>Title</label><input type="text" id="courseTitle" placeholder="Course title"></div>
                    <div class="form-group"><label>Type</label><select id="courseType"><option value="text">Rich Text</option><option value="pdf">PDF</option></select></div>
                    <div id="textContainer"><div class="form-group"><label>Content</label><div id="quillEditor" class="editor-container"></div></div></div>
                    <div id="pdfContainer" class="hidden"><div class="form-group"><label>PDF</label><button class="btn btn-outline" id="uploadPdfBtn">Upload PDF</button><span id="pdfFileName" style="margin-left:10px;"></span></div></div>
                    <div class="modal-actions">
                        <button class="btn btn-outline" id="cancelModalBtn">Cancel</button>
                        <button class="btn btn-primary" id="saveCourseBtn">Save</button>
                    </div>
                `;
                genericModalContent.innerHTML = html;
                const titleInp = document.getElementById('courseTitle');
                const typeSel = document.getElementById('courseType');
                const textContainer = document.getElementById('textContainer');
                const pdfContainer = document.getElementById('pdfContainer');
                const saveBtn = document.getElementById('saveCourseBtn');
                const cancelBtn = document.getElementById('cancelModalBtn');
                const uploadPdfBtn = document.getElementById('uploadPdfBtn');
                const pdfFileName = document.getElementById('pdfFileName');
                let pdfUrl = '';

                // Quill
                if (quillInstance) quillInstance = null;
                quillInstance = new Quill('#quillEditor', {
                    theme: 'snow',
                    modules: { toolbar: [['bold','italic','underline'], [{list:'ordered'},{list:'bullet'}], ['link','image','video'], ['clean']] },
                    placeholder: 'Course content...'
                });

                typeSel.addEventListener('change', () => {
                    if (typeSel.value === 'text') { textContainer.classList.remove('hidden'); pdfContainer.classList.add('hidden'); }
                    else { textContainer.classList.add('hidden'); pdfContainer.classList.remove('hidden'); }
                });

                if (isEdit) {
                    db.collection('courses').doc(id).get().then(doc => {
                        const d = doc.data();
                        titleInp.value = d.title;
                        typeSel.value = d.type;
                        if (d.type === 'text') {
                            textContainer.classList.remove('hidden'); pdfContainer.classList.add('hidden');
                            quillInstance.root.innerHTML = d.content || '';
                        } else {
                            textContainer.classList.add('hidden'); pdfContainer.classList.remove('hidden');
                            pdfUrl = d.pdfUrl || '';
                            pdfFileName.textContent = pdfUrl ? 'PDF uploaded' : '';
                        }
                    });
                }

                uploadPdfBtn.addEventListener('click', () => {
                    cloudinary.openUploadWidget({
                        cloudName: CLOUD_NAME,
                        uploadPreset: UPLOAD_PRESET,
                        sources: ['local','url'],
                        resourceType: 'raw',
                        clientAllowedFormats: ['pdf'],
                        maxFileSize: 20000000
                    }, (error, result) => {
                        if (!error && result && result.event === 'success') {
                            pdfUrl = result.info.secure_url;
                            pdfFileName.textContent = result.info.original_filename + '.pdf';
                        }
                    });
                });

                saveBtn.addEventListener('click', async () => {
                    const title = titleInp.value.trim();
                    if (!title) return alert('Title required');
                    const type = typeSel.value;
                    const courseData = { title, type, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                    if (type === 'text') courseData.content = quillInstance.root.innerHTML;
                    else {
                        if (!pdfUrl && !isEdit) return alert('Please upload a PDF');
                        courseData.pdfUrl = pdfUrl;
                    }
                    if (isEdit) await db.collection('courses').doc(id).update(courseData);
                    else {
                        courseData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection('courses').add(courseData);
                    }
                    genericModal.classList.remove('active');
                    loadCourses();
                });

                cancelBtn.addEventListener('click', () => genericModal.classList.remove('active'));
            }

            async function deleteCourse(id) {
                if (confirm('Delete this course and all related data?')) {
                    const batch = db.batch();
                    const enrolls = await db.collection('enrollments').where('courseId','==',id).get();
                    enrolls.forEach(d => batch.delete(d.ref));
                    batch.delete(db.collection('courses').doc(id));
                    await batch.commit();
                    loadCourses();
                    loadDashboardStats();
                }
            }

            // Students
            async function loadStudents() {
                const [usersSnap, coursesSnap, enrollsSnap, progressSnap] = await Promise.all([
                    db.collection('users').where('role','==','learner').get(),
                    db.collection('courses').get(),
                    db.collection('enrollments').get(),
                    db.collection('progress').get()
                ]);
                const courseMap = {}; coursesSnap.forEach(d => courseMap[d.id] = d.data().title);
                const userMap = {}; usersSnap.forEach(d => userMap[d.id] = d.data());
                let html = `<table><thead><tr><th>Student</th><th>Course</th><th>Status</th><th>Progress</th><th>Actions</th></tr></thead><tbody>`;
                enrollsSnap.forEach(doc => {
                    const enr = doc.data();
                    const student = userMap[enr.userId] || { name: 'Unknown', email: '' };
                    const progressDoc = progressSnap.docs.find(p => p.id === `${enr.userId}_${enr.courseId}`);
                    const progress = progressDoc ? (progressDoc.data().percent || 0) : 0;
                    html += `<tr>
                        <td>${student.name}<br><small>${student.email}</small></td>
                        <td>${courseMap[enr.courseId] || 'N/A'}</td>
                        <td>${enr.status}</td>
                        <td>${progress}%</td>
                        <td>
                            <button class="btn btn-sm btn-danger remove-student" data-id="${doc.id}">Remove</button>
                            ${enr.status === 'removed' ? `<button class="btn btn-sm btn-success reinstate-student" data-id="${doc.id}">Reinstate</button>` : ''}
                        </td>
                    </tr>`;
                });
                html += `</tbody></table>`;
                document.getElementById('studentsTableWrapper').innerHTML = html;
                document.querySelectorAll('.remove-student').forEach(b => b.addEventListener('click', async () => {
                    if (confirm('Remove student?')) {
                        await db.collection('enrollments').doc(b.dataset.id).update({ status: 'removed' });
                        loadStudents();
                    }
                }));
                document.querySelectorAll('.reinstate-student').forEach(b => b.addEventListener('click', async () => {
                    await db.collection('enrollments').doc(b.dataset.id).update({ status: 'enrolled' });
                    loadStudents();
                }));
            }

            // Tests & Scores
            async function loadTests() {
                const testsSnap = await db.collection('tests').orderBy('title').get();
                let html = `<table><thead><tr><th>Test Title</th><th>Course</th><th>Questions</th><th>Actions</th></tr></thead><tbody>`;
                const courseMap = {};
                (await db.collection('courses').get()).forEach(d => courseMap[d.id] = d.data().title);
                testsSnap.forEach(doc => {
                    const t = doc.data();
                    html += `<tr>
                        <td>${t.title}</td>
                        <td>${courseMap[t.courseId] || 'N/A'}</td>
                        <td>${(t.questions || []).length}</td>
                        <td>
                            <button class="btn btn-sm btn-outline edit-test" data-id="${doc.id}">✏️</button>
                            <button class="btn btn-sm btn-warning view-scores" data-id="${doc.id}">Scores</button>
                            <button class="btn btn-sm btn-danger delete-test" data-id="${doc.id}">🗑️</button>
                        </td>
                    </tr>`;
                });
                html += `</tbody></table>`;
                document.getElementById('testsTableWrapper').innerHTML = html;
                document.querySelectorAll('.edit-test').forEach(b => b.addEventListener('click', () => openTestModal(b.dataset.id)));
                document.querySelectorAll('.delete-test').forEach(b => b.addEventListener('click', async () => {
                    if (confirm('Delete test?')) { await db.collection('tests').doc(b.dataset.id).delete(); loadTests(); }
                }));
                document.querySelectorAll('.view-scores').forEach(b => b.addEventListener('click', () => viewScores(b.dataset.id)));
            }

            function openTestModal(id = null) {
                genericModal.classList.add('active');
                const isEdit = !!id;
                let html = `
                    <h2>${isEdit ? 'Edit' : 'New'} Test</h2>
                    <div class="form-group"><label>Title</label><input type="text" id="testTitle"></div>
                    <div class="form-group"><label>Course</label><select id="testCourse"></select></div>
                    <div class="form-group"><label>Passing Score (%)</label><input type="number" id="passScore" min="0" max="100" value="60"></div>
                    <div id="questionsContainer"></div>
                    <button class="btn btn-sm btn-outline" id="addQuestionBtn">+ Add Question</button>
                    <div class="modal-actions">
                        <button class="btn btn-outline" id="cancelModalBtn">Cancel</button>
                        <button class="btn btn-primary" id="saveTestBtn">Save</button>
                    </div>
                `;
                genericModalContent.innerHTML = html;
                const testTitle = document.getElementById('testTitle');
                const testCourse = document.getElementById('testCourse');
                const passScore = document.getElementById('passScore');
                const questionsContainer = document.getElementById('questionsContainer');
                const addQuestionBtn = document.getElementById('addQuestionBtn');
                const saveBtn = document.getElementById('saveTestBtn');
                const cancelBtn = document.getElementById('cancelModalBtn');

                let questions = [];
                async function loadCoursesDropdown() {
                    const snap = await db.collection('courses').get();
                    testCourse.innerHTML = snap.docs.map(d => `<option value="${d.id}">${d.data().title}</option>`).join('');
                }
                loadCoursesDropdown();

                function renderQuestions() {
                    questionsContainer.innerHTML = questions.map((q, idx) => `
                        <div style="border:1px solid rgba(255,255,255,0.1); padding:12px; border-radius:8px; margin-bottom:10px;">
                            <strong>Q${idx+1}</strong>
                            <input class="q-text" placeholder="Question" value="${q.text || ''}" style="width:100%;margin:8px 0;">
                            <div style="display:flex; gap:8px;">
                                <input class="opt-a" placeholder="Option A" value="${q.options?.[0] || ''}">
                                <input class="opt-b" placeholder="Option B" value="${q.options?.[1] || ''}">
                                <input class="opt-c" placeholder="Option C" value="${q.options?.[2] || ''}">
                                <input class="opt-d" placeholder="Option D" value="${q.options?.[3] || ''}">
                            </div>
                            <select class="correct-ans" style="margin-top:8px;">
                                <option value="0" ${q.answer === 0 ? 'selected' : ''}>A</option>
                                <option value="1" ${q.answer === 1 ? 'selected' : ''}>B</option>
                                <option value="2" ${q.answer === 2 ? 'selected' : ''}>C</option>
                                <option value="3" ${q.answer === 3 ? 'selected' : ''}>D</option>
                            </select>
                            <button class="btn btn-sm btn-danger remove-question" style="float:right;">Remove</button>
                        </div>
                    `).join('');
                    document.querySelectorAll('.remove-question').forEach((btn, i) => btn.addEventListener('click', () => {
                        questions.splice(i,1); renderQuestions();
                    }));
                }

                addQuestionBtn.addEventListener('click', () => {
                    questions.push({ text: '', options: ['','','',''], answer: 0 });
                    renderQuestions();
                });

                if (isEdit) {
                    db.collection('tests').doc(id).get().then(doc => {
                        const t = doc.data();
                        testTitle.value = t.title;
                        testCourse.value = t.courseId;
                        passScore.value = t.passScore || 60;
                        questions = t.questions || [];
                        renderQuestions();
                    });
                } else {
                    questions = [{ text: '', options: ['','','',''], answer: 0 }];
                    renderQuestions();
                }

                saveBtn.addEventListener('click', async () => {
                    const title = testTitle.value.trim();
                    if (!title) return alert('Title required');
                    // Gather questions from DOM
                    const qCards = questionsContainer.querySelectorAll('div');
                    const updatedQuestions = [];
                    qCards.forEach((card, i) => {
                        const text = card.querySelector('.q-text').value.trim();
                        const opts = [
                            card.querySelector('.opt-a').value.trim(),
                            card.querySelector('.opt-b').value.trim(),
                            card.querySelector('.opt-c').value.trim(),
                            card.querySelector('.opt-d').value.trim()
                        ];
                        const ans = parseInt(card.querySelector('.correct-ans').value);
                        if (text) updatedQuestions.push({ text, options: opts, answer: ans });
                    });
                    const testData = {
                        title,
                        courseId: testCourse.value,
                        passScore: parseInt(passScore.value) || 60,
                        questions: updatedQuestions,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    if (isEdit) await db.collection('tests').doc(id).update(testData);
                    else {
                        testData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection('tests').add(testData);
                    }
                    genericModal.classList.remove('active');
                    loadTests();
                });
                cancelBtn.addEventListener('click', () => genericModal.classList.remove('active'));
            }

            async function viewScores(testId) {
                const scoresSnap = await db.collection('scores').where('testId','==',testId).get();
                const userMap = {};
                (await db.collection('users').get()).forEach(d => userMap[d.id] = d.data());
                let html = `<h2>Test Scores</h2><table><thead><tr><th>Student</th><th>Score</th><th>Passed?</th><th>Date</th></tr></thead><tbody>`;
                scoresSnap.forEach(doc => {
                    const s = doc.data();
                    const student = userMap[s.userId] || { name: 'Unknown' };
                    html += `<tr><td>${student.name}</td><td>${s.score}%</td><td>${s.passed ? '✅' : '❌'}</td><td>${s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleDateString() : ''}</td></tr>`;
                });
                html += `</tbody></table><button class="btn btn-outline" id="closeScoresBtn">Close</button>`;
                genericModalContent.innerHTML = html;
                genericModal.classList.add('active');
                document.getElementById('closeScoresBtn').addEventListener('click', () => genericModal.classList.remove('active'));
            }

            // Projects
            async function loadProjects() {
                const snap = await db.collection('projects').orderBy('title').get();
                let html = `<table><thead><tr><th>Title</th><th>Course</th><th>Submissions</th><th>Actions</th></tr></thead><tbody>`;
                const courseMap = {}; (await db.collection('courses').get()).forEach(d => courseMap[d.id] = d.data().title);
                for (const doc of snap.docs) {
                    const p = doc.data();
                    const subs = await db.collection('submissions').where('projectId','==',doc.id).get();
                    html += `<tr>
                        <td>${p.title}</td><td>${courseMap[p.courseId] || 'N/A'}</td>
                        <td>${subs.size}</td>
                        <td>
                            <button class="btn btn-sm btn-outline edit-project" data-id="${doc.id}">✏️</button>
                            <button class="btn btn-sm btn-warning view-submissions" data-id="${doc.id}">Submissions</button>
                            <button class="btn btn-sm btn-danger delete-project" data-id="${doc.id}">🗑️</button>
                        </td>
                    </tr>`;
                }
                html += `</tbody></table>`;
                document.getElementById('projectsTableWrapper').innerHTML = html;
                document.querySelectorAll('.edit-project').forEach(b => b.addEventListener('click', () => openProjectModal(b.dataset.id)));
                document.querySelectorAll('.delete-project').forEach(b => b.addEventListener('click', async () => {
                    if (confirm('Delete project?')) { await db.collection('projects').doc(b.dataset.id).delete(); loadProjects(); }
                }));
                document.querySelectorAll('.view-submissions').forEach(b => b.addEventListener('click', () => viewSubmissions(b.dataset.id)));
            }

            function openProjectModal(id = null) {
                genericModal.classList.add('active');
                const isEdit = !!id;
                let html = `
                    <h2>${isEdit ? 'Edit' : 'New'} Project</h2>
                    <div class="form-group"><label>Title</label><input type="text" id="projectTitle"></div>
                    <div class="form-group"><label>Course</label><select id="projectCourse"></select></div>
                    <div class="form-group"><label>Description</label><textarea id="projectDesc" rows="4"></textarea></div>
                    <div class="modal-actions">
                        <button class="btn btn-outline" id="cancelModalBtn">Cancel</button>
                        <button class="btn btn-primary" id="saveProjectBtn">Save</button>
                    </div>
                `;
                genericModalContent.innerHTML = html;
                const titleInp = document.getElementById('projectTitle');
                const courseSel = document.getElementById('projectCourse');
                const descInp = document.getElementById('projectDesc');
                const saveBtn = document.getElementById('saveProjectBtn');
                const cancelBtn = document.getElementById('cancelModalBtn');
                db.collection('courses').get().then(snap => {
                    courseSel.innerHTML = snap.docs.map(d => `<option value="${d.id}">${d.data().title}</option>`).join('');
                });
                if (isEdit) {
                    db.collection('projects').doc(id).get().then(doc => {
                        const d = doc.data();
                        titleInp.value = d.title; courseSel.value = d.courseId; descInp.value = d.description || '';
                    });
                }
                saveBtn.addEventListener('click', async () => {
                    const title = titleInp.value.trim();
                    if (!title) return alert('Title required');
                    const data = { title, courseId: courseSel.value, description: descInp.value.trim(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                    if (isEdit) await db.collection('projects').doc(id).update(data);
                    else {
                        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection('projects').add(data);
                    }
                    genericModal.classList.remove('active');
                    loadProjects();
                });
                cancelBtn.addEventListener('click', () => genericModal.classList.remove('active'));
            }

            async function viewSubmissions(projectId) {
                const subsSnap = await db.collection('submissions').where('projectId','==',projectId).get();
                const userMap = {}; (await db.collection('users').get()).forEach(d => userMap[d.id] = d.data());
                let html = `<h2>Submissions</h2><table><thead><tr><th>Student</th><th>File/Link</th><th>Grade</th><th>Actions</th></tr></thead><tbody>`;
                subsSnap.forEach(doc => {
                    const s = doc.data();
                    const student = userMap[s.userId] || { name: 'Unknown' };
                    html += `<tr>
                        <td>${student.name}</td>
                        <td><a href="${s.fileUrl || '#'}" target="_blank" style="color:#F97316;">${s.fileUrl ? 'View' : 'No file'}</a></td>
                        <td>${s.grade || 'Ungraded'}</td>
                        <td><button class="btn btn-sm btn-outline grade-submission" data-id="${doc.id}">Grade</button></td>
                    </tr>`;
                });
                html += `</tbody></table><button class="btn btn-outline" id="closeSubsBtn">Close</button>`;
                genericModalContent.innerHTML = html;
                genericModal.classList.add('active');
                document.getElementById('closeSubsBtn').addEventListener('click', () => genericModal.classList.remove('active'));
                document.querySelectorAll('.grade-submission').forEach(b => b.addEventListener('click', () => gradeSubmission(b.dataset.id)));
            }

            function gradeSubmission(id) {
                const grade = prompt('Enter grade (e.g., A, B, C, or Pass/Fail):');
                if (grade) {
                    db.collection('submissions').doc(id).update({ grade, gradedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    alert('Graded!');
                    genericModal.classList.remove('active');
                }
            }

            // Certificates
            async function loadCertificates() {
                const snap = await db.collection('certificates').orderBy('issuedAt','desc').get();
                const userMap = {}; (await db.collection('users').get()).forEach(d => userMap[d.id] = d.data());
                const courseMap = {}; (await db.collection('courses').get()).forEach(d => courseMap[d.id] = d.data().title);
                let html = `<table><thead><tr><th>Student</th><th>Course</th><th>Issued</th><th>Actions</th></tr></thead><tbody>`;
                snap.forEach(doc => {
                    const c = doc.data();
                    const student = userMap[c.userId] || { name: 'Unknown' };
                    html += `<tr>
                        <td>${student.name}</td><td>${courseMap[c.courseId] || 'N/A'}</td>
                        <td>${c.issuedAt ? new Date(c.issuedAt.seconds*1000).toLocaleDateString() : ''}</td>
                        <td><button class="btn btn-sm btn-outline view-cert" data-id="${doc.id}">View</button></td>
                    </tr>`;
                });
                html += `</tbody></table>`;
                document.getElementById('certificatesTableWrapper').innerHTML = html;
                document.querySelectorAll('.view-cert').forEach(b => b.addEventListener('click', () => viewCertificate(b.dataset.id)));
            }

            function openCertificateModal() {
                genericModal.classList.add('active');
                let html = `
                    <h2>Issue Certificate</h2>
                    <div class="form-group"><label>Student</label><select id="certStudent"></select></div>
                    <div class="form-group"><label>Course</label><select id="certCourse"></select></div>
                    <div class="modal-actions">
                        <button class="btn btn-outline" id="cancelModalBtn">Cancel</button>
                        <button class="btn btn-primary" id="issueCertBtn">Issue</button>
                    </div>
                `;
                genericModalContent.innerHTML = html;
                const studentSel = document.getElementById('certStudent');
                const courseSel = document.getElementById('certCourse');
                const issueBtn = document.getElementById('issueCertBtn');
                const cancelBtn = document.getElementById('cancelModalBtn');
                Promise.all([db.collection('users').where('role','==','learner').get(), db.collection('courses').get()]).then(([usersSnap, coursesSnap]) => {
                    studentSel.innerHTML = usersSnap.docs.map(d => `<option value="${d.id}">${d.data().name}</option>`).join('');
                    courseSel.innerHTML = coursesSnap.docs.map(d => `<option value="${d.id}">${d.data().title}</option>`).join('');
                });
                issueBtn.addEventListener('click', async () => {
                    const certData = {
                        userId: studentSel.value,
                        courseId: courseSel.value,
                        issuedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await db.collection('certificates').add(certData);
                    genericModal.classList.remove('active');
                    loadCertificates();
                });
                cancelBtn.addEventListener('click', () => genericModal.classList.remove('active'));
            }

            async function viewCertificate(id) {
                const doc = await db.collection('certificates').doc(id).get();
                if (!doc.exists) return;
                const c = doc.data();
                const student = (await db.collection('users').doc(c.userId).get()).data();
                const course = (await db.collection('courses').doc(c.courseId).get()).data();
                const date = c.issuedAt ? new Date(c.issuedAt.seconds*1000).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) : '';
                const certHtml = `
                    <div style="background:white; color:black; padding:40px; border-radius:12px; text-align:center; max-width:600px; margin:0 auto;">
                        <h1 style="font-family:'Georgia',serif; color:#DC2626;">Certificate of Completion</h1>
                        <p style="font-size:1.2rem;">This is to certify that</p>
                        <h2 style="font-size:2rem; margin:20px 0;">${student.name}</h2>
                        <p>has successfully completed the course</p>
                        <h3 style="color:#F97316;">${course.title}</h3>
                        <p>on ${date}</p>
                        <p style="margin-top:30px; font-style:italic;">Triangletech Academy</p>
                    </div>
                    <button class="btn btn-outline" id="closeCertBtn" style="margin-top:20px;">Close</button>
                `;
                genericModalContent.innerHTML = certHtml;
                genericModal.classList.add('active');
                document.getElementById('closeCertBtn').addEventListener('click', () => genericModal.classList.remove('active'));
            }

            // Profile
            uploadPicBtn.addEventListener('click', () => {
                cloudinary.openUploadWidget({
                    cloudName: CLOUD_NAME,
                    uploadPreset: UPLOAD_PRESET,
                    sources: ['local','url','camera'],
                    cropping: true,
                    croppingAspectRatio: 1,
                    clientAllowedFormats: ['png','jpg','jpeg','webp']
                }, (error, result) => {
                    if (!error && result && result.event === 'success') {
                        const url = result.info.secure_url;
                        adminAvatar.innerHTML = `<img src="${url}" alt="Profile">`;
                        profileAvatar.innerHTML = `<img src="${url}" alt="Profile">`;
                        db.collection('users').doc(currentUser.uid).update({ profilePicUrl: url });
                        currentUser.profilePicUrl = url;
                    }
                });
            });
            saveProfileBtn.addEventListener('click', async () => {
                const name = profileNameInput.value.trim();
                if (!name) return alert('Name required');
                await db.collection('users').doc(currentUser.uid).update({ name });
                currentUser.name = name;
                adminName.textContent = name;
                if (!currentUser.profilePicUrl) {
                    adminAvatar.textContent = name.charAt(0).toUpperCase();
                    profileAvatar.textContent = name.charAt(0).toUpperCase();
                }
                alert('Profile updated');
            });

            logoutBtn.addEventListener('click', () => auth.signOut().then(() => window.location.href = 'auth.html'));

            console.log('%c🛡️ Triangletech Admin %cDashboard Ready', 'color:#DC2626;font-weight:bold;', 'color:#F97316;');
        })();
    </script>
</body>
</html>
