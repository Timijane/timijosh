<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Certificate — TRIANGLE LEARN</title>
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Sora:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c8963e;
            --dark: #1e293b;
            --purple: #6c5ce7;
            --border: #e8d5b0;
            --bg: #f8f9fc;
            --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            min-height: 100vh;
        }
        .certificate-container {
            max-width: 1000px;
            width: 100%;
            background: #fff;
            border: 2px solid var(--gold);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            position: relative;
            padding: 60px 50px 50px;
            margin-bottom: 30px;
            page-break-inside: avoid;
        }
        .certificate-border {
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            pointer-events: none;
        }
        .cert-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .org-name {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--dark);
            margin-bottom: 8px;
        }
        .cert-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #0A2540;
            margin: 10px 0;
        }
        .divider {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--purple));
            margin: 0 auto 20px;
        }
        .cert-body {
            text-align: center;
            font-size: 1.1rem;
            color: #555;
            line-height: 1.8;
            margin: 20px 0;
        }
        .student-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #0A2540;
            margin: 10px 0;
        }
        .course-name {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--purple);
            margin: 8px 0 5px;
        }
        .stage {
            font-size: 1rem;
            color: #666;
            margin-bottom: 25px;
        }
        .signatures {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 80px;
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }
        .sig-block {
            text-align: center;
            min-width: 160px;
        }
        .sig-line {
            width: 180px;
            height: 1px;
            background: #333;
            margin: 0 auto 6px;
            opacity: 0.4;
        }
        .sig-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
        }
        .sig-image {
            max-width: 180px;
            max-height: 60px;
            object-fit: contain;
            display: block;
            margin: 5px auto;
        }
        .seal {
            position: absolute;
            bottom: 40px;
            right: 60px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 0.65rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            transform: rotate(-15deg);
            pointer-events: none;
        }
        .qr-container {
            position: absolute;
            bottom: 20px;
            left: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .qr-container canvas {
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 4px;
            background: white;
        }
        .qr-label {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #888;
        }
        .cert-date {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }

        /* Signature input section */
        .sig-upload-section {
            display: none;
            margin: 20px 0;
            padding: 20px;
            background: #f0f4ff;
            border-radius: var(--radius);
            text-align: center;
        }
        .sig-upload-section h3 {
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        .sig-options {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .sig-option {
            background: white;
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: 0.2s;
            width: 200px;
        }
        .sig-option:hover {
            border-color: var(--purple);
            box-shadow: 0 0 15px rgba(108,92,231,0.15);
        }
        .sig-option input[type=file] {
            display: none;
        }
        .sig-option label {
            cursor: pointer;
            font-weight: 600;
        }
        canvas#signatureCanvas {
            border: 1px dashed #aaa;
            border-radius: 8px;
            width: 100%;
            max-width: 300px;
            height: 150px;
            display: block;
            margin: 15px auto;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            font-family: inherit;
            transition: 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f0a500, #e84393, #6c5ce7);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(232,67,147,0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #eef0f5;
            color: #333;
        }
        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .certificate-container {
                padding: 30px 20px;
            }
            .signatures {
                flex-direction: column;
                align-items: center;
                gap: 40px;
            }
            .seal {
                bottom: 20px;
                right: 20px;
                width: 70px;
                height: 70px;
                font-size: 0.55rem;
            }
        }
        @media print {
            body { background: white; padding: 0; }
            .actions, .sig-upload-section, .qr-container .qr-label, .btn { display: none !important; }
            .certificate-container {
                box-shadow: none;
                border: 2px solid #c8963e;
                padding: 40px;
            }
        }
    </style>
</head>
<body>

    <div id="certificateWrapper"></div>
    <div class="actions" id="certActions" style="display:none;">
        <button class="btn btn-primary" onclick="window.print()">📥 Download / Print</button>
        <button class="btn btn-outline" onclick="shareCert()">🔗 Share</button>
    </div>

    <!-- QR Code library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <script>
    (function() {
        // ========== FIREBASE CONFIG (YOUR PROJECT) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage().ref();

        // ========== STATE ==========
        const urlParams = new URLSearchParams(window.location.search);
        const CERT_ID = urlParams.get('certId') || urlParams.get('id');
        let certificateData = null;
        let learnerSignatureUrl = null;
        let instructorSignatureUrl = null;

        // DOM helpers
        const wrapper = document.getElementById('certificateWrapper');
        const actionsBar = document.getElementById('certActions');

        // ========== LOAD CERTIFICATE ==========
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                // Public view allowed if certId present, but for editing signature user must be owner
                if (CERT_ID) {
                    await loadCertificate(null);
                } else {
                    window.location.href = 'auth.html';
                }
            } else {
                await loadCertificate(user);
            }
        });

        async function loadCertificate(user) {
            if (!CERT_ID) {
                wrapper.innerHTML = '<p style="text-align:center;">No certificate ID provided.</p>';
                return;
            }
            try {
                const doc = await db.collection('certificates').doc(CERT_ID).get();
                if (!doc.exists) {
                    wrapper.innerHTML = '<p style="text-align:center;">Certificate not found.</p>';
                    return;
                }
                certificateData = doc.data();
                // Check ownership if user logged in
                if (user && certificateData.userId !== user.uid && !(certificateData.userId === user.uid)) {
                    // but we'll still show it (public view) but disable signature editing
                }
                // Fetch instructor signature from settings
                const settingsDoc = await db.collection('settings').doc('instructor').get();
                if (settingsDoc.exists) {
                    instructorSignatureUrl = settingsDoc.data().signatureUrl || null;
                }
                renderCertificate(user);
            } catch (err) {
                console.error(err);
                wrapper.innerHTML = '<p style="text-align:center;">Error loading certificate.</p>';
            }
        }

        // ========== RENDER CERTIFICATE ==========
        function renderCertificate(user) {
            const cert = certificateData;
            const studentName = cert.fullName || 'Student';
            const courseName = cert.courseName || 'Course';
            const stage = cert.stage || 'Completed';
            const issueDate = cert.issuedAt?.toDate?.() || new Date();
            const dateStr = issueDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            const certIdShort = CERT_ID.substring(0, 8);

            // Build QR data
            const qrData = JSON.stringify({
                certId: CERT_ID,
                student: studentName,
                course: courseName,
                stage: stage,
                date: dateStr,
                verification: `https://timijane.github.io/timijosh/verify.html?cert=${CERT_ID}` // to be built later
            });

            // Render certificate HTML
            let html = `
            <div class="certificate-container" id="printableCert">
                <div class="certificate-border"></div>
                <div class="seal">TRIANGLE<br>LEARN<br>CERTIFIED</div>
                <div class="qr-container" id="qrContainer">
                    <div id="qrcode"></div>
                    <div class="qr-label">Scan to verify</div>
                </div>
                <div class="cert-header">
                    <div class="org-name">TRIANGLE LEARN</div>
                    <div class="cert-title">Certificate of Completion</div>
                    <div class="divider"></div>
                </div>
                <div class="cert-body">
                    This is to certify that
                    <div class="student-name">${escapeHtml(studentName)}</div>
                    has successfully completed
                    <div class="course-name">${escapeHtml(courseName)}</div>
                    <div class="stage">${escapeHtml(stage)} Stage</div>
                    with dedication and excellence.
                </div>
                <div class="signatures">
                    <div class="sig-block" id="instructorSigBlock">
                        ${instructorSignatureUrl 
                            ? `<img src="${instructorSignatureUrl}" class="sig-image" alt="Instructor Signature">` 
                            : '<div class="sig-line"></div>'}
                        <div class="sig-label">Instructor / Course Creator</div>
                    </div>
                    <div class="sig-block" id="learnerSigBlock">
                        ${certificateData.learnerSignatureUrl 
                            ? `<img src="${certificateData.learnerSignatureUrl}" class="sig-image" alt="Learner Signature">` 
                            : '<div class="sig-line"></div>'}
                        <div class="sig-label">Learner</div>
                    </div>
                </div>
                <div class="cert-date">
                    Issued on ${dateStr} | Certificate ID: ${certIdShort}
                </div>
            </div>`;

            wrapper.innerHTML = html;
            actionsBar.style.display = 'flex';

            // Generate QR code
            new QRCode(document.getElementById('qrcode'), {
                text: qrData,
                width: 80,
                height: 80,
                colorDark: "#1e293b",
                colorLight: "#ffffff"
            });

            // If user is the certificate owner and no signature yet, show upload section
            if (user && user.uid === certificateData.userId && !certificateData.learnerSignatureUrl) {
                showSignatureUpload(user);
            }
        }

        // ========== SIGNATURE UPLOAD / DRAW ==========
        function showSignatureUpload(user) {
            const certWrapper = document.querySelector('.certificate-container');
            const uploadDiv = document.createElement('div');
            uploadDiv.className = 'sig-upload-section';
            uploadDiv.innerHTML = `
                <h3>✍️ Add Your Signature</h3>
                <p style="margin-bottom:15px;color:#555;">Choose one method to sign your certificate</p>
                <div class="sig-options">
                    <div class="sig-option" id="uploadSigOption">
                        <label for="sigFileInput">
                            📁 Upload Signature<br><small>(JPG/PNG, white paper)</small>
                        </label>
                        <input type="file" id="sigFileInput" accept="image/*">
                    </div>
                    <div class="sig-option" id="drawSigOption">
                        <label>🖊️ Draw Signature</label>
                        <button id="startDrawBtn" class="btn btn-outline" style="margin-top:8px;">Open Drawing Pad</button>
                    </div>
                </div>
                <canvas id="signatureCanvas" style="display:none;"></canvas>
                <div id="drawActions" style="display:none; margin-top:12px;">
                    <button id="clearCanvasBtn" class="btn btn-outline">Clear</button>
                    <button id="saveCanvasBtn" class="btn btn-primary">Save Signature</button>
                </div>
                <div id="uploadProgress" style="display:none; margin-top:12px;">Uploading...</div>
            `;
            certWrapper.parentNode.insertBefore(uploadDiv, actionsBar);

            // File upload handler
            document.getElementById('sigFileInput').addEventListener('change', handleFileUpload);

            // Drawing pad
            let drawing = false;
            const canvas = document.getElementById('signatureCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 300;
            canvas.height = 150;
            document.getElementById('startDrawBtn').addEventListener('click', () => {
                canvas.style.display = 'block';
                document.getElementById('drawActions').style.display = 'block';
                document.getElementById('startDrawBtn').style.display = 'none';
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDraw);
                canvas.addEventListener('touchstart', startDraw);
                canvas.addEventListener('touchmove', draw);
                canvas.addEventListener('touchend', stopDraw);
            });
            document.getElementById('clearCanvasBtn').addEventListener('click', () => {
                ctx.clearRect(0,0,canvas.width,canvas.height);
            });
            document.getElementById('saveCanvasBtn').addEventListener('click', () => {
                const dataURL = canvas.toDataURL('image/png');
                uploadSignatureAsBlob(dataURL);
            });

            function startDraw(e) { e.preventDefault(); drawing = true; ctx.beginPath(); }
            function draw(e) {
                if (!drawing) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                ctx.lineTo(x,y);
                ctx.stroke();
            }
            function stopDraw() { drawing = false; }
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                uploadSignatureAsBlob(ev.target.result);
            };
            reader.readAsDataURL(file);
        }

        async function uploadSignatureAsBlob(dataUrl) {
            const user = auth.currentUser;
            if (!user) return;
            document.getElementById('uploadProgress').style.display = 'block';
            const response = await fetch(dataUrl);
            const blob = await response.blob();
            const storageRef = storage.child(`signatures/${user.uid}_${CERT_ID}.png`);
            await storageRef.put(blob);
            const downloadUrl = await storageRef.getDownloadURL();
            // Update certificate document
            await db.collection('certificates').doc(CERT_ID).update({
                learnerSignatureUrl: downloadUrl
            });
            certificateData.learnerSignatureUrl = downloadUrl;
            // Refresh certificate display
            wrapper.innerHTML = '';
            renderCertificate(user);
        }

        // ========== SHARE ==========
        window.shareCert = () => {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: 'My TRIANGLE LEARN Certificate', url });
            } else {
                navigator.clipboard.writeText(url);
                alert('Certificate link copied!');
            }
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    })();
    </script>
</body>
</html>
