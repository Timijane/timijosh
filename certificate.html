<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Certificate — TRIANGLE LEARN</title>
    <link rel="icon" href="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cert-cream: #fdfdfc;
            --cert-gold: #b8860b;
            --cert-navy: #1a2332;
            --cert-slate: #4a5568;
            --cert-light-gray: #e8ecf1;
            --cert-accent: #2b6cb0;
            --cert-white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eef1f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
        }

        /* Certificate Card - Landscape */
        .certificate-wrapper {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 1.414 / 1;
            max-height: 90vh;
            background: var(--cert-white);
            position: relative;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15), 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* Subtle background pattern */
        .certificate-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 5% 95%, rgba(184,134,11,0.04) 0%, transparent 50%),
                radial-gradient(circle at 95% 5%, rgba(43,108,176,0.04) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(184,134,11,0.02) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Gold border accents */
        .certificate-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid rgba(184,134,11,0.3);
            margin: 20px;
            pointer-events: none;
        }

        /* Inner content */
        .cert-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 50px;
        }

        /* Top bar with logo and branding */
        .cert-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .cert-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cert-logo img {
            height: 42px;
            width: auto;
        }
        .cert-logo-text {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--cert-navy);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .cert-issuer {
            text-align: right;
            font-size: 0.65rem;
            color: var(--cert-slate);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* Main content area */
        .cert-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px 0;
        }

        /* Subtle top decorative line */
        .cert-rule-top {
            width: 80px;
            height: 2px;
            background: var(--cert-gold);
            margin-bottom: 30px;
            opacity: 0.6;
        }

        /* Course provider line */
        .cert-provider {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--cert-slate);
            margin-bottom: 20px;
        }

        /* Main title */
        .cert-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(2rem, 4vw, 3rem);
            color: var(--cert-navy);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* "This is to certify that" */
        .cert-pre-line {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.9rem;
            color: var(--cert-slate);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        /* Student name */
        .cert-student-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(2.2rem, 4.5vw, 3.2rem);
            color: var(--cert-navy);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Decorative underline */
        .cert-name-underline {
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cert-gold), transparent);
            margin: 0 auto 20px;
        }

        /* "has successfully completed" */
        .cert-post-line {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.9rem;
            color: var(--cert-slate);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        /* Course name */
        .cert-course-name {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: clamp(1.3rem, 2.5vw, 1.8rem);
            color: var(--cert-accent);
            font-style: italic;
            margin-bottom: 6px;
        }

        /* Stage badge */
        .cert-stage-badge {
            display: inline-block;
            padding: 6px 18px;
            border: 1px solid rgba(184,134,11,0.4);
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--cert-gold);
            margin-top: 5px;
        }

        /* Bottom section */
        .cert-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 30px;
        }

        /* Date and ID */
        .cert-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .cert-date {
            font-size: 0.7rem;
            color: var(--cert-slate);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .cert-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: #999;
            letter-spacing: 0.5px;
        }

        /* Signature area */
        .cert-signatures {
            display: flex;
            gap: 60px;
            align-items: flex-end;
        }
        .cert-sig-block {
            text-align: center;
        }
        .cert-sig-line {
            width: 140px;
            height: 1px;
            background: var(--cert-navy);
            margin-bottom: 6px;
            opacity: 0.5;
        }
        .cert-sig-name {
            font-family: 'Playfair Display', serif;
            font-size: 0.75rem;
            font-style: italic;
            color: var(--cert-navy);
        }
        .cert-sig-title {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--cert-slate);
            margin-top: 2px;
        }

        /* QR Code */
        .cert-qr {
            position: absolute;
            bottom: 30px;
            left: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .cert-qr canvas {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 3px;
            background: white;
        }
        .cert-qr-label {
            font-size: 0.55rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Seal */
        .cert-seal {
            position: absolute;
            bottom: 30px;
            right: 50px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--cert-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.55rem;
            color: var(--cert-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            transform: rotate(-10deg);
        }

        /* Action buttons */
        .cert-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: var(--cert-navy);
            color: #fff;
        }
        .btn-primary:hover {
            background: #2c3e50;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(26,35,50,0.25);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d0d5dd;
            color: var(--cert-navy);
        }
        .btn-outline:hover {
            border-color: var(--cert-gold);
            color: var(--cert-gold);
        }

        .error-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error-state h3 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 10px;
        }

        /* Print styles */
        @media print {
            body { background: white; padding: 0; }
            .cert-actions { display: none !important; }
            .certificate-wrapper {
                box-shadow: none;
                max-width: 100%;
                aspect-ratio: 1.414 / 1;
            }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .certificate-wrapper {
                aspect-ratio: auto;
                max-height: none;
                min-height: 600px;
            }
            .cert-content {
                padding: 30px 24px;
            }
            .cert-signatures {
                gap: 30px;
            }
            .cert-sig-line {
                width: 100px;
            }
            .cert-seal {
                width: 60px;
                height: 60px;
                font-size: 0.45rem;
                bottom: 20px;
                right: 20px;
            }
            .cert-qr {
                bottom: 20px;
                left: 20px;
            }
        }
        @media (max-width: 500px) {
            .certificate-wrapper {
                min-height: 500px;
            }
            .cert-content {
                padding: 20px 16px;
            }
            .cert-title {
                font-size: 1.5rem;
            }
            .cert-student-name {
                font-size: 1.5rem;
            }
            .cert-course-name {
                font-size: 1rem;
            }
            .cert-signatures {
                flex-direction: column;
                gap: 20px;
                align-items: center;
            }
            .cert-bottom {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="certificateContainer"></div>
    <div class="cert-actions" id="certActions" style="display:none;">
        <button class="btn btn-primary" onclick="window.print()">📥 Download / Print</button>
        <button class="btn btn-outline" onclick="shareCert()">🔗 Share</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    (function() {
        const firebaseConfig = {
            apiKey: "AIzaSyAvvB3C9SP8tDTqMmqzc6craI4d_0kSVX0",
            authDomain: "timijosh-b8bee.firebaseapp.com",
            projectId: "timijosh-b8bee",
            storageBucket: "timijosh-b8bee.firebasestorage.app",
            messagingSenderId: "779082784462",
            appId: "1:779082784462:web:a9e9aca2177c7e343c3a9f",
            measurementId: "G-ZPS8VP8ZBX"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const urlParams = new URLSearchParams(window.location.search);
        const CERT_ID = urlParams.get('certId') || urlParams.get('id');
        const container = document.getElementById('certificateContainer');
        const actionsBar = document.getElementById('certActions');

        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        async function loadCertificate() {
            if (!CERT_ID) {
                container.innerHTML = '<div class="error-state"><h3>No Certificate ID</h3><p>Missing certificate ID in URL.</p></div>';
                return;
            }
            try {
                const doc = await db.collection('certificates').doc(CERT_ID).get();
                if (!doc.exists) {
                    container.innerHTML = '<div class="error-state"><h3>Certificate Not Found</h3><p>This certificate could not be found.</p></div>';
                    return;
                }
                renderCertificate(doc.data());
            } catch(e) {
                container.innerHTML = `<div class="error-state"><h3>Error</h3><p>${e.message}</p></div>`;
            }
        }

        function renderCertificate(cert) {
            const studentName = cert.fullName || cert.studentName || 'Student';
            const courseName = cert.courseName || 'Course';
            const stage = cert.stage || 'Completed';
            const issueDate = cert.issuedAt?.toDate?.() || new Date();
            const dateStr = issueDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            const certIdShort = CERT_ID.substring(0, 8).toUpperCase();
            const qrData = JSON.stringify({ id: CERT_ID, student: studentName, course: courseName, stage });

            container.innerHTML = `
                <div class="certificate-wrapper" id="printableCert">
                    <div class="cert-content">
                        <div class="cert-top-bar">
                            <div class="cert-logo">
                                <img src="https://res.cloudinary.com/dmbjrohtn/image/upload/v1781345170/Minimalist_MK_Letter_Logo__20260607_115102_0000_ws2vb2.png" alt="TRIANGLE LEARN" height="42">
                                <span class="cert-logo-text">TRIANGLE LEARN</span>
                            </div>
                            <div class="cert-issuer">Certificate of Completion</div>
                        </div>
                        <div class="cert-main">
                            <div class="cert-rule-top"></div>
                            <div class="cert-provider">TRIANGLE LEARN</div>
                            <div class="cert-title">Certificate of Completion</div>
                            <div class="cert-pre-line">This is to certify that</div>
                            <div class="cert-student-name">${escapeHtml(studentName)}</div>
                            <div class="cert-name-underline"></div>
                            <div class="cert-post-line">has successfully completed</div>
                            <div class="cert-course-name">${escapeHtml(courseName)}</div>
                            <div class="cert-stage-badge">${escapeHtml(stage)}</div>
                        </div>
                        <div class="cert-bottom">
                            <div class="cert-meta">
                                <span class="cert-date">Issued ${dateStr}</span>
                                <span class="cert-id">CERT-${certIdShort}</span>
                            </div>
                            <div class="cert-signatures">
                                <div class="cert-sig-block">
                                    <div class="cert-sig-line"></div>
                                    <div class="cert-sig-name">TRIANGLE LEARN</div>
                                    <div class="cert-sig-title">Institution</div>
                                </div>
                                <div class="cert-sig-block">
                                    <div class="cert-sig-line"></div>
                                    <div class="cert-sig-name">${escapeHtml(studentName)}</div>
                                    <div class="cert-sig-title">Learner</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="cert-seal">TRIANGLE<br>LEARN<br>VERIFIED</div>
                    <div class="cert-qr">
                        <div id="qrcode"></div>
                        <span class="cert-qr-label">Verify</span>
                    </div>
                </div>`;

            actionsBar.style.display = 'flex';

            try {
                new QRCode(document.getElementById('qrcode'), {
                    text: qrData,
                    width: 60,
                    height: 60,
                    colorDark: "#1a2332",
                    colorLight: "#ffffff"
                });
            } catch(e) {}
        }

        window.shareCert = () => {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: 'My TRIANGLE LEARN Certificate', url });
            } else {
                navigator.clipboard.writeText(url).then(() => alert('Link copied!'));
            }
        };

        loadCertificate();
    })();
    </script>
</body>
</html>
